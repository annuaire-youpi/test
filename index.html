<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e6e6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="Ti Kanno — Louez un bateau avec skipper en Martinique. Plateforme de réservation en ligne pour particuliers et professionnels.">
<title>Ti Kanno — Louez votre bateau en Martinique</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e6e6e'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle' fill='white' font-family='system-ui'%3E⛵%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e6e6e'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle' fill='white' font-family='system-ui'%3E⛵%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/fr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<style>
  :root {
    --primary: #0e6e6e;
    --primary-dark: #0a4f4f;
    --primary-light: #14a3a3;
    --primary-soft: #e8f4f4;
    --accent: #d4825c;
    --accent-soft: #fef0e6;
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f5f4ef;
    --text: #1a2332;
    --text-2: #5a6577;
    --text-3: #8a93a3;
    --border: #e6e8ec;
    --border-strong: #d4d8df;
    --success: #16a34a;
    --success-soft: #dcfce7;
    --warning: #d97706;
    --warning-soft: #fef3c7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --info: #2563eb;
    --info-soft: #dbeafe;
    --demo: #ea580c;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 2px 12px rgba(15,23,42,.06);
    --shadow-lg: 0 12px 32px rgba(15,23,42,.10);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'Manrope', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body { min-height: 100vh; min-height: 100dvh; }

  button, input, select, textarea {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }

  button { cursor: pointer; border: none; background: none; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img { max-width: 100%; display: block; }

  /* ====== LAYOUT ====== */
  .app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ====== HEADER ====== */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,.92);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -.02em;
    color: var(--text);
    cursor: pointer;
  }
  .logo:hover { text-decoration: none; }
  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--primary);
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: white;
    font-size: 19px;
  }
  .header-nav { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .header-link {
    padding: 8px 14px;
    border-radius: var(--radius);
    color: var(--text-2);
    font-weight: 600;
    font-size: 14px;
    transition: all .15s ease;
  }
  .header-link:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  .header-link.active { color: var(--primary); }

  /* ====== BUTTONS ====== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 14px;
    transition: all .18s ease;
    border: 1px solid transparent;
    white-space: nowrap;
    line-height: 1;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); text-decoration: none; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--surface-2); text-decoration: none; }
  .btn-ghost { background: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #b86c47; text-decoration: none; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #b91c1c; text-decoration: none; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #15803d; text-decoration: none; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-lg { padding: 14px 24px; font-size: 16px; }
  .btn-block { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ====== MAIN ====== */
  .main { flex: 1; }

  /* ====== HERO ====== */
  .hero {
    background: linear-gradient(135deg, #0e6e6e 0%, #14a3a3 60%, #5fc4c4 100%);
    color: white;
    padding: 70px 20px 80px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.12) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,.08) 0, transparent 40%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
    position: relative;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.25);
    color: white;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    backdrop-filter: blur(6px);
  }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -.03em;
    margin-bottom: 18px;
  }
  .hero p {
    font-size: clamp(16px, 2vw, 18px);
    opacity: .92;
    max-width: 600px;
    margin: 0 auto 30px;
  }
  .hero-search {
    background: white;
    border-radius: var(--radius-lg);
    padding: 8px;
    display: flex;
    gap: 8px;
    max-width: 700px;
    margin: 0 auto;
    box-shadow: var(--shadow-lg);
  }
  .hero-search input, .hero-search select {
    flex: 1;
    border: none;
    padding: 12px 14px;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    outline: none;
    min-width: 0;
  }
  .hero-search .btn { flex-shrink: 0; }
  @media (max-width: 640px) {
    .hero { padding: 50px 16px 60px; }
    .hero-search { flex-direction: column; padding: 12px; }
    .hero-search input, .hero-search select { border-bottom: 1px solid var(--border); border-radius: 0; }
    .hero-search input:last-of-type, .hero-search select:last-of-type { border-bottom: none; }
  }

  /* ====== CATALOG ====== */
  .container { max-width: 1280px; margin: 0 auto; padding: 40px 20px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .section-head h2 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .section-head p { color: var(--text-2); font-size: 14px; }

  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
  .filter-group label { font-size: 12px; color: var(--text-2); font-weight: 600; }
  .filter-group select, .filter-group input {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 8px 12px;
    background: var(--surface);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .filter-group select:focus, .filter-group input:focus { border-color: var(--primary); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .boat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: all .2s ease;
    display: flex;
    flex-direction: column;
  }
  .boat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border-strong); }
  .boat-img {
    aspect-ratio: 16/10;
    background: var(--surface-2);
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .boat-img-placeholder {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    color: var(--text-3); font-size: 48px;
    background: linear-gradient(135deg, #e8f4f4, #fef0e6);
  }
  .boat-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(255,255,255,.95);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    backdrop-filter: blur(8px);
  }
  .boat-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .boat-title { font-weight: 700; font-size: 17px; letter-spacing: -.01em; }
  .boat-location { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
  .boat-meta { display: flex; gap: 12px; font-size: 13px; color: var(--text-2); margin-top: 4px; flex-wrap: wrap; }
  .boat-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .boat-price {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .boat-price-amount { font-size: 20px; font-weight: 700; color: var(--primary); }
  .boat-price-unit { font-size: 12px; color: var(--text-2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-2);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { color: var(--text); font-size: 18px; margin-bottom: 6px; }

  /* ====== DETAIL PAGE ====== */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

  .gallery {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 8px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
    min-height: 300px;
  }
  .gallery-main {
    grid-row: span 2;
    background: var(--surface-2);
    background-size: cover;
    background-position: center;
    min-height: 300px;
  }
  .gallery-thumb {
    background: var(--surface-2);
    background-size: cover;
    background-position: center;
    min-height: 100px;
  }
  @media (max-width: 640px) {
    .gallery { grid-template-columns: 1fr; }
    .gallery-main { grid-row: span 1; min-height: 240px; }
    .gallery-thumb { display: none; }
  }

  .detail-info h1 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
  .detail-info .boat-location { font-size: 15px; margin-bottom: 20px; }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 24px;
  }
  .info-item .info-label { font-size: 12px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .info-item .info-value { font-weight: 600; font-size: 15px; }

  .booking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    position: sticky;
    top: 90px;
    box-shadow: var(--shadow);
  }
  .booking-price { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
  .booking-price-amount { font-size: 28px; font-weight: 800; color: var(--primary); }
  .booking-price-unit { color: var(--text-2); font-size: 14px; }

  /* ====== FORMS ====== */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-group label .req { color: var(--danger); }
  .form-group .help { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .form-control {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 14px;
    outline: none;
    transition: all .15s;
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  textarea.form-control { resize: vertical; min-height: 90px; font-family: inherit; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
  .checkbox-row label { margin: 0; cursor: pointer; font-weight: 500; }

  /* ====== PRO DASHBOARD ====== */
  .dash-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }
  @media (max-width: 900px) { .dash-layout { grid-template-columns: 1fr; } }
  .dash-sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 12px;
  }
  @media (max-width: 900px) {
    .dash-sidebar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      top: auto;
      border-right: none;
      border-top: 1px solid var(--border);
      padding: 4px 4px calc(4px + env(safe-area-inset-bottom));
      gap: 0;
      z-index: 40;
      box-shadow: 0 -2px 8px rgba(0,0,0,.06);
    }
    .dash-content { padding-bottom: 80px !important; }
  }
  .dash-nav { display: flex; flex-direction: column; gap: 2px; }
  @media (max-width: 900px) {
    .dash-nav {
      flex-direction: row;
      flex: 1;
      justify-content: space-around;
      align-items: stretch;
    }
  }
  .dash-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius);
    color: var(--text-2);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
  }
  .dash-nav-item:hover { background: var(--surface-2); color: var(--text); }
  .dash-nav-item.active { background: var(--primary-soft); color: var(--primary); }
  @media (max-width: 900px) {
    /* Bottom nav mobile : 5 items max (4 + bouton Plus), icônes au-dessus */
    .dash-nav-item {
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 10px;
      padding: 8px 4px;
      min-width: 0;
      max-width: 80px;
      border-radius: 10px;
    }
    .dash-nav-item .nav-icon { font-size: 22px; line-height: 1; }
    .dash-nav-item .nav-label {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    /* Item "Plus" : styling spécial */
    .dash-nav-item.more-btn {
      color: var(--text-2);
    }
    .dash-nav-item.more-btn.has-active {
      background: var(--primary-soft);
      color: var(--primary);
    }
    /* Cache les items hors top-5 sur mobile */
    .dash-nav-item.mobile-hidden { display: none; }
    /* Affiche le bouton "Plus" sur mobile */
    .dash-nav-item.more-btn { display: flex !important; }
  }
  /* Sur desktop, le bouton Plus reste caché */
  @media (min-width: 901px) {
    .dash-nav-item.more-btn { display: none !important; }
  }

  /* Switch desktop/mobile sur les labels de navigation pro */
  .nav-label-mobile { display: none; }
  @media (max-width: 900px) {
    .nav-label-desktop { display: none; }
    .nav-label-mobile { display: block; }
  }

  /* ====== BOTTOM SHEET (drawer "Plus" sur mobile) ====== */
  .bottom-sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .bottom-sheet-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }
  .bottom-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    padding: 8px 12px calc(20px + env(safe-area-inset-bottom));
    z-index: 51;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 -8px 32px rgba(0,0,0,.15);
    max-height: 80vh;
    overflow-y: auto;
  }
  .bottom-sheet.open { transform: translateY(0); }
  .bottom-sheet-handle {
    width: 40px; height: 4px;
    background: var(--border-strong);
    border-radius: 2px;
    margin: 8px auto 16px;
  }
  .bottom-sheet-title {
    font-weight: 800;
    font-size: 16px;
    padding: 0 8px 12px;
    color: var(--text);
  }
  .bottom-sheet-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    border-radius: var(--radius);
    color: var(--text);
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    text-decoration: none;
  }
  .bottom-sheet-item:hover, .bottom-sheet-item:active { background: var(--surface-2); }
  .bottom-sheet-item.active { background: var(--primary-soft); color: var(--primary); }
  .bottom-sheet-item .bs-icon { font-size: 22px; }
  .bottom-sheet-item .bs-label { font-size: 15px; }

  .dash-content { padding: 32px; }
  @media (max-width: 640px) { .dash-content { padding: 20px 16px; } }

  /* ====== STATS ====== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .stat-label { font-size: 12px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .stat-value { font-size: 28px; font-weight: 800; margin-top: 8px; letter-spacing: -.02em; }
  .stat-trend { font-size: 12px; color: var(--text-2); margin-top: 4px; }

  /* ====== TABLE ====== */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .table { width: 100%; border-collapse: collapse; }
  .table th, .table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
  .table th { background: var(--surface-2); font-weight: 600; font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--surface-2); }
  @media (max-width: 700px) {
    .table thead { display: none; }
    .table, .table tbody, .table tr, .table td { display: block; }
    .table tr { border-bottom: 1px solid var(--border); padding: 12px 16px; }
    .table tr:last-child { border-bottom: none; }
    .table td { padding: 4px 0; border-bottom: none; }
    .table td::before { content: attr(data-label) ': '; font-weight: 600; color: var(--text-2); font-size: 12px; }
  }

  /* ====== BADGES ====== */
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill-success { background: var(--success-soft); color: var(--success); }
  .pill-warning { background: var(--warning-soft); color: var(--warning); }
  .pill-danger { background: var(--danger-soft); color: var(--danger); }
  .pill-info { background: var(--info-soft); color: var(--info); }
  .pill-neutral { background: var(--surface-2); color: var(--text-2); }

  /* ====== MODAL ====== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: grid;
    place-items: center;
    padding: 20px;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp .22s ease;
  }
  .modal-lg { max-width: 640px; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
  .modal-close { width: 32px; height: 32px; border-radius: var(--radius); display: grid; place-items: center; color: var(--text-2); }
  .modal-close:hover { background: var(--surface-2); color: var(--text); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ====== TOAST ====== */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: calc(100vw - 40px);
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--text-2);
    padding: 12px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 280px;
    animation: slideInRight .22s ease;
    font-size: 14px;
  }
  @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }
  .toast.info { border-left-color: var(--info); }
  .toast-icon { font-size: 18px; }
  @media (max-width: 480px) { .toast-container { left: 20px; right: 20px; } .toast { min-width: 0; } }

  /* ====== LOADER ====== */
  .loader-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: grid;
    place-items: center;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ====== DEMO BADGE (intégré dans le header, ne chevauche plus rien) ====== */
  .demo-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--demo);
    color: white;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  @media (max-width: 480px) {
    .demo-pill { font-size: 10px; padding: 3px 8px; }
    .demo-pill .demo-label { display: none; }
  }

  /* ====== BOAT PRICE (nouvelle organisation : label-prix-unit empilés) ====== */
  .boat-price {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
  }
  .boat-price-stack { display: flex; flex-direction: column; line-height: 1.2; }
  .boat-price-label-top { font-size: 11px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .boat-price-amount { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -.02em; margin: 2px 0; }
  .boat-price-unit { font-size: 11px; color: var(--text-2); font-weight: 500; }

  /* ====== RATING STARS ====== */
  .stars { display: inline-flex; gap: 2px; font-size: 14px; line-height: 1; }
  .stars .star { color: #d1d5db; }
  .stars .star.filled { color: #fbbf24; }
  .stars-input { display: inline-flex; gap: 4px; cursor: pointer; font-size: 28px; }
  .stars-input .star { color: #d1d5db; transition: color .12s; }
  .stars-input .star.filled, .stars-input:hover .star { color: #fbbf24; }
  .stars-input .star:hover ~ .star { color: #d1d5db; }
  .rating-summary { display: flex; align-items: center; gap: 8px; }
  .rating-summary .big-score { font-size: 22px; font-weight: 800; color: var(--text); }
  .rating-summary .count { font-size: 13px; color: var(--text-2); }
  .review-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .review-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .review-author { font-weight: 700; font-size: 14px; }
  .review-date { font-size: 12px; color: var(--text-2); }
  .review-comment { font-size: 14px; color: var(--text); line-height: 1.5; }
  .review-response {
    margin-top: 10px;
    padding: 10px 12px;
    background: white;
    border-left: 3px solid var(--primary);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
  }
  .review-response strong { color: var(--primary); font-size: 12px; }

  /* ====== CANCELLATION POLICIES ====== */
  .policy-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .policy-card {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: all .15s;
    background: var(--surface);
  }
  .policy-card:hover { border-color: var(--primary-light); }
  .policy-card.selected { border-color: var(--primary); background: var(--primary-soft); }
  .policy-card .policy-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .policy-card .policy-desc { font-size: 12px; color: var(--text-2); line-height: 1.4; }

  .policy-info {
    background: var(--info-soft);
    border-left: 3px solid var(--info);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
  }
  .policy-info strong { color: var(--info); }

  /* ====== CHARTS ====== */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .chart-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
  .chart-wrap { height: 220px; position: relative; }
  @media (max-width: 640px) { .chart-wrap { height: 200px; } }

  /* ====== ADVANCED FILTERS (catalogue) ====== */
  .filters-advanced {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .filters-toggle {
    width: 100%;
    background: var(--surface);
    border: none;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background .12s;
  }
  .filters-toggle:hover { background: var(--surface-2); }
  .filters-toggle .arrow { transition: transform .2s; font-size: 12px; color: var(--text-2); }
  .filters-toggle.open .arrow { transform: rotate(180deg); }
  .filters-body {
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .filters-body.open { display: block; }
  .filters-body .filter-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin: 12px 0 6px;
  }
  .price-range-inputs { display: flex; align-items: center; gap: 8px; }
  .price-range-inputs input { padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; outline: none; width: 100%; }
  .price-range-inputs input:focus { border-color: var(--primary); }
  .price-range-inputs .dash { color: var(--text-2); }
  .star-filter { display: inline-flex; gap: 4px; }
  .star-filter .star {
    cursor: pointer;
    font-size: 24px;
    color: #d1d5db;
    transition: color .12s;
  }
  .star-filter .star.filled { color: #fbbf24; }
  .star-filter:hover .star { color: #d1d5db; }
  .star-filter .star:hover, .star-filter .star:hover ~ .star { color: #fbbf24; }
  .chip-filter {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all .12s;
  }
  .chip-filter:hover { border-color: var(--primary-light); background: var(--primary-soft); }
  .chip-filter.active { background: var(--primary); color: white; border-color: var(--primary); }
  .chips-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .active-filters-count {
    background: var(--primary);
    color: white;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    margin-left: 8px;
  }

  /* ====== CALENDRIER AGRÉGÉ PRO ====== */
  .cal-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .cal-toolbar .cal-title { font-size: 20px; font-weight: 700; text-transform: capitalize; }
  .cal-toolbar .cal-nav { display: flex; gap: 8px; align-items: center; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 8px;
  }
  .cal-day-header {
    text-align: center;
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .cal-day {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 6px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }
  .cal-day.muted { opacity: .35; }
  .cal-day.today { background: var(--primary-soft); border: 1px solid var(--primary); }
  .cal-day-number { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 2px; }
  .cal-day.today .cal-day-number { color: var(--primary); }
  .cal-event {
    background: var(--primary);
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.3;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: opacity .12s;
  }
  .cal-event:hover { opacity: .85; }
  .cal-event.cancelled { background: var(--text-2); text-decoration: line-through; opacity: .6; }
  .cal-event.pending { background: var(--warning); }
  .cal-event.completed { background: var(--info); }
  .cal-more { font-size: 10px; color: var(--text-2); padding: 2px 4px; }

  @media (max-width: 720px) {
    .cal-day { min-height: 60px; padding: 4px; }
    .cal-event { font-size: 9px; padding: 1px 4px; }
    .cal-day-header { font-size: 10px; padding: 4px 2px; }
  }

  .cal-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-2);
  }
  .cal-legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  /* ====== ESPACE CLIENT ====== */
  .client-banner {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 28px 24px;
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    text-align: center;
  }
  .client-banner h2 { color: white; font-size: 22px; margin-bottom: 6px; }
  .client-banner p { color: rgba(255,255,255,.85); }

  .res-list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }
  @media (max-width: 580px) { .res-list-item { grid-template-columns: 1fr; } }
  .res-list-actions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
  @media (max-width: 580px) { .res-list-actions { justify-content: flex-start; } }

  /* ====== HEADER NAV — RESPONSIVE BURGER ====== */
  .burger-btn {
    display: none;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    width: 38px;
    height: 38px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    font-size: 18px;
  }
  .burger-btn:hover { background: var(--primary-soft); border-color: var(--primary); }
  .nav-drawer {
    position: fixed;
    top: 60px;
    right: 0;
    width: 260px;
    max-width: calc(100vw - 24px);
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 12px 36px rgba(0,0,0,.15);
    padding: 12px;
    z-index: 70;
    transform: translateX(120%);
    transition: transform .22s ease-out;
  }
  .nav-drawer.open { transform: translateX(-12px); }
  .nav-drawer .nav-drawer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }
  .nav-drawer .nav-drawer-item:hover { background: var(--surface-2); }
  .nav-drawer .nav-drawer-item.active { background: var(--primary-soft); color: var(--primary); }
  .nav-drawer hr { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
  .nav-drawer .nav-drawer-cta {
    background: var(--primary);
    color: white;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
    font-weight: 700;
    margin-top: 6px;
    cursor: pointer;
  }
  .nav-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.25);
    z-index: 65;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s;
  }
  .nav-backdrop.open { opacity: 1; pointer-events: auto; }

  @media (max-width: 720px) {
    .header-nav .header-link,
    .header-nav .btn-secondary,
    .header-nav #installBtn { display: none; }
    .burger-btn { display: inline-flex; }
  }

  /* ====== LANGUAGE SWITCHER ====== */
  .lang-switcher {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-right: 6px;
  }
  .lang-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    transition: all .12s;
  }
  .lang-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* ====== FAVORIS (cœur sur cartes) ====== */
  .fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,.95);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #999;
    transition: all .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
    z-index: 2;
  }
  .fav-btn:hover { transform: scale(1.1); color: #dc2626; }
  .fav-btn.active { color: #dc2626; }
  .fav-btn.active:hover { color: #b91c1c; }
  .boat-img { position: relative; }

  /* ====== STATS PUBLIQUES HOME ====== */
  .public-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin: 28px 0;
  }
  .public-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    text-align: center;
  }
  .public-stat .stat-icon { font-size: 28px; margin-bottom: 6px; }
  .public-stat .stat-big { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -.02em; }
  .public-stat .stat-label { font-size: 13px; color: var(--text-2); margin-top: 4px; }

  /* ====== GALERIE CAROUSEL ====== */
  .gallery-v2 {
    background: var(--surface-2);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .gallery-v2-main {
    position: relative;
    aspect-ratio: 16 / 9;
    background-size: cover;
    background-position: center;
    background-color: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gallery-v2-main .placeholder { font-size: 90px; color: var(--text-2); }
  .gallery-v2-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,.92);
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .12s;
  }
  .gallery-v2-nav:hover { background: white; transform: translateY(-50%) scale(1.08); }
  .gallery-v2-nav.prev { left: 12px; }
  .gallery-v2-nav.next { right: 12px; }
  .gallery-v2-count {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,.65);
    color: white;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .gallery-v2-thumbs {
    display: flex;
    gap: 6px;
    padding: 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .gallery-v2-thumb {
    flex: 0 0 80px;
    height: 60px;
    background-size: cover;
    background-position: center;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 2px solid transparent;
    background-color: var(--surface);
    transition: border-color .12s, opacity .12s;
    opacity: .7;
  }
  .gallery-v2-thumb:hover { opacity: 1; }
  .gallery-v2-thumb.active { border-color: var(--primary); opacity: 1; }

  /* ====== MULTI-DAY BOOKING ====== */
  .multiday-toggle {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .multiday-toggle input[type=checkbox] { width: 18px; height: 18px; }
  .multiday-toggle label { font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; }
  .multiday-fields { display: none; }
  .multiday-fields.open { display: block; }
  .discount-grid {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    gap: 8px;
    align-items: center;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
  }

function getLang() {
  try { return localStorage.getItem('tk_lang') || 'fr'; } catch { return 'fr'; }
}
function setLang(l) {
  try { localStorage.setItem('tk_lang', l); } catch {}
  render();
}
function t(key) {
  const lang = getLang();
  return (I18N[lang] && I18N[lang][key]) || I18N.fr[key] || key;
}

/* ============================================================
   FAVORIS (stockés en localStorage côté client, pas de backend)
   ============================================================ */
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('tk_favorites') || '[]'); } catch { return []; }
}
function isFav(boatId) { return getFavorites().includes(boatId); }
function toggleFav(boatId, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  const favs = getFavorites();
  const idx = favs.indexOf(boatId);
  if (idx === -1) {
    favs.push(boatId);
    toast(getLang() === 'fr' ? 'Ajouté à vos favoris ❤️' : getLang() === 'en' ? 'Added to favorites ❤️' : 'Ajouté an favori ❤️', 'success');
  } else {
    favs.splice(idx, 1);
  }
  try { localStorage.setItem('tk_favorites', JSON.stringify(favs)); } catch {}
  // Met à jour le cœur visuellement sans re-render complet
  document.querySelectorAll(`[data-fav="${boatId}"]`).forEach(el => {
    el.classList.toggle('active', favs.includes(boatId));
    el.innerHTML = favs.includes(boatId) ? '❤️' : '🤍';
  });
}

/* Palette de couleurs distinctes pour le calendrier agrégé (par bateau) */
const CAL_PALETTE = [
  '#0e6e6e', '#0d9488', '#c2410c', '#7c3aed', '#db2777',
  '#0284c7', '#16a34a', '#ca8a04', '#dc2626', '#4338ca',
  '#0891b2', '#65a30d'
];
function getBoatColor(boatId) {
  if (!boatId) return CAL_PALETTE[0];
  let h = 0;
  for (let i = 0; i < boatId.length; i++) h = (h * 31 + boatId.charCodeAt(i)) | 0;
  return CAL_PALETTE[Math.abs(h) % CAL_PALETTE.length];
}

/* Règle métier : sur une même date, on peut cumuler une demi-journée
   (matin) ET un coucher de soleil (soir) car ces créneaux ne se
   chevauchent pas. Une "journée complète" bloque tout, et deux
   créneaux identiques sont évidemment incompatibles. */
function isSlotCompatible(takenTypes, newType) {
  if (takenTypes.includes('day')) return false;
  if (newType === 'day' && takenTypes.length > 0) return false;
  if (takenTypes.includes(newType)) return false;
  return true;
}

function getAvailableDurations(dateISO, bookings, boat) {
  const takenOnDate = bookings.filter(b => b.startDate === dateISO).map(b => b.durationType);
  let candidates = DURATIONS.filter(d => isSlotCompatible(takenOnDate, d.id));
  if (boat) {
    const b = normalizeBoatPricing(boat);
    candidates = candidates.filter(d => b.availableSlots.includes(d.id));
  }
  return candidates.map(d => d.id);
}

function getTakenSlotsOnDate(dateISO, bookings) {
  return bookings.filter(b => b.startDate === dateISO).map(b => b.durationType);
}

function isDateFullyBooked(dateISO, bookings) {
  return getAvailableDurations(dateISO, bookings).length === 0;
}

/* Migration & helpers de tarification par créneau. Un bateau peut avoir :
   - prices: { halfday, day, sunset } → prix explicites par créneau
   - availableSlots: ['halfday', 'day', 'sunset'] → créneaux activés
   Pour les bateaux qui n'ont pas encore ces champs (ex: anciennes données),
   on les calcule depuis pricePerDay × facteur. */
function normalizeBoatPricing(boat) {
  if (!boat) return boat;
  const basePrice = Number(boat.pricePerDay) || 500;
  const fallback = {
    halfday: Math.round(basePrice * 0.6),
    day: basePrice,
    sunset: Math.round(basePrice * 0.45)
  };
  const prices = { ...fallback, ...(boat.prices || {}) };
  const availableSlots = Array.isArray(boat.availableSlots) && boat.availableSlots.length
    ? boat.availableSlots.filter(s => DURATIONS.find(d => d.id === s))
    : ['halfday', 'day', 'sunset'];
  return { ...boat, prices, availableSlots, pricePerDay: prices.day };
}

function getBoatSlotPrice(boat, slotId) {
  const b = normalizeBoatPricing(boat);
  return b.prices[slotId] ?? Math.round((b.pricePerDay || 500) * (DURATIONS.find(d => d.id === slotId)?.factor || 1));
}

function getBoatStartingPrice(boat) {
  const b = normalizeBoatPricing(boat);
  const offered = b.availableSlots.map(s => b.prices[s]).filter(p => p > 0);
  return offered.length ? Math.min(...offered) : (b.pricePerDay || 0);
}

function isSlotOfferedByBoat(boat, slotId) {
  const b = normalizeBoatPricing(boat);
  return b.availableSlots.includes(slotId);
}

const CANCELLATION_POLICIES = [
  {
    id: 'flexible',
    label: 'Flexible',

    description: 'Remboursement intégral si vous annulez au moins 24h avant le départ. Au-delà, aucun remboursement.',

  },

    description: 'Remboursement intégral à 7+ jours du départ. 50% entre 7 jours et 24h. Aucun remboursement à moins de 24h.',
    rules: [{ daysBefore: 7, refundPct: 100 }, { daysBefore: 1, refundPct: 50 }]
  },
  {
    id: 'strict',
    label: 'Stricte',
    short: '50% jusqu\'à 14 jours, sinon rien',
    description: 'Remboursement 50% à 14+ jours du départ. Aucun remboursement à moins de 14 jours.',
    rules: [{ daysBefore: 14, refundPct: 50 }]
  }
];

function calculateRefund(reservation, policyId, cancellationDate) {
  const startDate = new Date(reservation.startDate + 'T00:00:00');
  const cancelDate = cancellationDate ? new Date(cancellationDate) : new Date();
  const daysBefore = Math.floor((startDate - cancelDate) / 86400000);
  const policy = CANCELLATION_POLICIES.find(p => p.id === policyId) || CANCELLATION_POLICIES[1];
  const applicable = policy.rules.filter(r => daysBefore >= r.daysBefore).sort((a, b) => b.refundPct - a.refundPct);
  const pct = applicable[0]?.refundPct || 0;
  return { amount: Math.round((reservation.totalPrice || 0) * pct / 100), pct, daysBefore };
}

function getBoatCancellationPolicy(boat) {
  return CANCELLATION_POLICIES.find(p => p.id === (boat?.cancellationPolicy || 'moderate')) || CANCELLATION_POLICIES[1];
}

/* ---------- AVIS / REVIEWS ---------- */
function renderStars(avg, sizePx = 14) {
  const full = Math.round((avg || 0) * 2) / 2;
  let html = '<span class="stars" style="font-size:' + sizePx + 'px">';
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(full)) html += '<span class="star filled">★</span>';
    else if (i - 0.5 === full) html += '<span class="star filled">★</span>';
    else html += '<span class="star">★</span>';
  }
  html += '</span>';
  return html;
}

function getBoatReviewsSummary(boatId) {
  const reviews = state.reviews.filter(r => r.boatId === boatId);
  if (!reviews.length) return { count: 0, avg: 0 };
  const sum = reviews.reduce((s, r) => s + (r.rating || 0), 0);
  return { count: reviews.length, avg: sum / reviews.length };
}

/* ---------- LIENS DE PAIEMENT PAR CRÉNEAU ---------- */
function getBoatPaymentLink(boat, slotId) {
  if (!boat) return '';
  if (boat.paymentLinks && typeof boat.paymentLinks === 'object') {
    return boat.paymentLinks[slotId] || '';
  }
  // Rétrocompatibilité : l'ancien champ paymentLink unique s'applique à tous les créneaux
  return boat.paymentLink || '';
}

function boatHasAnyPaymentLink(boat) {
  if (!boat) return false;
  if (boat.paymentLinks) return Object.values(boat.paymentLinks).some(v => v && v.length > 0);
  return !!boat.paymentLink;
}

/* ---------- MULTI-JOUR ---------- */
function getBoatMultiDay(boat) {
  // Retourne la config multi-jour avec valeurs par défaut
  const m = boat?.multiDay || {};
  return {
    enabled: !!m.enabled,
    minDays: Math.max(2, Number(m.minDays) || 2),
    maxDays: Math.min(30, Number(m.maxDays) || 14),
    discount3plus: Math.max(0, Math.min(50, Number(m.discount3plus) || 10)), // % pour 3+ jours
    discount7plus: Math.max(0, Math.min(50, Number(m.discount7plus) || 20))  // % pour 7+ jours
  };
}

function calcMultiDayPrice(boat, days) {
  // Calcul du prix total pour `days` jours avec remises dégressives
  const dailyPrice = getBoatSlotPrice(boat, 'day');
  const md = getBoatMultiDay(boat);
  let discountPct = 0;
  if (days >= 7) discountPct = md.discount7plus;
  else if (days >= 3) discountPct = md.discount3plus;
  const subtotal = dailyPrice * days;
  const discount = Math.round(subtotal * discountPct / 100);
  return {
    dailyPrice,
    days,
    subtotal,
    discountPct,
    discount,
    total: subtotal - discount
  };
}

function daysBetween(start, end) {
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  return Math.round((e - s) / 86400000) + 1; // inclusif
}

/* ---------- NETWORK ---------- */
async function syncToBackend(action, data) {
  if (state.mode === 'demo') {
    log('demo no-op', action);
    return { success: true, demo: true };
  }
  if (LOCAL_MODE) {
    log('[localBackend]', action);
    await sleep(120); // simule la latence réseau
    return localBackend.handle(action, data);
  }
  const delays = [300, 800, 2000];
  let lastErr = null;
  for (let i = 0; i < delays.length; i++) {
    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        body: JSON.stringify({ action, data }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      return json;
    } catch (e) {
      lastErr = e;
      log('retry', i + 1, e.message);
      if (i < delays.length - 1) await sleep(delays[i]);
    }
  }
  throw lastErr;
}
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  createReservation(data) {
    // Vérifie qu'aucun conflit de créneau n'existe pour cette date
    const existing = this._read('reservations')
      .filter(r => r.boatId === data.boatId && r.startDate === data.startDate)
      .filter(r => r.status === 'confirmed' || r.status === 'pending')

function activateDemo() {
  state.mode = 'demo';
  loadDemoData();
  // Connecte le premier pro fictif pour l'expérience complète
  const firstPro = state.demoSnapshot.pros[0];
  state.currentUser = {
    type: 'pro', id: firstPro.id, name: firstPro.name, company: firstPro.company,
    email: firstPro.email, phone: firstPro.phone,
    plan: firstPro.plan || 'free',
    verificationStatus: firstPro.verificationStatus || 'not_started',
    verifiedAt: firstPro.verifiedAt,
    verificationDocs: firstPro.verificationDocs || {}
  };
  state.myBoats = state.demoSnapshot.boats.filter(b => b.proId === firstPro.id);
  closeModal();
  audit('demo_activated');
  toast('Mode démonstration activé. Toutes les fonctionnalités sont accessibles.', 'success');
  navigate('/pro/dashboard');
}

function resetDemo() {
  if (state.mode !== 'demo') return;
  loadDemoData();
  const firstPro = state.demoSnapshot.pros[0];
  state.currentUser = { type: 'pro', id: firstPro.id, name: firstPro.name, company: firstPro.company, email: firstPro.email, phone: firstPro.phone };
  state.myBoats = state.demoSnapshot.boats.filter(b => b.proId === firstPro.id);
  toast('Données de démonstration réinitialisées', 'info');
  render();
}

function logout() {
  if (state.mode === 'demo') {
    state.mode = 'real';
    state.demoSnapshot = null;
    state.boats = [];
    state.reservations = [];
    state.myBoats = [];
    state.reviews = [];
  }
  state.currentUser = null;
  audit('logout');
  navigate('/');
  toast('Déconnecté', 'info');
}

/* ---------- API CALLS (avec fallback demo) ---------- */
async function fetchPublicBoats() {
  if (state.mode === 'demo') { state.boats = state.boats.map(normalizeBoatPricing); return state.boats; }
  try {
    const cached = cache.get('public_boats');
    if (cached) state.boats = cached.map(normalizeBoatPricing);
    const res = await syncToBackend('listBoats', {});
    if (res?.success && res.data) {
      state.boats = res.data.map(normalizeBoatPricing);
      cache.set('public_boats', state.boats);
    }
    return state.boats;
  } catch (e) {
    log('fetchPublicBoats fail', e);
    return (cache.get('public_boats') || []).map(normalizeBoatPricing);
  }
}

async function fetchMyBoats() {
  if (state.mode === 'demo') { state.myBoats = state.myBoats.map(normalizeBoatPricing); return state.myBoats; }
  try {
    const res = await syncToBackend('listBoatsForPro', { proId: state.currentUser.id });
    if (res?.success) state.myBoats = (res.data || []).map(normalizeBoatPricing);
    return state.myBoats;
  } catch (e) { log('fetchMyBoats fail', e); return state.myBoats; }
}

async function fetchMyReservations() {
  if (state.mode === 'demo') {
    return state.reservations.filter(r => r.proId === state.currentUser.id);
  }
  try {
    const res = await syncToBackend('listReservationsForPro', { proId: state.currentUser.id });
    if (res?.success) state.reservations = res.data || [];
    return state.reservations;
  } catch (e) { log('fetchMyReservations fail', e); return state.reservations; }
}

function renderNavDrawer(links, isPro, langSwitcher) {
  // Crée le drawer s'il n'existe pas déjà
  let drawer = document.getElementById('navDrawer');
  let backdrop = document.getElementById('navBackdrop');
  if (!drawer) {
    drawer = document.createElement('div');
    drawer.id = 'navDrawer';
    drawer.className = 'nav-drawer';
    document.body.appendChild(drawer);
  }
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.id = 'navBackdrop';
    backdrop.className = 'nav-backdrop';
    backdrop.onclick = () => toggleNavDrawer(false);
    document.body.appendChild(backdrop);
  }
  drawer.innerHTML = `
    <div style="padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size: 12px; color: var(--text-2); font-weight: 600;">${getLang() === 'fr' ? 'Langue' : getLang() === 'en' ? 'Language' : 'Lang'}</span>
      ${langSwitcher}
    </div>
    <hr>
    ${links.map(l => `<a class="nav-drawer-item ${(l.active ?? (state.view === l.path)) ? 'active' : ''}" onclick="toggleNavDrawer(false); navigate('${l.path}')"><span>${l.icon}</span><span>${l.label}</span></a>`).join('')}
    <hr>
    <div class="nav-drawer-item" onclick="toggleNavDrawer(false); installPWA()"><span>📱</span><span>${t('nav_install')}</span></div>
    <div class="nav-drawer-cta" onclick="toggleNavDrawer(false); ${isPro ? 'logout()' : 'openAuthModal()'}">
      ${isPro ? t('nav_disconnect') : t('nav_pro')}
    </div>
  `;
}

function toggleNavDrawer(force) {
  const drawer = document.getElementById('navDrawer');
  const backdrop = document.getElementById('navBackdrop');
  if (!drawer || !backdrop) return;
  const isOpen = drawer.classList.contains('open');
  const open = typeof force === 'boolean' ? force : !isOpen;
  drawer.classList.toggle('open', open);
  backdrop.classList.toggle('open', open);
}

function render() {
  const main = document.getElementById('main');
  const nav = document.getElementById('headerNav');
  document.body.classList.toggle('in-pro', state.view.startsWith('/pro/') && state.currentUser);

  // Pill démo intégré au header (à côté du logo)
  const existingPill = document.getElementById('demoPillHeader');
  if (state.mode === 'demo') {
    if (!existingPill) {
      const pill = document.createElement('span');
      pill.id = 'demoPillHeader';
      pill.className = 'demo-pill';
      pill.innerHTML = '<span>🎭</span><span class="demo-label">MODE DÉMO</span>';
      const logo = document.querySelector('.header-inner .logo');
      if (logo && logo.parentNode) logo.parentNode.insertBefore(pill, logo.nextSibling);
    }
  } else if (existingPill) {
    existingPill.remove();
  }

  // Nav
  const isPro = state.currentUser?.type === 'pro';
  const lang = getLang();

  // Liens principaux (mêmes pour desktop et drawer mobile)
  const links = isPro ? [
    { label: t('nav_catalog'), path: '/', icon: '⛵' },
    { label: t('nav_pro'), path: '/pro/dashboard', icon: '📊', active: state.view.startsWith('/pro/') },
  ] : [
    { label: t('nav_catalog'), path: '/', icon: '⛵' },
    { label: t('nav_reservations'), path: '/client', icon: '🎫', active: state.view.startsWith('/client') },
  ];

  // Sélecteur de langue (compact)
  const langSwitcher = `
    <span class="lang-switcher">
      <button class="lang-btn ${lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')" title="Français">FR</button>
      <button class="lang-btn ${lang === 'en' ? 'active' : ''}" onclick="setLang('en')" title="English">EN</button>
      <button class="lang-btn ${lang === 'cr' ? 'active' : ''}" onclick="setLang('cr')" title="Kréyòl">CR</button>
    </span>
  `;

  // Nav desktop (cachée en CSS sous 720px)
  nav.innerHTML = `
    ${langSwitcher}
    <button class="btn btn-ghost btn-sm" id="installBtn" onclick="installPWA()">${t('nav_install')}</button>
    ${links.map(l => `<a class="header-link ${(l.active ?? (state.view === l.path)) ? 'active' : ''}" onclick="navigate('${l.path}')">${l.label}</a>`).join('')}
    ${isPro
      ? `<button class="btn btn-secondary btn-sm" onclick="logout()">${t('nav_disconnect')}</button>`
      : `<button class="btn btn-secondary btn-sm" onclick="openAuthModal()">${t('nav_pro')}</button>`}
    <button class="burger-btn" onclick="toggleNavDrawer()" aria-label="Menu">☰</button>
  `;

  // Drawer mobile (overlay glissant)
  renderNavDrawer(links, isPro, langSwitcher);

  // Affiche le bouton "Installer" UNIQUEMENT si la PWA n'est pas déjà installée
  try {
    const installed =
      (window.matchMedia && (window.matchMedia('(display-mode: standalone)').matches || window.matchMedia('(display-mode: minimal-ui)').matches))
      || window.navigator.standalone === true
      || localStorage.getItem('tk_pwa_installed') === '1';
    const btn = document.getElementById('installBtn');
    if (btn) {
      if (installed) btn.classList.remove('visible');
      else if (_pwaDeferredPrompt) btn.classList.add('visible');
    }
  } catch {}

  // Route
  const path = state.view;
  if (path === '/' || path === '') return viewHome();
  if (path === '/pricing') return viewPricing();
  if (path === '/admin') return viewAdmin();
  if (path.startsWith('/boat/')) return viewBoatDetail(path.split('/')[2]);
  if (path === '/client') return viewClientReservations();
  if (path.startsWith('/client/r/')) return viewClientReservationByToken(path.split('/')[3]);
  if (path === '/pro/dashboard') return viewProDashboard();
  if (path === '/pro/boats') return viewProBoats();
  if (path === '/pro/boats/new') return viewBoatForm();
  if (path.startsWith('/pro/boats/edit/')) return viewBoatForm(path.split('/')[4]);
  if (path === '/pro/reservations') return viewProReservations();
  if (path === '/pro/calendar') return viewProCalendar();
  if (path === '/pro/reviews') return viewProReviews();
  if (path === '/pro/billing') return viewProBilling();
  if (path === '/pro/verify') return viewProVerification();
  if (path === '/pro/profile') return viewProProfile();
  viewHome();
}

function toggleFavoritesFilter() {
  state.filters.favoritesOnly = !state.filters.favoritesOnly;
  render();
}

function toggleAdvancedFilters() {
  state.filters.showAdvanced = !state.filters.showAdvanced;
  const btn = document.querySelector('.filters-toggle');
  const body = document.getElementById('advancedFiltersBody');
  if (btn) btn.classList.toggle('open', state.filters.showAdvanced);
  if (body) body.classList.toggle('open', state.filters.showAdvanced);
}

function countActiveAdvancedFilters() {
  const f = state.filters;
  let n = 0;
  if (f.priceMin) n++;
  if (f.priceMax) n++;
  if (f.minRating > 0) n++;
  if (f.equipment.length) n += f.equipment.length;
  if (f.slots.length) n += f.slots.length;
  return n;
}

function onAdvancedFilterChange() {
  state.filters.priceMin = document.getElementById('filterPriceMin')?.value || '';
  state.filters.priceMax = document.getElementById('filterPriceMax')?.value || '';
  renderBoatGrid();
  // Met à jour le compteur dans le toggle
  const toggle = document.querySelector('.filters-toggle');
  if (toggle) {
    const count = countActiveAdvancedFilters();
    toggle.querySelector('span').innerHTML = `🎯 Filtres avancés ${count > 0 ? `<span class="active-filters-count">${count}</span>` : ''}`;
  }
}

function setMinRating(n) {
  state.filters.minRating = state.filters.minRating === n ? 0 : n;
  // Re-render seulement la zone des étoiles + résultats
  const wrap = document.getElementById('filterStars');
  if (wrap) {
    wrap.innerHTML = `
      ${[1,2,3,4,5].map(i => `<span class="star ${i <= state.filters.minRating ? 'filled' : ''}" onclick="setMinRating(${i})">★</span>`).join('')}
      ${state.filters.minRating > 0 ? `<button class="btn btn-ghost btn-sm" onclick="setMinRating(0)" style="margin-left:8px;">Effacer</button>` : ''}
    `;
  }
  renderBoatGrid();
  onAdvancedFilterChange();
}

function toggleSlotFilter(slotId) {
  const idx = state.filters.slots.indexOf(slotId);
  if (idx === -1) state.filters.slots.push(slotId);
  else state.filters.slots.splice(idx, 1);
  // Met à jour le chip
  document.querySelectorAll('.chips-row .chip-filter').forEach(c => {
    if (c.textContent.trim().endsWith(DURATIONS.find(d => d.id === slotId)?.shortLabel || '')) {
      c.classList.toggle('active', state.filters.slots.includes(slotId));
    }
  });
  renderBoatGrid();
  onAdvancedFilterChange();
}

function toggleEquipFilter(equip) {
  const e = equip.replace(/&#39;/g, "'");
  const idx = state.filters.equipment.indexOf(e);
  if (idx === -1) state.filters.equipment.push(e);
  else state.filters.equipment.splice(idx, 1);
  renderBoatGrid();
  // Refresh chips et compteur
  const body = document.getElementById('advancedFiltersBody');
  if (body) {
    // Trouver et basculer la classe sur le chip
    body.querySelectorAll('.chip-filter').forEach(c => {
      const txt = c.textContent.trim();
      if (txt === e) c.classList.toggle('active', state.filters.equipment.includes(e));
    });
  }
  onAdvancedFilterChange();
}

function renderBoatGrid() {
  const grid = document.getElementById('boatGrid');
  if (!grid) return;
  const f = state.filters;
  let list = state.boats.filter(b => b.status === 'active');
  if (f.location) list = list.filter(b => b.location === f.location);
  if (f.type) list = list.filter(b => b.type === f.type);
  if (f.capacity) list = list.filter(b => Number(b.capacity) >= Number(f.capacity));
  // Filtres avancés
  if (f.priceMin) list = list.filter(b => getBoatStartingPrice(b) >= Number(f.priceMin));
  if (f.priceMax) list = list.filter(b => getBoatStartingPrice(b) <= Number(f.priceMax));
  if (f.minRating > 0) list = list.filter(b => getBoatReviewsSummary(b.id).avg >= f.minRating);
  if (f.slots.length) list = list.filter(b => {
    const nb = normalizeBoatPricing(b);
    return f.slots.some(s => nb.availableSlots.includes(s));
  });
  if (f.equipment.length) list = list.filter(b => {
    return f.equipment.every(e => {
      if (e === 'Skipper inclus') return !!b.withSkipper;
      return (b.equipment || []).indexOf(e) !== -1;
    });
  });
  if (f.favoritesOnly) {
    const favs = getFavorites();
    list = list.filter(b => favs.includes(b.id));
  }

  // Affiche le compteur de résultats
  const counter = document.getElementById('filterResultCount');
  if (counter) counter.textContent = `${list.length} ${t('filter_result_count')}`;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⛵</div><h3>${t('filter_no_match')}</h3><p>${t('filter_no_match_sub')}</p></div>`;
    return;
  }

  // Tri : Premium d'abord, Pro ensuite, Free à la fin (mise en avant payante)
  list.sort((a, b) => {
    const planRank = { premium: 0, pro: 1, free: 2 };
    const ra = planRank[a.proPlan] ?? 2;
    const rb = planRank[b.proPlan] ?? 2;
    if (ra !== rb) return ra - rb;
    // En cas d'égalité, les pros vérifiés passent devant
    if ((b.proVerified ? 1 : 0) !== (a.proVerified ? 1 : 0)) return (b.proVerified ? 1 : 0) - (a.proVerified ? 1 : 0);
    return 0;
  });

  grid.innerHTML = `<div class="grid">${list.map(b => {
    const startPrice = getBoatStartingPrice(b);
    const dayPrice = getBoatSlotPrice(b, 'day');
    const showFrom = startPrice < dayPrice;
    const reviews = getBoatReviewsSummary(b.id);
    const fav = isFav(b.id);
    const proBadges = `
      ${b.proVerified ? '<span class="pro-badge verified">🛟 Pro Vérifié</span>' : ''}
      ${b.proPlan === 'premium' ? '<span class="pro-badge featured">🚀 Premium</span>' : ''}
    `;
    return `
    <div class="boat-card" onclick="navigate('/boat/${b.id}')">
      <div class="boat-img" ${b.images?.[0] ? `style="background-image: url('${escapeHtml(b.images[0])}')"` : ''}>
        ${!b.images?.[0] ? `<div class="boat-img-placeholder">⛵</div>` : ''}
        <span class="boat-badge">${escapeHtml(b.type)}</span>
        <button class="fav-btn ${fav ? 'active' : ''}" data-fav="${b.id}" onclick="toggleFav('${b.id}', event)" aria-label="Favori">${fav ? '❤️' : '🤍'}</button>
      </div>
      <div class="boat-body">
        ${b.proVerified || b.proPlan === 'premium' ? `<div class="pro-badges mb-1">${proBadges}</div>` : ''}
        <div class="boat-title">${escapeHtml(b.name)}</div>
        <div class="boat-location">📍 ${escapeHtml(b.location)}</div>
        <div class="boat-meta">
          <span>👥 ${b.capacity} ${t('card_persons')}</span>
          ${b.withSkipper ? `<span>👨‍✈️ ${t('card_skipper')}</span>` : ''}
          ${reviews.count > 0 ? `<span>${renderStars(reviews.avg, 12)} <span style="color: var(--text-2);">(${reviews.count})</span></span>` : ''}
        </div>
        <div class="boat-price">
          <div class="boat-price-stack">
            ${showFrom ? `<span class="boat-price-label-top">${t('card_from')}</span>` : ''}
            <span class="boat-price-amount">${fmtEUR(startPrice)}</span>
            <span class="boat-price-unit">${t('card_per_outing')}</span>
          </div>
          <span class="pill pill-info">${t('card_see')}</span>
        </div>
      </div>
    </div>
    `;
  }).join('')}</div>`;
}

function applyFiltersFromHero() {
  state.filters.location = document.getElementById('searchLoc').value;
  state.filters.type = document.getElementById('searchType').value;
  document.getElementById('filterLoc').value = state.filters.location;
  document.getElementById('filterType').value = state.filters.type;

function onFilterChange() {

function resetFilters() {
  state.filters = {
    location: '', type: '', capacity: '',
    priceMin: '', priceMax: '', minRating: 0,
    equipment: [], slots: [], showAdvanced: state.filters.showAdvanced
  };
  render();
}

let _currentBookings = []; // cache des réservations du bateau en cours
let _currentBoatId = null;

async function viewBoatDetail(id) {
  const main = document.getElementById('main');
  await fetchPublicBoats();
  let boat = state.boats.find(b => b.id === id);
  if (!boat) {
    main.innerHTML = `<div class="container"><div class="empty-state"><div class="empty-state-icon">❓</div><h3>Bateau introuvable</h3><p><a onclick="navigate('/')">← Retour au catalogue</a></p></div></div>`;
    return;
  }
  boat = normalizeBoatPricing(boat);

  // Récupère les créneaux déjà réservés (confirmés + en attente)
  let bookings = [];
  if (state.mode === 'demo') {
    bookings = state.reservations
      .filter(r => r.boatId === id && ['confirmed', 'pending'].includes(r.status))
      .map(r => ({ startDate: r.startDate, durationType: r.durationType }));
  } else {
    try {
      const res = await syncToBackend('getBoatBookings', { boatId: id });
      if (res?.success) bookings = res.data || [];
    } catch (e) { log('bookings fail', e); }
  }
  _currentBookings = bookings;
  _currentBoatId = id;

  // Charge les avis pour ce bateau
  if (state.mode !== 'demo') {
    try {
      const res = await syncToBackend('listReviewsForBoat', { boatId: id });
      if (res?.success) {
        // Mise à jour locale des reviews de ce bateau dans state.reviews
        state.reviews = state.reviews.filter(r => r.boatId !== id).concat(res.data || []);

    if (!input || typeof flatpickr === 'undefined') return;
    flatpickr(input, {
      locale: 'fr',
      minDate: 'today',
      maxDate: new Date().fp_incr(365),
      dateFormat: 'Y-m-d',
      altInput: true,
      altFormat: 'l j F Y',
      disable: fullyBookedDates,
      disableMobile: false,
      onDayCreate: (dObj, dStr, fp, dayElem) => {
        try {
          const d = dayElem.dateObj;
          const iso = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          if (partiallyBookedDates.includes(iso)) dayElem.classList.add('bk-partial');
        } catch {}
      },
      onChange: (selectedDates, dateStr) => {
        refreshDurationOptions(boat.id, dateStr);
        renderDateInfoLine(dateStr);
      }
    });
  }, 50);
}

async function submitReview(boatId) {
  const rating = _reviewRating;
  const clientName = document.getElementById('revName').value.trim();
  const comment = document.getElementById('revComment').value.trim();
  const reservationId = document.getElementById('revResId')?.value.trim() || '';

  const review = { id: uid(), boatId, reservationId, clientName, rating, comment, response: '', createdAt: new Date().toISOString() };

      state.reviews.unshift(review);

      const res = await syncToBackend('createReview', review);

function updateBookingPriceV2() {
  const boat = state.boats.find(b => b.id === _currentBoatId);
  if (!boat) return;
  const btn = document.getElementById('submitResBtn');
  const hint = document.getElementById('submitResHint');
  const detail = document.getElementById('bookingDetail');
  const totalEl = document.getElementById('bookingTotalAmount');

  const multiCb = document.getElementById('resMultiDay');
  const isMulti = multiCb?.checked;

  if (isMulti) {
    const start = document.getElementById('resDate')?.value;
    const end = document.getElementById('resEndDate')?.value;
    if (!start || !end) {
      totalEl.textContent = '—';
      if (detail) detail.textContent = '';
      if (btn) btn.innerHTML = t('booking_book');
      if (hint) hint.textContent = t('booking_select_slot');
      return;
    }
    const days = daysBetween(start, end);
    if (days < 2) {
      totalEl.textContent = '—';
      if (detail) detail.textContent = 'La date de fin doit être après la date de début.';
      return;
    }
    const md = getBoatMultiDay(boat);
    if (days < md.minDays || days > md.maxDays) {
      totalEl.textContent = '—';
      if (detail) detail.textContent = `Réservation multi-jours de ${md.minDays} à ${md.maxDays} jours.`;
      return;
    }
    const calc = calcMultiDayPrice(boat, days);
    totalEl.textContent = fmtEUR(calc.total);
    if (detail) {
      detail.innerHTML = `${days} jours × ${fmtEUR(calc.dailyPrice)} = ${fmtEUR(calc.subtotal)}` +
        (calc.discountPct > 0 ? ` <br>− ${calc.discountPct}% remise multi-jours (${fmtEUR(calc.discount)})` : '');
    }
    // Pour multi-jours, pas de lien de paiement direct (le pro doit calculer manuellement)
    if (btn) btn.innerHTML = t('booking_book');
    if (hint) hint.textContent = 'Le propriétaire validera la disponibilité sur toute la plage';
    return;
  }

  // Mode classique : un seul créneau
  const sel = document.getElementById('resDuration');
  const slotId = sel?.value;
  if (!slotId) {
    totalEl.textContent = '—';
    if (detail) detail.textContent = '';
    if (btn) btn.innerHTML = t('booking_book');
    if (hint) hint.textContent = t('booking_select_slot');
    return;
  }
  const price = getBoatSlotPrice(boat, slotId);
  totalEl.textContent = fmtEUR(price);
  if (detail) detail.textContent = '';
  const hasPay = !!getBoatPaymentLink(boat, slotId);
  if (btn) btn.innerHTML = hasPay ? t('booking_book_pay') : t('booking_book');
  if (hint) hint.textContent = hasPay ? 'Paiement sécurisé en ligne après confirmation' : 'Le propriétaire vous contactera pour le paiement';
}

function renderAvailabilityHint(fullyBooked, partiallyBooked) {
  if (fullyBooked === 0 && partiallyBooked === 0) {
    return `<div class="dates-info dates-info-empty"><span>✓</span><span>Toutes les dates sont entièrement disponibles</span></div>`;
  }
  const parts = [];
  if (fullyBooked > 0) parts.push(`${fullyBooked} date${fullyBooked > 1 ? 's' : ''} complète${fullyBooked > 1 ? 's' : ''}`);
  if (partiallyBooked > 0) parts.push(`${partiallyBooked} date${partiallyBooked > 1 ? 's' : ''} partiellement réservée${partiallyBooked > 1 ? 's' : ''}`);
  return `<div class="dates-info"><span>📅</span><span>${parts.join(' · ')}. Choisissez votre date pour voir les créneaux libres.</span></div>`;
}

function refreshDurationOptions(boatId, dateISO) {
  const boat = state.boats.find(b => b.id === boatId);
  const select = document.getElementById('resDuration');
  if (!boat || !select) return;
  const prevValue = select.value;

  // Tient compte à la fois des créneaux offerts par le bateau ET des conflits du jour
  const availIds = dateISO
    ? getAvailableDurations(dateISO, _currentBookings, boat)
    : DURATIONS.filter(d => isSlotOfferedByBoat(boat, d.id)).map(d => d.id);

  if (availIds.length === 0) {
    select.innerHTML = '<option value="">Aucun créneau disponible ce jour</option>';
    select.disabled = true;
    document.getElementById('bookingTotalAmount').textContent = '—';
    return;
  }

  select.disabled = false;
  select.innerHTML = availIds.map(id => {
    const d = DURATIONS.find(x => x.id === id);
    const price = getBoatSlotPrice(boat, id);
    return `<option value="${d.id}">${d.label} — ${fmtEUR(price)}</option>`;
  }).join('');

  // Restaure la valeur si elle est toujours dispo
  if (availIds.includes(prevValue)) select.value = prevValue;
  updateBookingPriceV2();
}

function renderDateInfoLine(dateISO) {
  const wrap = document.getElementById('dateInfoLine');
  if (!wrap) return;
  if (!dateISO) { wrap.innerHTML = '<div class="help">Les dates barrées sont entièrement réservées.</div>'; return; }

  const boat = state.boats.find(b => b.id === _currentBoatId);
  const taken = getTakenSlotsOnDate(dateISO, _currentBookings);
  const avail = getAvailableDurations(dateISO, _currentBookings, boat);

  if (taken.length === 0) {
    wrap.innerHTML = `<div class="help" style="color: var(--success); font-weight: 600;">✓ Tous les créneaux sont libres ce jour</div>`;
    return;
  }
  if (avail.length === 0) {
    wrap.innerHTML = `<div class="help" style="color: var(--danger); font-weight: 600;">✕ Aucun créneau disponible ce jour</div>`;
    return;
  }
  const takenLabels = taken.map(id => DURATIONS.find(d => d.id === id)?.shortLabel || id);
  const availLabels = avail.map(id => DURATIONS.find(d => d.id === id)?.shortLabel || id);
  wrap.innerHTML = `<div class="help" style="color: #92400e;">⚠️ Déjà pris : <strong>${takenLabels.join(', ')}</strong> · Encore libre : <strong style="color: var(--success);">${availLabels.join(', ')}</strong></div>`;
}

async function submitReservation(boatId) {
  const boat = state.boats.find(b => b.id === boatId);
  if (!boat) return;
  const dateInput = document.getElementById('resDate');
  const date = dateInput.value;
  const name = document.getElementById('resName').value.trim();
  const email = document.getElementById('resEmail').value.trim();
  const phone = document.getElementById('resPhone').value.trim();

  if (!date || !name || !email || !phone) { toast('Merci de remplir tous les champs requis', 'warning'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email invalide', 'warning'); return; }

  // Mode multi-jours ?
  const multiCb = document.getElementById('resMultiDay');
  const isMulti = multiCb?.checked;

  let durId, endDate, totalPrice, days;
  if (isMulti) {
    endDate = document.getElementById('resEndDate')?.value;
    if (!endDate) { toast('Sélectionnez une date de fin', 'warning'); return; }
    days = daysBetween(date, endDate);
    const md = getBoatMultiDay(boat);
    if (days < md.minDays || days > md.maxDays) {
      toast(`Le séjour doit faire entre ${md.minDays} et ${md.maxDays} jours.`, 'warning');
      return;
    }
    durId = 'multiday';
    totalPrice = calcMultiDayPrice(boat, days).total;
  } else {
    const durSelect = document.getElementById('resDuration');
    durId = durSelect.value;
    if (!durId) { toast('Sélectionnez un créneau', 'warning'); return; }

    // Re-vérifie côté serveur que ce créneau est toujours libre
    try {
      let bookings = [];
      if (state.mode === 'demo') {
        bookings = state.reservations
          .filter(r => r.boatId === boat.id && ['confirmed', 'pending'].includes(r.status))
          .map(r => ({ startDate: r.startDate, durationType: r.durationType }));
      } else {
        const res = await syncToBackend('getBoatBookings', { boatId: boat.id });
        if (res?.success) bookings = res.data || [];
      }
      _currentBookings = bookings;
      if (!isSlotOfferedByBoat(boat, durId)) {
        toast('Ce créneau n\'est pas proposé par ce bateau.', 'error');
        return;
      }
      const takenOnDate = getTakenSlotsOnDate(date, bookings);
      if (!isSlotCompatible(takenOnDate, durId)) {
        const dur = DURATIONS.find(d => d.id === durId);
        toast(`Le créneau "${dur?.shortLabel}" vient d'être pris pour cette date. Réessayez avec un autre.`, 'error');
        refreshDurationOptions(boatId, date);
        renderDateInfoLine(date);
        return;
      }
    } catch (e) { log('slot recheck fail', e); }

    totalPrice = getBoatSlotPrice(boat, durId);
  }

  const reservation = {
    id: uid(),
    boatId: boat.id,
    boatName: boat.name,
    proId: boat.proId,
    clientName: name,
    clientEmail: email,
    clientPhone: phone,
    startDate: date,
    endDate: endDate || '',
    durationType: durId,
    totalPrice,
    isMultiDay: !!isMulti,
    daysCount: days || 1,
    paymentStatus: 'pending',
    status: 'pending',
    clientToken: uid() + uid(),
    createdAt: new Date().toISOString()
  };

  setClientEmail(email);

  showLoader();
  try {
    if (state.mode === 'demo') {
      state.reservations.unshift(reservation);
      audit('reservation_created', { id: reservation.id });
      hideLoader();
      showReservationConfirmation(boat, reservation);
    } else {
      const res = await syncToBackend('createReservation', reservation);
      hideLoader();
      if (res?.success) {
        audit('reservation_created', { id: reservation.id });
        showReservationConfirmation(boat, reservation);
      } else {
        toast(res?.error || 'Erreur lors de la réservation. Veuillez réessayer.', 'error');
      }
    }
  } catch (e) {
    hideLoader();
    toast('Erreur réseau. Veuillez réessayer.', 'error');
  }
}

function showReservationConfirmation(boat, reservation) {
  const isMulti = reservation.isMultiDay || reservation.durationType === 'multiday';
