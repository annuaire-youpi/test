<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="BatoKreyòl — Louez un bateau avec skipper en Martinique. Plateforme de réservation en ligne pour particuliers et professionnels.">
<title>BatoKreyòl — Louez votre bateau en Martinique</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e6e6e'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle' fill='white' font-family='system-ui'%3E⛵%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e6e6e'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle' fill='white' font-family='system-ui'%3E⛵%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/fr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<style>
  :root {
    --primary: #0e6e6e;
    --primary-dark: #0a4f4f;
    --primary-light: #14a3a3;
    --primary-soft: #e8f4f4;
    --accent: #d4825c;
    --accent-soft: #fef0e6;
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f5f4ef;
    --text: #1a2332;
    --text-2: #5a6577;
    --text-3: #8a93a3;
    --border: #e6e8ec;
    --border-strong: #d4d8df;
    --success: #16a34a;
    --success-soft: #dcfce7;
    --warning: #d97706;
    --warning-soft: #fef3c7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --info: #2563eb;
    --info-soft: #dbeafe;
    --demo: #ea580c;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 2px 12px rgba(15,23,42,.06);
    --shadow-lg: 0 12px 32px rgba(15,23,42,.10);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'Manrope', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body { min-height: 100vh; min-height: 100dvh; }

  button, input, select, textarea {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }

  button { cursor: pointer; border: none; background: none; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img { max-width: 100%; display: block; }

  /* ====== LAYOUT ====== */
  .app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ====== HEADER ====== */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,.92);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -.02em;
    color: var(--text);
    cursor: pointer;
  }
  .logo:hover { text-decoration: none; }
  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--primary);
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: white;
    font-size: 19px;
  }
  .header-nav { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .header-link {
    padding: 8px 14px;
    border-radius: var(--radius);
    color: var(--text-2);
    font-weight: 600;
    font-size: 14px;
    transition: all .15s ease;
  }
  .header-link:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  .header-link.active { color: var(--primary); }

  /* ====== BUTTONS ====== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 14px;
    transition: all .18s ease;
    border: 1px solid transparent;
    white-space: nowrap;
    line-height: 1;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); text-decoration: none; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--surface-2); text-decoration: none; }
  .btn-ghost { background: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #b86c47; text-decoration: none; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #b91c1c; text-decoration: none; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #15803d; text-decoration: none; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-lg { padding: 14px 24px; font-size: 16px; }
  .btn-block { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ====== MAIN ====== */
  .main { flex: 1; }

  /* ====== HERO ====== */
  .hero {
    background: linear-gradient(135deg, #0e6e6e 0%, #14a3a3 60%, #5fc4c4 100%);
    color: white;
    padding: 70px 20px 80px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.12) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,.08) 0, transparent 40%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
    position: relative;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.25);
    color: white;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    backdrop-filter: blur(6px);
  }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -.03em;
    margin-bottom: 18px;
  }
  .hero p {
    font-size: clamp(16px, 2vw, 18px);
    opacity: .92;
    max-width: 600px;
    margin: 0 auto 30px;
  }
  .hero-search {
    background: white;
    border-radius: var(--radius-lg);
    padding: 8px;
    display: flex;
    gap: 8px;
    max-width: 700px;
    margin: 0 auto;
    box-shadow: var(--shadow-lg);
  }
  .hero-search input, .hero-search select {
    flex: 1;
    border: none;
    padding: 12px 14px;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    outline: none;
    min-width: 0;
  }
  .hero-search .btn { flex-shrink: 0; }
  @media (max-width: 640px) {
    .hero { padding: 50px 16px 60px; }
    .hero-search { flex-direction: column; padding: 12px; }
    .hero-search input, .hero-search select { border-bottom: 1px solid var(--border); border-radius: 0; }
    .hero-search input:last-of-type, .hero-search select:last-of-type { border-bottom: none; }
  }

  /* ====== CATALOG ====== */
  .container { max-width: 1280px; margin: 0 auto; padding: 40px 20px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .section-head h2 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .section-head p { color: var(--text-2); font-size: 14px; }

  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
  .filter-group label { font-size: 12px; color: var(--text-2); font-weight: 600; }
  .filter-group select, .filter-group input {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 8px 12px;
    background: var(--surface);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .filter-group select:focus, .filter-group input:focus { border-color: var(--primary); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .boat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: all .2s ease;
    display: flex;
    flex-direction: column;
  }
  .boat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border-strong); }
  .boat-img {
    aspect-ratio: 16/10;
    background: var(--surface-2);
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .boat-img-placeholder {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    color: var(--text-3); font-size: 48px;
    background: linear-gradient(135deg, #e8f4f4, #fef0e6);
  }
  .boat-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(255,255,255,.95);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    backdrop-filter: blur(8px);
  }
  .boat-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .boat-title { font-weight: 700; font-size: 17px; letter-spacing: -.01em; }
  .boat-location { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
  .boat-meta { display: flex; gap: 12px; font-size: 13px; color: var(--text-2); margin-top: 4px; flex-wrap: wrap; }
  .boat-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .boat-price {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .boat-price-amount { font-size: 20px; font-weight: 700; color: var(--primary); }
  .boat-price-unit { font-size: 12px; color: var(--text-2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-2);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { color: var(--text); font-size: 18px; margin-bottom: 6px; }

  /* ====== DETAIL PAGE ====== */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

  .gallery {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 8px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
    min-height: 300px;
  }
  .gallery-main {
    grid-row: span 2;
    background: var(--surface-2);
    background-size: cover;
    background-position: center;
    min-height: 300px;
  }
  .gallery-thumb {
    background: var(--surface-2);
    background-size: cover;
    background-position: center;
    min-height: 100px;
  }
  @media (max-width: 640px) {
    .gallery { grid-template-columns: 1fr; }
    .gallery-main { grid-row: span 1; min-height: 240px; }
    .gallery-thumb { display: none; }
  }

  .detail-info h1 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
  .detail-info .boat-location { font-size: 15px; margin-bottom: 20px; }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 24px;
  }
  .info-item .info-label { font-size: 12px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .info-item .info-value { font-weight: 600; font-size: 15px; }

  .booking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    position: sticky;
    top: 90px;
    box-shadow: var(--shadow);
  }
  .booking-price { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
  .booking-price-amount { font-size: 28px; font-weight: 800; color: var(--primary); }
  .booking-price-unit { color: var(--text-2); font-size: 14px; }

  /* ====== FORMS ====== */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-group label .req { color: var(--danger); }
  .form-group .help { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .form-control {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 14px;
    outline: none;
    transition: all .15s;
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  textarea.form-control { resize: vertical; min-height: 90px; font-family: inherit; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
  .checkbox-row label { margin: 0; cursor: pointer; font-weight: 500; }

  /* ====== PRO DASHBOARD ====== */
  .dash-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }
  @media (max-width: 900px) { .dash-layout { grid-template-columns: 1fr; } }
  .dash-sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 12px;
  }
  @media (max-width: 900px) {
    .dash-sidebar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      top: auto;
      border-right: none;
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px;
      gap: 4px;
      z-index: 40;
    }
    .dash-content { padding-bottom: 80px !important; }
  }
  .dash-nav { display: flex; flex-direction: column; gap: 2px; }
  @media (max-width: 900px) { .dash-nav { flex-direction: row; flex: 1; justify-content: space-around; } }
  .dash-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius);
    color: var(--text-2);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .dash-nav-item:hover { background: var(--surface-2); color: var(--text); }
  .dash-nav-item.active { background: var(--primary-soft); color: var(--primary); }
  @media (max-width: 900px) {
    .dash-nav-item { flex-direction: column; gap: 2px; font-size: 11px; padding: 6px 8px; }
    .dash-nav-item .nav-icon { font-size: 18px; }
  }
  .dash-content { padding: 32px; }
  @media (max-width: 640px) { .dash-content { padding: 20px 16px; } }

  /* ====== STATS ====== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .stat-label { font-size: 12px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .stat-value { font-size: 28px; font-weight: 800; margin-top: 8px; letter-spacing: -.02em; }
  .stat-trend { font-size: 12px; color: var(--text-2); margin-top: 4px; }

  /* ====== TABLE ====== */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .table { width: 100%; border-collapse: collapse; }
  .table th, .table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
  .table th { background: var(--surface-2); font-weight: 600; font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--surface-2); }
  @media (max-width: 700px) {
    .table thead { display: none; }
    .table, .table tbody, .table tr, .table td { display: block; }
    .table tr { border-bottom: 1px solid var(--border); padding: 12px 16px; }
    .table tr:last-child { border-bottom: none; }
    .table td { padding: 4px 0; border-bottom: none; }
    .table td::before { content: attr(data-label) ': '; font-weight: 600; color: var(--text-2); font-size: 12px; }
  }

  /* ====== BADGES ====== */
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill-success { background: var(--success-soft); color: var(--success); }
  .pill-warning { background: var(--warning-soft); color: var(--warning); }
  .pill-danger { background: var(--danger-soft); color: var(--danger); }
  .pill-info { background: var(--info-soft); color: var(--info); }
  .pill-neutral { background: var(--surface-2); color: var(--text-2); }

  /* ====== MODAL ====== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: grid;
    place-items: center;
    padding: 20px;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp .22s ease;
  }
  .modal-lg { max-width: 640px; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
  .modal-close { width: 32px; height: 32px; border-radius: var(--radius); display: grid; place-items: center; color: var(--text-2); }
  .modal-close:hover { background: var(--surface-2); color: var(--text); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ====== TOAST ====== */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: calc(100vw - 40px);
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--text-2);
    padding: 12px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 280px;
    animation: slideInRight .22s ease;
    font-size: 14px;
  }
  @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast.success { border-left-color: var(--success); }

<script>
/* ============================================================
   BatoKreyòl v0.6
   Marketplace de location de bateaux en Martinique
   ============================================================ */

const VERSION = 'v0.6';
const APP_NAME = 'BatoKreyol';

// CONFIG : remplacer par votre URL Apps Script déployée en Web App
// Si laissée vide ou non configurée, l'app bascule automatiquement sur un
// backend local (localStorage) qui permet de tester tout le flow.
const BACKEND_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_DEPLOYMENT_ID/exec';
const LOCAL_MODE = !BACKEND_URL || BACKEND_URL.includes('REPLACE_WITH_YOUR_DEPLOYMENT_ID');

const log = (...args) => console.log('[BatoKreyol]', ...args);

/* ---------- STATE ---------- */
const state = {
  mode: 'real',         // 'real' | 'demo'
  currentUser: null,    // { type: 'pro'|'client', id, name, email, ... }
  view: '/',
  boats: [],            // public catalog
  reservations: [],     // pro reservations
  myBoats: [],          // pro's boats
  reviews: [],          // avis clients
  filters: { location: '', type: '', capacity: '' },
  demoSnapshot: null,
};

/* ---------- LOCALES / DATA ---------- */
const LOCATIONS_MQ = [
  'Fort-de-France', 'Le Marin', 'Sainte-Anne', 'Les Trois-Îlets',
  'Saint-Pierre', 'Le François', 'Le Robert', 'Le Diamant',
  'Schoelcher', 'Tartane', 'Les Anses-d\'Arlet', 'Case-Pilote'
];
const BOAT_TYPES = ['Catamaran', 'Voilier', 'Bateau à moteur', 'Yacht', 'Semi-rigide', 'Pêche-promenade'];
const DURATIONS = [
  { id: 'halfday', label: 'Demi-journée (4h)', shortLabel: 'Matin', factor: 0.6, slot: 'morning' },
  { id: 'day',     label: 'Journée (8h)',     shortLabel: 'Journée', factor: 1,   slot: 'full' },
  { id: 'sunset',  label: 'Coucher de soleil (3h)', shortLabel: 'Coucher de soleil', factor: 0.45, slot: 'evening' },
];

/* Règle métier : sur une même date, on peut cumuler une demi-journée
   (matin) ET un coucher de soleil (soir) car ces créneaux ne se
   chevauchent pas. Une "journée complète" bloque tout, et deux
   créneaux identiques sont évidemment incompatibles. */
function isSlotCompatible(takenTypes, newType) {
  if (takenTypes.includes('day')) return false;
  if (newType === 'day' && takenTypes.length > 0) return false;
  if (takenTypes.includes(newType)) return false;
  return true;
}

function getAvailableDurations(dateISO, bookings, boat) {
  const takenOnDate = bookings.filter(b => b.startDate === dateISO).map(b => b.durationType);
  let candidates = DURATIONS.filter(d => isSlotCompatible(takenOnDate, d.id));
  if (boat) {
    const b = normalizeBoatPricing(boat);
    candidates = candidates.filter(d => b.availableSlots.includes(d.id));
  }
  return candidates.map(d => d.id);
}

function getTakenSlotsOnDate(dateISO, bookings) {
  return bookings.filter(b => b.startDate === dateISO).map(b => b.durationType);
}

function isDateFullyBooked(dateISO, bookings) {
  return getAvailableDurations(dateISO, bookings).length === 0;
}

/* Migration & helpers de tarification par créneau. Un bateau peut avoir :
   - prices: { halfday, day, sunset } → prix explicites par créneau
   - availableSlots: ['halfday', 'day', 'sunset'] → créneaux activés
   Pour les bateaux qui n'ont pas encore ces champs (ex: anciennes données),
   on les calcule depuis pricePerDay × facteur. */
function normalizeBoatPricing(boat) {
  if (!boat) return boat;
  const basePrice = Number(boat.pricePerDay) || 500;
  const fallback = {
    halfday: Math.round(basePrice * 0.6),
    day: basePrice,
    sunset: Math.round(basePrice * 0.45)
  };
  const prices = { ...fallback, ...(boat.prices || {}) };
  const availableSlots = Array.isArray(boat.availableSlots) && boat.availableSlots.length
    ? boat.availableSlots.filter(s => DURATIONS.find(d => d.id === s))
    : ['halfday', 'day', 'sunset'];
  return { ...boat, prices, availableSlots, pricePerDay: prices.day };
}

function getBoatSlotPrice(boat, slotId) {
  const b = normalizeBoatPricing(boat);
  return b.prices[slotId] ?? Math.round((b.pricePerDay || 500) * (DURATIONS.find(d => d.id === slotId)?.factor || 1));
}

function getBoatStartingPrice(boat) {
  const b = normalizeBoatPricing(boat);
  const offered = b.availableSlots.map(s => b.prices[s]).filter(p => p > 0);
  return offered.length ? Math.min(...offered) : (b.pricePerDay || 0);
}

function isSlotOfferedByBoat(boat, slotId) {
  const b = normalizeBoatPricing(boat);
  return b.availableSlots.includes(slotId);
}

/* ---------- POLITIQUES D'ANNULATION ---------- */
const CANCELLATION_POLICIES = [
  {
    id: 'flexible',
    label: 'Flexible',
    short: 'Annulation gratuite jusqu\'à 24h avant',
    description: 'Remboursement intégral si vous annulez au moins 24h avant le départ. Au-delà, aucun remboursement.',
    rules: [{ daysBefore: 1, refundPct: 100 }]
  },
  {
    id: 'moderate',
    label: 'Modérée',
    short: 'Gratuit 7 jours avant, 50% à 24h',
    description: 'Remboursement intégral à 7+ jours du départ. 50% entre 7 jours et 24h. Aucun remboursement à moins de 24h.',
    rules: [{ daysBefore: 7, refundPct: 100 }, { daysBefore: 1, refundPct: 50 }]
  },
  {
    id: 'strict',
    label: 'Stricte',
    short: '50% jusqu\'à 14 jours, sinon rien',
    description: 'Remboursement 50% à 14+ jours du départ. Aucun remboursement à moins de 14 jours.',
    rules: [{ daysBefore: 14, refundPct: 50 }]
  }
];

function calculateRefund(reservation, policyId, cancellationDate) {
  const startDate = new Date(reservation.startDate + 'T00:00:00');
  const cancelDate = cancellationDate ? new Date(cancellationDate) : new Date();
  const daysBefore = Math.floor((startDate - cancelDate) / 86400000);
  const policy = CANCELLATION_POLICIES.find(p => p.id === policyId) || CANCELLATION_POLICIES[1];
  const applicable = policy.rules.filter(r => daysBefore >= r.daysBefore).sort((a, b) => b.refundPct - a.refundPct);
  const pct = applicable[0]?.refundPct || 0;
  return { amount: Math.round((reservation.totalPrice || 0) * pct / 100), pct, daysBefore };
}

function getBoatCancellationPolicy(boat) {
  return CANCELLATION_POLICIES.find(p => p.id === (boat?.cancellationPolicy || 'moderate')) || CANCELLATION_POLICIES[1];
}

/* ---------- AVIS / REVIEWS ---------- */
function renderStars(avg, sizePx = 14) {
  const full = Math.round((avg || 0) * 2) / 2;
  let html = '<span class="stars" style="font-size:' + sizePx + 'px">';
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(full)) html += '<span class="star filled">★</span>';
    else if (i - 0.5 === full) html += '<span class="star filled">★</span>';
    else html += '<span class="star">★</span>';
  }
  html += '</span>';
  return html;
}

function getBoatReviewsSummary(boatId) {
  const reviews = state.reviews.filter(r => r.boatId === boatId);
  if (!reviews.length) return { count: 0, avg: 0 };
  const sum = reviews.reduce((s, r) => s + (r.rating || 0), 0);
  return { count: reviews.length, avg: sum / reviews.length };
}

/* ---------- NETWORK ---------- */
async function syncToBackend(action, data) {
  if (state.mode === 'demo') {
    log('demo no-op', action);
    return { success: true, demo: true };
  }
  if (LOCAL_MODE) {
    log('[localBackend]', action);
    await sleep(120); // simule la latence réseau
    return localBackend.handle(action, data);
  }
  const delays = [300, 800, 2000];
  let lastErr = null;
  for (let i = 0; i < delays.length; i++) {
    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        body: JSON.stringify({ action, data }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      return json;
    } catch (e) {
      lastErr = e;
      log('retry', i + 1, e.message);
      if (i < delays.length - 1) await sleep(delays[i]);
    }
  }
  throw lastErr;
}
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

/* ---------- LOCAL BACKEND (mémoire localStorage) ----------
   Simule l'API Apps Script tant que BACKEND_URL n'est pas configuré.
   Permet de tester intégralement l'inscription, la connexion, l'ajout

const localBackend = {
  _k: (t) => 'bk_local_' + t,
  _read(t) { try { return JSON.parse(localStorage.getItem(this._k(t))) || []; } catch { return []; } },
  _write(t, data) { try { localStorage.setItem(this._k(t), JSON.stringify(data)); } catch (e) { log('lb write err', e); } },
  _uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); },

  handle(action, data) {
    try {
      if (typeof this[action] === 'function') return this[action](data || {});
      return { success: false, error: 'Action inconnue: ' + action };
    } catch (e) { return { success: false, error: String(e) }; }
  },

  seed() {
    if (localStorage.getItem('bk_local_seeded') === '1') return;
    // Compte de test pré-créé pour faciliter les essais
    this._write('pros', [
      { id: 'pro_demo_1', name: 'Compte de test', company: 'Mon entreprise nautique', email: 'test@batokreyol.fr', phone: '0696 00 00 00', password: 'test1234', createdAt: new Date().toISOString(), status: 'active' }
    ]);
    this._write('boats', []);
    this._write('reservations', []);
    localStorage.setItem('bk_local_seeded', '1');
    log('localBackend seeded');
  },

  clearAll() {
    ['pros', 'boats', 'reservations', 'audit'].forEach(t => localStorage.removeItem(this._k(t)));
    localStorage.removeItem('bk_local_seeded');
    this.seed();
    log('localBackend cleared & re-seeded');
  },

  registerPro(data) {
    const email = String(data.email || '').toLowerCase().trim();
    if (!email || !data.password || !data.name) return { success: false, error: 'Champs requis manquants' };
    const pros = this._read('pros');
    if (pros.find(p => p.email === email)) return { success: false, error: 'Cet email est déjà utilisé' };
    const pro = {
      id: this._uid(), name: data.name, company: data.company || '',
      email, phone: data.phone || '', password: data.password,
      createdAt: new Date().toISOString(), status: 'active'
    };
    pros.push(pro);
    this._write('pros', pros);
    return { success: true, data: { id: pro.id, name: pro.name, company: pro.company, email: pro.email, phone: pro.phone } };
  },

  loginPro(data) {
    const email = String(data.email || '').toLowerCase().trim();
    const pro = this._read('pros').find(p => p.email === email);
    if (!pro) return { success: false, error: 'Identifiants incorrects' };
    if (pro.password !== data.password) return { success: false, error: 'Identifiants incorrects' };
    if (pro.status !== 'active') return { success: false, error: 'Compte désactivé' };
    return { success: true, data: { id: pro.id, name: pro.name, company: pro.company, email: pro.email, phone: pro.phone } };
  },

  updatePro(data) {
    const pros = this._read('pros');
    const i = pros.findIndex(p => p.id === data.id);
    if (i === -1) return { success: false, error: 'Profil introuvable' };
    ['name', 'company', 'phone'].forEach(k => { if (data[k] !== undefined) pros[i][k] = data[k]; });
    this._write('pros', pros);
    return { success: true };
  },

  changePassword(data) {
    const pros = this._read('pros');
    const i = pros.findIndex(p => p.email === String(data.email || '').toLowerCase());
    if (i === -1) return { success: false, error: 'Compte introuvable' };
    if (pros[i].password !== data.oldPassword) return { success: false, error: 'Mot de passe actuel incorrect' };
    pros[i].password = data.newPassword;
    this._write('pros', pros);
    return { success: true };
  },

  listBoats() {
    return { success: true, data: this._read('boats').filter(b => b.status === 'active') };
  },

  listBoatsForPro(data) {
    return { success: true, data: this._read('boats').filter(b => b.proId === data.proId) };
  },

  getBoat(data) {
    const b = this._read('boats').find(x => x.id === data.id);
    return b ? { success: true, data: b } : { success: false, error: 'Bateau introuvable' };
  },

  createBoat(data) {
    const boats = this._read('boats');
    const boat = { ...data, id: data.id || this._uid(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    boats.push(boat);
    this._write('boats', boats);
    return { success: true, data: boat };
  },

  updateBoat(data) {
    const boats = this._read('boats');
    const i = boats.findIndex(b => b.id === data.id);
    if (i === -1) return { success: false, error: 'Bateau introuvable' };
    boats[i] = { ...boats[i], ...data, updatedAt: new Date().toISOString() };
    this._write('boats', boats);
    return { success: true };
  },

  deleteBoat(data) {
    let boats = this._read('boats');
    boats = boats.filter(b => b.id !== data.id);
    this._write('boats', boats);
    return { success: true };
  },

  createReservation(data) {
    // Vérifie qu'aucun conflit de créneau n'existe pour cette date
    const existing = this._read('reservations')
      .filter(r => r.boatId === data.boatId && r.startDate === data.startDate)
      .filter(r => r.status === 'confirmed' || r.status === 'pending')
      .map(r => r.durationType);
    if (!isSlotCompatible(existing, data.durationType)) {
      return { success: false, error: 'Ce créneau vient d\'être réservé pour cette date.' };
    }
    const reservations = this._read('reservations');
    const r = { ...data, id: data.id || this._uid(), createdAt: new Date().toISOString() };
    reservations.unshift(r);
    this._write('reservations', reservations);
    return { success: true, data: r };
  },

  listReservationsForPro(data) {
    const list = this._read('reservations')
      .filter(r => r.proId === data.proId)
      .sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));
    return { success: true, data: list };
  },

  updateReservation(data) {
    const list = this._read('reservations');
    const i = list.findIndex(r => r.id === data.id);
    if (i === -1) return { success: false, error: 'Réservation introuvable' };
    if (data.status !== undefined) list[i].status = data.status;
    if (data.paymentStatus !== undefined) list[i].paymentStatus = data.paymentStatus;
    list[i].updatedAt = new Date().toISOString();
    this._write('reservations', list);
    return { success: true };
  },

  /* Renvoie les créneaux occupés pour ce bateau : tableau d'objets
     {startDate, durationType}. Le frontend combine cette info avec la
     matrice de compatibilité pour proposer les créneaux dispos. */
  getBoatBookings(data) {
    const list = this._read('reservations')
      .filter(r => r.boatId === data.boatId && ['confirmed', 'pending'].includes(r.status))
      .map(r => ({ startDate: r.startDate, durationType: r.durationType }))
      .filter(x => x.startDate);
    return { success: true, data: list };
  },

  /* Avis clients */
  listReviewsForBoat(data) {
    const list = this._read('reviews')
      .filter(r => r.boatId === data.boatId)
      .sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));
    return { success: true, data: list };
  },

  listAllReviewsForPro(data) {
    const boats = this._read('boats').filter(b => b.proId === data.proId).map(b => b.id);
    const list = this._read('reviews')
      .filter(r => boats.includes(r.boatId))
      .sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));
    return { success: true, data: list };
  },

  createReview(data) {
    const reviews = this._read('reviews');
    const review = { ...data, id: data.id || this._uid(), createdAt: new Date().toISOString(), response: data.response || '' };
    reviews.push(review);
    this._write('reviews', reviews);
    return { success: true, data: review };
  },

  respondToReview(data) {
    const reviews = this._read('reviews');
    const i = reviews.findIndex(r => r.id === data.id);
    if (i === -1) return { success: false, error: 'Avis introuvable' };
    reviews[i].response = data.response || '';
    this._write('reviews', reviews);
    return { success: true };
  },

  sendClientEmail(data) { return { success: true, simulated: true }; },

  audit(data) {
    const logs = this._read('audit');
    logs.push(data);
    if (logs.length > 200) logs.shift();
    this._write('audit', logs);
    return { success: true };
  }
};

/* ---------- TOAST ---------- */
function toast(msg, type = 'info', ttl = 4000) {
  const root = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = { success: '✅', error: '⚠️', warning: '⚠️', info: 'ℹ️' };
  el.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span>${escapeHtml(msg)}</span>`;
  root.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; setTimeout(() => el.remove(), 200); }, ttl);
}

function isStrongPin(pin) {
  if (!pin || pin.length < 6) return false;
  if (/^(\d)\1+$/.test(pin)) return false;
  if (['123456', '654321', '111111', '000000', '123123', 'abcdef'].includes(pin)) return false;
  return true;
}

function logout() {
  if (state.mode === 'demo') {
    state.mode = 'real';
    state.demoSnapshot = null;
    state.boats = [];
    state.reservations = [];
    state.myBoats = [];
    state.reviews = [];
  }
  state.currentUser = null;
  audit('logout');
  navigate('/');
  toast('Déconnecté', 'info');
}

/* ---------- API CALLS (avec fallback demo) ---------- */
async function fetchPublicBoats() {
  if (state.mode === 'demo') { state.boats = state.boats.map(normalizeBoatPricing); return state.boats; }
  try {
    const cached = cache.get('public_boats');
    if (cached) state.boats = cached.map(normalizeBoatPricing);
    const res = await syncToBackend('listBoats', {});
    if (res?.success && res.data) {
      state.boats = res.data.map(normalizeBoatPricing);
      cache.set('public_boats', state.boats);
    }
    return state.boats;
  } catch (e) {
    log('fetchPublicBoats fail', e);
    return (cache.get('public_boats') || []).map(normalizeBoatPricing);
  }
}

async function fetchMyBoats() {
  if (state.mode === 'demo') { state.myBoats = state.myBoats.map(normalizeBoatPricing); return state.myBoats; }
  try {
    const res = await syncToBackend('listBoatsForPro', { proId: state.currentUser.id });
    if (res?.success) state.myBoats = (res.data || []).map(normalizeBoatPricing);
    return state.myBoats;
  } catch (e) { log('fetchMyBoats fail', e); return state.myBoats; }
}

async function fetchMyReservations() {
  if (state.mode === 'demo') {
    return state.reservations.filter(r => r.proId === state.currentUser.id);
  }
  try {
    const res = await syncToBackend('listReservationsForPro', { proId: state.currentUser.id });
    if (res?.success) state.reservations = res.data || [];
    return state.reservations;
  } catch (e) { log('fetchMyReservations fail', e); return state.reservations; }
}

   ============================================================ */

function render() {
  const main = document.getElementById('main');
  const nav = document.getElementById('headerNav');
  document.body.classList.toggle('in-pro', state.view.startsWith('/pro/') && state.currentUser);

  // Pill démo intégré au header (à côté du logo)
  const existingPill = document.getElementById('demoPillHeader');
  if (state.mode === 'demo') {
    if (!existingPill) {
      const pill = document.createElement('span');
      pill.id = 'demoPillHeader';
      pill.className = 'demo-pill';
      pill.innerHTML = '<span>🎭</span><span class="demo-label">MODE DÉMO</span>';
      const logo = document.querySelector('.header-inner .logo');
      if (logo && logo.parentNode) logo.parentNode.insertBefore(pill, logo.nextSibling);
    }
  } else if (existingPill) {
    existingPill.remove();
  }

  // Nav
  if (state.currentUser?.type === 'pro') {
    nav.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="installBtn" onclick="installPWA()">📱 Installer</button>
      <a class="header-link ${state.view === '/' ? 'active' : ''}" onclick="navigate('/')">Catalogue</a>
      <a class="header-link ${state.view.startsWith('/pro/') ? 'active' : ''}" onclick="navigate('/pro/dashboard')">Espace pro</a>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
    `;
  } else {
    nav.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="installBtn" onclick="installPWA()">📱 Installer</button>
      <a class="header-link ${state.view === '/' ? 'active' : ''}" onclick="navigate('/')">Catalogue</a>
      <button class="btn btn-secondary btn-sm" onclick="openAuthModal()">Espace pro</button>
    `;
  }
  if (_pwaDeferredPrompt) document.getElementById('installBtn')?.classList.add('visible');

  // Route
  const path = state.view;
  if (path === '/' || path === '') return viewHome();
  if (path.startsWith('/boat/')) return viewBoatDetail(path.split('/')[2]);
  if (path === '/pro/dashboard') return viewProDashboard();
  if (path === '/pro/boats') return viewProBoats();
  if (path === '/pro/boats/new') return viewBoatForm();
  if (path.startsWith('/pro/boats/edit/')) return viewBoatForm(path.split('/')[4]);
  if (path === '/pro/reservations') return viewProReservations();
  if (path === '/pro/reviews') return viewProReviews();
  if (path === '/pro/profile') return viewProProfile();
  viewHome();
}

      locale: 'fr',

      altInput: true,
      altFormat: 'l j F Y',
      disable: fullyBookedDates,
      disableMobile: false,
      onDayCreate: (dObj, dStr, fp, dayElem) => {

let _reviewRating = 0;
function setReviewRating(n) {
  _reviewRating = n;
  document.querySelectorAll('#ratingInput .star').forEach((s, i) => {
    s.classList.toggle('filled', (i + 1) <= n);
  });
  const labels = ['', 'Décevant', 'Moyen', 'Bien', 'Très bien', 'Excellent'];
  document.getElementById('ratingHint').textContent = labels[n] + ' ★';
}

async function submitReview(boatId) {
  const rating = _reviewRating;
  const clientName = document.getElementById('revName').value.trim();
  const comment = document.getElementById('revComment').value.trim();
  if (rating === 0) { toast('Choisissez une note', 'warning'); return; }
  if (!clientName) { toast('Indiquez votre nom', 'warning'); return; }
  if (!comment || comment.length < 10) { toast('Le commentaire doit faire au moins 10 caractères', 'warning'); return; }

  const review = { id: uid(), boatId, clientName, rating, comment, response: '', createdAt: new Date().toISOString() };
  showLoader();
  try {
    if (state.mode === 'demo') {
      state.reviews.unshift(review);
    } else {
      const res = await syncToBackend('createReview', review);
      if (res?.success) state.reviews.unshift(res.data || review);
      else throw new Error(res?.error || 'Erreur');
    }
    audit('review_created', { boatId, rating });
    hideLoader();
    closeModal();
    _reviewRating = 0;
    toast('Merci pour votre avis ! ⭐', 'success');
    if (state.view.startsWith('/boat/')) viewBoatDetail(boatId);
  } catch (e) {
    hideLoader();
    toast('Erreur lors de la publication', 'error');
  }
}

function updateBookingPriceV2() {
  const boat = state.boats.find(b => b.id === _currentBoatId);
  if (!boat) return;
  const sel = document.getElementById('resDuration');
  const slotId = sel.value;
  const btn = document.getElementById('submitResBtn');
  const hint = document.getElementById('submitResHint');
  if (!slotId) {
    document.getElementById('bookingTotalAmount').textContent = '—';
    if (btn) btn.innerHTML = '📩 Demander cette sortie';
    if (hint) hint.textContent = 'Sélectionnez un créneau pour voir le mode de paiement';
    return;
  }
  const price = getBoatSlotPrice(boat, slotId);
  document.getElementById('bookingTotalAmount').textContent = fmtEUR(price);
  // Met à jour le label/hint selon présence d'un lien de paiement POUR CE CRÉNEAU
  const hasPay = !!getBoatPaymentLink(boat, slotId);
  if (btn) btn.innerHTML = hasPay ? '💳 Réserver & Payer' : '📩 Demander cette sortie';
  if (hint) hint.textContent = hasPay ? 'Paiement sécurisé en ligne après confirmation' : 'Le propriétaire vous contactera pour le paiement';
}

function renderAvailabilityHint(fullyBooked, partiallyBooked) {
  if (fullyBooked === 0 && partiallyBooked === 0) {
    return `<div class="dates-info dates-info-empty"><span>✓</span><span>Toutes les dates sont entièrement disponibles</span></div>`;
  }
  const parts = [];
  if (fullyBooked > 0) parts.push(`${fullyBooked} date${fullyBooked > 1 ? 's' : ''} complète${fullyBooked > 1 ? 's' : ''}`);
  if (partiallyBooked > 0) parts.push(`${partiallyBooked} date${partiallyBooked > 1 ? 's' : ''} partiellement réservée${partiallyBooked > 1 ? 's' : ''}`);
  return `<div class="dates-info"><span>📅</span><span>${parts.join(' · ')}. Choisissez votre date pour voir les créneaux libres.</span></div>`;
}

function refreshDurationOptions(boatId, dateISO) {
  const boat = state.boats.find(b => b.id === boatId);
  const select = document.getElementById('resDuration');
  if (!boat || !select) return;
  const prevValue = select.value;

  // Tient compte à la fois des créneaux offerts par le bateau ET des conflits du jour
  const availIds = dateISO
    ? getAvailableDurations(dateISO, _currentBookings, boat)
    : DURATIONS.filter(d => isSlotOfferedByBoat(boat, d.id)).map(d => d.id);

  if (availIds.length === 0) {
    select.innerHTML = '<option value="">Aucun créneau disponible ce jour</option>';
    select.disabled = true;
    document.getElementById('bookingTotalAmount').textContent = '—';
    return;
  }

  select.disabled = false;
  select.innerHTML = availIds.map(id => {
    const d = DURATIONS.find(x => x.id === id);
    const price = getBoatSlotPrice(boat, id);
    return `<option value="${d.id}">${d.label} — ${fmtEUR(price)}</option>`;
  }).join('');

  // Restaure la valeur si elle est toujours dispo
  if (availIds.includes(prevValue)) select.value = prevValue;
  updateBookingPriceV2();
}

function renderDateInfoLine(dateISO) {
  const wrap = document.getElementById('dateInfoLine');
  if (!wrap) return;
  if (!dateISO) { wrap.innerHTML = '<div class="help">Les dates barrées sont entièrement réservées.</div>'; return; }

  const boat = state.boats.find(b => b.id === _currentBoatId);
  const taken = getTakenSlotsOnDate(dateISO, _currentBookings);
  const avail = getAvailableDurations(dateISO, _currentBookings, boat);

  if (taken.length === 0) {
    wrap.innerHTML = `<div class="help" style="color: var(--success); font-weight: 600;">✓ Tous les créneaux sont libres ce jour</div>`;
    return;
  }
  if (avail.length === 0) {
    wrap.innerHTML = `<div class="help" style="color: var(--danger); font-weight: 600;">✕ Aucun créneau disponible ce jour</div>`;
    return;
  }
  const takenLabels = taken.map(id => DURATIONS.find(d => d.id === id)?.shortLabel || id);
  const availLabels = avail.map(id => DURATIONS.find(d => d.id === id)?.shortLabel || id);
  wrap.innerHTML = `<div class="help" style="color: #92400e;">⚠️ Déjà pris : <strong>${takenLabels.join(', ')}</strong> · Encore libre : <strong style="color: var(--success);">${availLabels.join(', ')}</strong></div>`;
}

async function submitReservation(boatId) {
  const boat = state.boats.find(b => b.id === boatId);
  if (!boat) return;
  const dateInput = document.getElementById('resDate');
  const date = dateInput.value;
  const durSelect = document.getElementById('resDuration');
  const durId = durSelect.value;
  const name = document.getElementById('resName').value.trim();
  const email = document.getElementById('resEmail').value.trim();
  const phone = document.getElementById('resPhone').value.trim();

  if (!date || !durId || !name || !email || !phone) { toast('Merci de remplir tous les champs requis', 'warning'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email invalide', 'warning'); return; }

  // Re-vérifie côté serveur que ce créneau est toujours libre
  try {
    let bookings = [];
    if (state.mode === 'demo') {
      bookings = state.reservations
        .filter(r => r.boatId === boat.id && ['confirmed', 'pending'].includes(r.status))
        .map(r => ({ startDate: r.startDate, durationType: r.durationType }));
    } else {
      const res = await syncToBackend('getBoatBookings', { boatId: boat.id });
      if (res?.success) bookings = res.data || [];
    }
    _currentBookings = bookings;
    if (!isSlotOfferedByBoat(boat, durId)) {
      toast('Ce créneau n\'est pas proposé par ce bateau.', 'error');
      return;
    }
    const takenOnDate = getTakenSlotsOnDate(date, bookings);
    if (!isSlotCompatible(takenOnDate, durId)) {
      const dur = DURATIONS.find(d => d.id === durId);
      toast(`Le créneau "${dur?.shortLabel}" vient d'être pris pour cette date. Réessayez avec un autre.`, 'error');
      refreshDurationOptions(boatId, date);
      renderDateInfoLine(date);
      return;
    }
  } catch (e) { log('slot recheck fail', e); }

  const totalPrice = getBoatSlotPrice(boat, durId);

  const reservation = {
    id: uid(),
    boatId: boat.id,
    boatName: boat.name,
    proId: boat.proId,
    clientName: name,
    clientEmail: email,
    clientPhone: phone,
    startDate: date,
    durationType: durId,
    totalPrice,
    paymentStatus: 'pending',
    status: 'pending',
    createdAt: new Date().toISOString()
  };

  showLoader();
  try {
    if (state.mode === 'demo') {
      state.reservations.unshift(reservation);
      audit('reservation_created', { id: reservation.id });
      hideLoader();
      showReservationConfirmation(boat, reservation);
    } else {
      const res = await syncToBackend('createReservation', reservation);
      hideLoader();
      if (res?.success) {
        audit('reservation_created', { id: reservation.id });
        showReservationConfirmation(boat, reservation);
      } else {
        toast(res?.error || 'Erreur lors de la réservation. Veuillez réessayer.', 'error');
      }
    }
  } catch (e) {
    hideLoader();
    toast('Erreur réseau. Veuillez réessayer.', 'error');
  }
}

function showReservationConfirmation(boat, reservation) {
  const paymentLink = getBoatPaymentLink(boat, reservation.durationType);
  const hasPayment = !!paymentLink;
  modal(`
    <div class="modal-header">
      <h3>✅ Demande envoyée</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">

      <div style="background: var(--surface-2); padding: 16px; border-radius: var(--radius); margin-bottom: 16px;">

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pwd = document.getElementById('loginPwd').value;
  if (!email || !pwd) { toast('Email et mot de passe requis', 'warning'); return; }

  // Verrouillage progressif
  const lockKey = 'lock_' + email;
  const lockData = cache.get(lockKey) || { attempts: 0, lockedUntil: 0 };
  if (lockData.lockedUntil > Date.now()) {
    const minutes = Math.ceil((lockData.lockedUntil - Date.now()) / 60000);
    toast(`Compte verrouillé. Réessayez dans ${minutes} min.`, 'error');
    return;
  }

  showLoader();
  try {
    const res = await syncToBackend('loginPro', { email, password: pwd });
    hideLoader();
    if (res?.success) {
      state.currentUser = { type: 'pro', ...res.data };
      cache.set(lockKey, { attempts: 0, lockedUntil: 0 });
      audit('login_success');
      closeModal();
      toast(`Bienvenue, ${state.currentUser.name} !`, 'success');
      navigate('/pro/dashboard');
    } else {
      lockData.attempts++;
      if (lockData.attempts >= 15) lockData.lockedUntil = Date.now() + 86400000;
      else if (lockData.attempts >= 10) lockData.lockedUntil = Date.now() + 3600000;
      else if (lockData.attempts >= 5) lockData.lockedUntil = Date.now() + 300000;
      cache.set(lockKey, lockData);
      audit('login_failed', { email });
      toast(res?.error || 'Identifiants incorrects', 'error');
    }
  } catch (e) {
    hideLoader();
    toast('Erreur de connexion au serveur', 'error');
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const company = document.getElementById('regCompany').value.trim();

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email invalide', 'warning'); return; }
  if (!isStrongPin(pwd)) { toast('Mot de passe trop simple. Évitez 123456, 000000, etc.', 'warning'); return; }

  showLoader();
  try {
    const res = await syncToBackend('registerPro', { name, company, email, phone, password: pwd });

async function viewProDashboard() {
  if (!state.currentUser) { openAuthModal(); return; }
  await Promise.all([fetchMyBoats(), fetchMyReservations(), fetchMyReviews()]);

async function fetchMyReviews() {
  if (state.mode === 'demo') {
    const myBoatIds = state.demoSnapshot.boats.filter(b => b.proId === state.currentUser.id).map(b => b.id);
    state.reviews = state.demoSnapshot.reviews.filter(r => myBoatIds.includes(r.boatId));
    return;
  }
  try {
    const res = await syncToBackend('listAllReviewsForPro', { proId: state.currentUser.id });
    if (res?.success) state.reviews = res.data || [];
  } catch (e) { log('reviews fail', e); }
}

function renderDashboardCharts(reservations, boats) {
  if (typeof Chart === 'undefined') { log('Chart.js not loaded'); return; }
  Chart.defaults.font.family = "Plus Jakarta Sans, system-ui, sans-serif";
  Chart.defaults.color = '#5a6577';

  // 1) Revenus 6 derniers mois (bar chart)
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'), label: d.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }) });
  }
  const revenueByMonth = months.map(m => {
    return reservations.filter(r => r.paymentStatus === 'paid' && String(r.startDate).startsWith(m.key))
      .reduce((s, r) => s + (r.totalPrice || 0), 0);
  });
  const ctx1 = document.getElementById('chartRevenue');
  if (ctx1) {
    if (ctx1._chart) ctx1._chart.destroy();
    ctx1._chart = new Chart(ctx1.getContext('2d'), {
      type: 'bar',
      data: {
        labels: months.map(m => m.label),
        datasets: [{ label: 'Revenus', data: revenueByMonth, backgroundColor: '#0e6e6e', borderRadius: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmtEUR(c.parsed.y) } } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => v >= 1000 ? (v / 1000) + 'k€' : v + '€' } } }
      }
    });
  }

  // 2) Statuts (doughnut)
  const statusCounts = { confirmed: 0, pending: 0, completed: 0, cancelled: 0 };
  reservations.forEach(r => { statusCounts[r.status] = (statusCounts[r.status] || 0) + 1; });
  const ctx2 = document.getElementById('chartStatus');
  if (ctx2) {
    if (ctx2._chart) ctx2._chart.destroy();
    ctx2._chart = new Chart(ctx2.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ['Confirmées', 'En attente', 'Terminées', 'Annulées'],
        datasets: [{
          data: [statusCounts.confirmed, statusCounts.pending, statusCounts.completed, statusCounts.cancelled],
          backgroundColor: ['#16a34a', '#d97706', '#2563eb', '#dc2626'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12 } } }
      }
    });
  }

  // 3) Réservations par bateau (horizontal bar)
  const byBoat = {};
  reservations.forEach(r => { byBoat[r.boatName || r.boatId] = (byBoat[r.boatName || r.boatId] || 0) + 1; });
  const sorted = Object.entries(byBoat).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const ctx3 = document.getElementById('chartBoats');
  if (ctx3) {
    if (ctx3._chart) ctx3._chart.destroy();
    ctx3._chart = new Chart(ctx3.getContext('2d'), {
      type: 'bar',
      data: {
        labels: sorted.map(s => s[0]),
        datasets: [{ data: sorted.map(s => s[1]), backgroundColor: '#14a3a3', borderRadius: 6 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });
  }
}

async function toggleBoatStatus(id) {
  const boat = state.myBoats.find(b => b.id === id);
  if (!boat) return;
  const newStatus = boat.status === 'active' ? 'inactive' : 'active';
  boat.status = newStatus;
  if (state.mode === 'demo') {
    const idx = state.boats.findIndex(b => b.id === id);
    if (idx >= 0) state.boats[idx].status = newStatus;
  } else {
    await syncToBackend('updateBoat', { id, status: newStatus });
  }
  audit('boat_toggle', { id, newStatus });
  toast(newStatus === 'active' ? 'Bateau activé' : 'Bateau désactivé', 'success');
  render();
}

let boatFormState = null;

function viewBoatForm(editId) {
  if (!state.currentUser) { openAuthModal(); return; }
  const editing = editId ? state.myBoats.find(b => b.id === editId) : null;
  if (editing) {
    const normalized = normalizeBoatPricing(editing);
    // Convertit l'ancien paymentLink unique en map si nécessaire
    let paymentLinks = normalized.paymentLinks;
    if (!paymentLinks || typeof paymentLinks !== 'object') {
      const old = normalized.paymentLink || '';
      paymentLinks = { halfday: old, day: old, sunset: old };
    } else {
      paymentLinks = { halfday: '', day: '', sunset: '', ...paymentLinks };
    }
    boatFormState = {
      ...normalized,
      images: [...(normalized.images || [])],
      equipment: [...(normalized.equipment || [])],
      prices: { ...normalized.prices },
      availableSlots: [...normalized.availableSlots],
      paymentLinks,
      cancellationPolicy: normalized.cancellationPolicy || 'moderate'
    };
  } else {
    const basePrice = 500;
    boatFormState = {
      id: uid(),
      proId: state.currentUser.id,
      proName: state.currentUser.company || state.currentUser.name,
      name: '',
      type: BOAT_TYPES[0],
      capacity: 6,
      location: LOCATIONS_MQ[0],
      description: '',
      pricePerDay: basePrice,
      prices: {
        halfday: Math.round(basePrice * 0.6),

      availableSlots: ['halfday', 'day', 'sunset'],
      paymentLinks: { halfday: '', day: '', sunset: '' },
      cancellationPolicy: 'moderate',
      images: [],
      withSkipper: true,
      equipment: [],
      status: 'active'
    };
  }

  renderBoatForm(!!editing);
}

function syncBoatFormFromDOM() {
  const b = boatFormState;
  b.name = document.getElementById('bfName')?.value.trim() || b.name;
  b.type = document.getElementById('bfType')?.value || b.type;
  b.location = document.getElementById('bfLoc')?.value || b.location;
  b.capacity = Number(document.getElementById('bfCap')?.value) || b.capacity;
  b.description = document.getElementById('bfDesc')?.value.trim() || b.description;
  b.withSkipper = document.getElementById('bfSkipper')?.checked ?? b.withSkipper;

  // Récupère les prix et créneaux cochés
  const slots = [];
  DURATIONS.forEach(d => {
    const cb = document.getElementById('slot-' + d.id);
    const pi = document.getElementById('price-' + d.id);
    if (cb && cb.checked) slots.push(d.id);
    if (pi) b.prices[d.id] = Number(pi.value) || 0;
  });
  b.availableSlots = slots.length ? slots : ['day'];
  b.pricePerDay = b.prices.day || b.prices[b.availableSlots[0]] || 0;

  // Récupère les 3 liens de paiement par créneau
  if (!b.paymentLinks) b.paymentLinks = {};
  DURATIONS.forEach(d => {
    const pi = document.getElementById('pay-' + d.id);
    if (pi) b.paymentLinks[d.id] = pi.value.trim();
  });
}

function selectCancellationPolicy(policyId, editing) {
  syncBoatFormFromDOM();

function toggleSlot(slotId, editing) {
  syncBoatFormFromDOM();
  const cb = document.getElementById('slot-' + slotId);
  const pi = document.getElementById('price-' + slotId);

  if (cb && cb.checked) {
    row?.classList.remove('disabled');

    row?.classList.add('disabled');

  }

function suggestPricesFromDay() {
  const dayInput = document.getElementById('price-day');

  if (halfInput) halfInput.value = Math.round(day * 0.6);

function addImageUrl() {

  if (!/^https?:\/\/.+/.test(url)) { toast('URL invalide (doit commencer par http:// ou https://)', 'warning'); return; }
  boatFormState.images.push(url);
  toast('Image ajoutée', 'success');
  renderBoatForm(state.myBoats.find(x => x.id === boatFormState.id));
}

async function addImageFile(ev, editing) {
  syncBoatFormFromDOM();
  const files = Array.from(ev.target.files || []);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    try {
      const dataUrl = await resizeImage(file, 800);
      boatFormState.images.push(dataUrl);
    } catch (e) { log('img resize fail', e); }
  }
  toast(files.length + ' image(s) ajoutée(s)', 'success');
  renderBoatForm(editing);
}

function resizeImage(file, maxW) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = reject;
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function removeImage(idx, editing) {
  syncBoatFormFromDOM();
  boatFormState.images.splice(idx, 1);
  renderBoatForm(editing);
}

function toggleEquip(e, editing) {
  syncBoatFormFromDOM();
  const arr = boatFormState.equipment;
  const i = arr.indexOf(e);
  if (i >= 0) arr.splice(i, 1); else arr.push(e);
  renderBoatForm(editing);

async function saveBoat(editing) {
  syncBoatFormFromDOM();
  const b = boatFormState;
  if (!b.name) { toast('Le nom du bateau est requis', 'warning'); return; }
  if (b.availableSlots.length === 0) { toast('Sélectionnez au moins un créneau proposé', 'warning'); return; }
  // Vérifie qu'au moins un prix activé est > 0
  const invalidSlots = b.availableSlots.filter(s => !(Number(b.prices[s]) > 0));
  if (invalidSlots.length > 0) {
    const labels = invalidSlots.map(s => DURATIONS.find(d => d.id === s)?.shortLabel || s).join(', ');
    toast(`Prix manquant ou invalide pour : ${labels}`, 'warning');
    return;
  }

  showLoader();
  if (state.mode === 'demo') {
    if (editing) {
      const idx = state.myBoats.findIndex(x => x.id === b.id);
      if (idx >= 0) state.myBoats[idx] = b;
      const gidx = state.boats.findIndex(x => x.id === b.id);
      if (gidx >= 0) state.boats[gidx] = b;
    } else {
      state.myBoats.push(b);
      state.boats.push(b);
    }
    audit(editing ? 'boat_updated' : 'boat_created', { id: b.id });
    hideLoader();
    toast(editing ? 'Bateau mis à jour' : 'Bateau créé', 'success');
    navigate('/pro/boats');
  } else {
    try {
      const action = editing ? 'updateBoat' : 'createBoat';
      const res = await syncToBackend(action, b);
      hideLoader();
      if (res?.success) {
        audit(action, { id: b.id });
        toast(editing ? 'Bateau mis à jour' : 'Bateau créé', 'success');
        await fetchMyBoats();
        navigate('/pro/boats');
      } else {
        toast(res?.error || 'Erreur lors de la sauvegarde', 'error');
      }
    } catch (e) {
      hideLoader();
      toast('Erreur réseau', 'error');
    }
  }
}

async function submitRespond(reviewId) {
  const response = document.getElementById('respText').value.trim();
  if (!response) { toast('Saisissez une réponse', 'warning'); return; }
  showLoader();
  try {
    if (state.mode === 'demo') {
      const r = state.reviews.find(x => x.id === reviewId);
      if (r) r.response = response;
    } else {
      const res = await syncToBackend('respondToReview', { id: reviewId, response });
      if (res?.success) {
        const r = state.reviews.find(x => x.id === reviewId);
        if (r) r.response = response;

      ${state.mode === 'demo' ? `
        <hr style="border: none; border-top: 1px solid var(--border); margin: 24px 0;">
        <h3 style="font-size: 15px; margin-bottom: 8px;">🎭 Mode démonstration</h3>
        <p class="small text-muted mb-2">Vous êtes connecté en tant que propriétaire fictif <strong>${escapeHtml(u.company)}</strong>. Réinitialisez les données ou changez d'utilisateur démo ci-dessous.</p>
        <div class="flex gap-1">
          <button class="btn btn-secondary btn-sm" onclick="resetDemo()">🔄 Réinitialiser la démo</button>
          <button class="btn btn-secondary btn-sm" onclick="switchDemoUser()">👥 Changer de pro démo</button>
        </div>
      ` : LOCAL_MODE ? `
        <hr style="border: none; border-top: 1px solid var(--border); margin: 24px 0;">
        <h3 style="font-size: 15px; margin-bottom: 8px;">💾 Backend local</h3>
        <p class="small text-muted mb-2">Vos données sont stockées dans ce navigateur (localStorage). Pour passer en production, configurez l'URL Apps Script dans le HTML (constante <code>BACKEND_URL</code>).</p>
        <button class="btn btn-danger btn-sm" onclick="confirmClearLocal()">🗑️ Effacer toutes les données locales</button>
      ` : ''}
    </div>
  `, 'profile');
}

function saveProfile() {
  state.currentUser.name = document.getElementById('pfName').value.trim();
  state.currentUser.company = document.getElementById('pfCompany').value.trim();
  state.currentUser.phone = document.getElementById('pfPhone').value.trim();
  if (state.mode === 'real') {
    syncToBackend('updatePro', state.currentUser).then(() => toast('Profil enregistré', 'success'));
  } else {
    toast('Profil enregistré (démo)', 'success');
  }
  audit('profile_updated');
  render();
}

function openChangePassword() {
  modal(`
    <div class="modal-header"><h3>🔒 Changer mon mot de passe</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Mot de passe actuel</label><input type="password" id="oldPwd" class="form-control"></div>
      <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="newPwd" class="form-control"><div class="help">Min. 6 caractères, pas de séquence évidente.</div></div>
      <button class="btn btn-primary btn-block" onclick="doChangePassword()">Mettre à jour</button>
    </div>
  `);
}

async function doChangePassword() {
  const oldP = document.getElementById('oldPwd').value;
  const newP = document.getElementById('newPwd').value;
  if (!isStrongPin(newP)) { toast('Mot de passe trop simple', 'warning'); return; }
  if (state.mode === 'demo') {
    toast('Mot de passe changé (démo)', 'success');
    closeModal();
    return;
  }
  const res = await syncToBackend('changePassword', { email: state.currentUser.email, oldPassword: oldP, newPassword: newP });
  if (res?.success) { toast('Mot de passe mis à jour', 'success'); closeModal(); audit('password_changed'); }
  else toast(res?.error || 'Erreur', 'error');
}

function switchDemoUser() {
  const pros = state.demoSnapshot.pros;
  modal(`
    <div class="modal-header"><h3>Changer de propriétaire démo</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p class="text-muted mb-2">Chaque propriétaire fictif a sa propre flotte. Choisissez-en un pour explorer.</p>
      ${pros.map(p => `
        <div style="border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; cursor: pointer; ${p.id === state.currentUser.id ? 'background: var(--primary-soft); border-color: var(--primary);' : ''}" onclick="selectDemoUser('${p.id}')">
          <strong>${escapeHtml(p.name)}</strong> — ${escapeHtml(p.company)}
          <div class="small text-muted">${state.demoSnapshot.boats.filter(b => b.proId === p.id).length} bateau(x)</div>
        </div>
      `).join('')}
    </div>
  `);
}

function selectDemoUser(pid) {
  const p = state.demoSnapshot.pros.find(x => x.id === pid);
  state.currentUser = { type: 'pro', id: p.id, name: p.name, company: p.company, email: p.email, phone: p.phone };
  state.myBoats = state.demoSnapshot.boats.filter(b => b.proId === p.id);
  audit('demo_switch_user', { to: p.id });
  closeModal();
  toast(`Connecté en tant que ${p.company}`, 'info');
  render();
}

function confirmClearLocal() {
  modal(`
    <div class="modal-header"><h3>⚠️ Effacer toutes les données locales</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p class="mb-2">Cette action va supprimer <strong>tous les comptes, bateaux et réservations</strong> stockés localement, puis recréer le compte de test.</p>
      <p class="small text-muted mb-2">Vous serez déconnecté. Action irréversible.</p>
      <div class="flex gap-1" style="justify-content: flex-end;">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-danger" onclick="doClearLocal()">Tout effacer</button>
      </div>
    </div>
  `);
}

function doClearLocal() {
  localBackend.clearAll();
  state.currentUser = null;
  state.myBoats = [];
  state.boats = [];
  state.reservations = [];
  audit('local_data_cleared');
  closeModal();
  toast('Données locales effacées', 'success');
  navigate('/');
}

/* ---------- PWA SETUP ----------
   On génère un manifest dynamique pour permettre l'ajout à l'écran
   d'accueil sur iOS (Safari) et Android (Chrome). On n'utilise PAS de
   Service Worker car celui-ci impose un fichier .js séparé sur le
   même domaine (contrainte de sécurité des navigateurs). */
let _pwaDeferredPrompt = null;

function setupPWA() {
  const iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="#0e6e6e"/><text x="256" y="340" font-size="280" text-anchor="middle" fill="white" font-family="system-ui">⛵</text></svg>';
  const iconURL = 'data:image/svg+xml;utf8,' + encodeURIComponent(iconSVG);
  const manifest = {
    name: 'BatoKreyòl — Louer un bateau en Martinique',
    short_name: 'BatoKreyòl',
    description: 'Louez votre bateau avec skipper en Martinique. Marketplace nautique 100% locale.',
    start_url: './',
    scope: './',
    display: 'standalone',
    background_color: '#fafaf7',
    theme_color: '#0e6e6e',
    orientation: 'any',
    lang: 'fr-FR',
    icons: [
      { src: iconURL, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: iconURL, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.head.appendChild(link);
    log('manifest injected');
  } catch (e) { log('manifest fail', e); }

  // Captation de l'évènement d'installation Chrome / Android (si disponible)
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _pwaDeferredPrompt = e;
    const btn = document.getElementById('installBtn');
    if (btn) btn.classList.add('visible');
    log('PWA installable (prompt natif disponible)');
  });

  window.addEventListener('appinstalled', () => {
    _pwaDeferredPrompt = null;
    document.getElementById('installBtn')?.classList.remove('visible');
    audit('pwa_installed');
    toast('Application installée 🎉', 'success');
  });

  // Le bouton "Installer" est toujours affiché : si le prompt natif n'est
  // pas dispo (iOS, Firefox…), on guide l'utilisateur manuellement.
  setTimeout(() => {
    document.getElementById('installBtn')?.classList.add('visible');
  }, 100);
}

async function installPWA() {
  // Si le navigateur a déclenché beforeinstallprompt, on lance la boîte native
  if (_pwaDeferredPrompt) {
    _pwaDeferredPrompt.prompt();
    const choice = await _pwaDeferredPrompt.userChoice;
    log('PWA install choice', choice);
    _pwaDeferredPrompt = null;
    document.getElementById('installBtn')?.classList.remove('visible');
    return;
  }
  // Sinon, on affiche les instructions selon la plateforme
  const ua = navigator.userAgent;
  const isiOS = /iPad|iPhone|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);
  modal(`
    <div class="modal-header"><h3>📱 Installer BatoKreyòl</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      ${isiOS ? `
        <p class="mb-2">Sur iPhone / iPad :</p>
        <ol style="padding-left: 18px; line-height: 1.8;">
          <li>Touchez l'icône <strong>Partager</strong> ▢↑ en bas de Safari</li>
          <li>Faites défiler et touchez <strong>« Sur l'écran d'accueil »</strong></li>
          <li>Confirmez en touchant <strong>« Ajouter »</strong></li>
        </ol>
        <p class="small text-muted mt-2">L'app s'ouvrira ensuite en plein écran depuis votre bureau, comme une vraie application.</p>
      ` : isAndroid ? `
        <p class="mb-2">Sur Android Chrome :</p>
        <ol style="padding-left: 18px; line-height: 1.8;">
          <li>Touchez le menu <strong>⋮</strong> en haut à droite</li>
          <li>Touchez <strong>« Ajouter à l'écran d'accueil »</strong> ou <strong>« Installer l'application »</strong></li>
          <li>Confirmez</li>
        </ol>
      ` : `
        <p class="mb-2">Sur ordinateur (Chrome, Edge) :</p>
        <ol style="padding-left: 18px; line-height: 1.8;">
          <li>Ouvrez le menu <strong>⋮</strong> en haut à droite</li>
          <li>Cliquez sur <strong>« Installer BatoKreyòl »</strong> ou <strong>« Plus d'outils → Créer un raccourci »</strong></li>
          <li>Cochez « Ouvrir comme une fenêtre » et validez</li>
        </ol>
        <p class="small text-muted mt-2">Sur Firefox, vous pouvez épingler l'onglet pour un accès rapide.</p>
      `}
      <button class="btn btn-primary btn-block mt-2" onclick="closeModal()">D'accord</button>
    </div>
  `);
}

/* ---------- BOOT ---------- */
window.addEventListener('DOMContentLoaded', () => {
  log('Boot', VERSION, LOCAL_MODE ? '(backend local)' : '(backend distant)');
  if (LOCAL_MODE) localBackend.seed();
  setupPWA();
  const path = (window.location.hash || '#/').slice(1) || '/';
  state.view = path;
  render();
});
</script>

</body>
</html>
