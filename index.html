<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Energy Force">
  <title>Energy Force — CRM Coaching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230d9488'/><text x='50%25' y='58%25' font-family='Arial' font-size='110' text-anchor='middle' fill='white' font-weight='bold'>EF</text></svg>">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230d9488'/><text x='50%25' y='62%25' font-family='Arial' font-size='38' text-anchor='middle' fill='white' font-weight='bold'>EF</text></svg>">
  <style>
    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    button, input, select, textarea {
      font-family: inherit; font-size: inherit; color: inherit;
    }
    button { cursor: pointer; border: none; background: none; }
    input, textarea, select { outline: none; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============================================================
       VARIABLES
       ============================================================ */
    :root {
      --bg: #f7f8fa;
      --bg-soft: #f1f3f6;
      --card: #ffffff;
      --border: #e4e7ec;
      --border-strong: #d0d5dd;
      --text: #0f172a;
      --text-muted: #475569;
      --text-soft: #94a3b8;
      --primary: #0d9488;
      --primary-hover: #0f766e;
      --primary-soft: #ccfbf1;
      --primary-soft-2: #f0fdfa;
      --accent: #1e293b;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --info: #0284c7;
      --info-soft: #e0f2fe;
      --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
      --shadow: 0 2px 12px rgba(15,23,42,.06);
      --shadow-lg: 0 12px 32px rgba(15,23,42,.14);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --header-h: 60px;
      --bottom-nav-h: 64px;
      --sidebar-w: 240px;
    }

    /* ============================================================
       UTILITAIRES
       ============================================================ */
    .hidden { display: none !important; }
    .center { display: flex; align-items: center; justify-content: center; }
    .row { display: flex; align-items: center; gap: 8px; }
    .col { display: flex; flex-direction: column; gap: 8px; }
    .grow { flex: 1; min-width: 0; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .text-muted { color: var(--text-muted); }
    .text-soft { color: var(--text-soft); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 12px; }
    .text-lg { font-size: 17px; }
    .text-xl { font-size: 20px; }
    .text-2xl { font-size: 26px; }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; }
    .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; } .mb-6 { margin-bottom: 24px; }

    /* ============================================================
       SPLASH SCREEN
       ============================================================ */
    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, #f0fdfa 0%, #f7f8fa 60%);
      z-index: 100;
    }
    .splash-card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }
    .splash-logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 24px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(13,148,136,.25);
    }
    .splash-title {
      text-align: center;
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .splash-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .pin-display {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 20px;
    }
    .pin-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--bg-soft);
      border: 2px solid var(--border-strong);
      transition: all 0.2s ease;
    }
    .pin-dot.filled {
      background: var(--primary);
      border-color: var(--primary);
      transform: scale(1.1);
    }
    .pin-dot.error {
      background: var(--danger);
      border-color: var(--danger);
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 280px;
      margin: 0 auto;
    }
    .pin-key {
      aspect-ratio: 1.4;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 20px; font-weight: 600;
      transition: all 0.15s ease;
      color: var(--text);
    }
    .pin-key:hover { background: var(--bg-soft); }
    .pin-key:active { transform: scale(0.95); background: var(--primary-soft); }
    .pin-key.action {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
      font-size: 14px;
    }
    .pin-msg {
      text-align: center;
      font-size: 13px;
      min-height: 18px;
      margin: 12px 0;
      color: var(--text-muted);
    }
    .pin-msg.error { color: var(--danger); }
    .pin-msg.success { color: var(--success); }
    .splash-divider {
      display: flex; align-items: center;
      margin: 24px 0 16px;
      color: var(--text-soft);
      font-size: 12px;
      gap: 12px;
    }
    .splash-divider::before, .splash-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .demo-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: white;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 15px;
      transition: all 0.15s ease;
      box-shadow: 0 4px 12px rgba(249,115,22,.25);
    }
    .demo-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(249,115,22,.35); }
    .demo-btn:active { transform: translateY(0); }
    .splash-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-soft);
    }

    /* ============================================================
       APP SHELL
       ============================================================ */
    #app {
      display: none;
      min-height: 100vh; min-height: 100dvh;
    }
    #app.active { display: block; }

    .header {
      position: sticky; top: 0;
      height: var(--header-h);
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 50;
    }
    .header-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.3px;
    }
    .header-logo-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
    }
    .header-actions {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      font-size: 18px;
    }
    .icon-btn:hover { background: var(--bg-soft); color: var(--text); }
    .icon-btn.spin svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .demo-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: white;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      box-shadow: 0 2px 8px rgba(249,115,22,.3);
    }

    /* Layout */
    .layout {
      display: flex;
    }
    .sidebar {
      display: none;
      width: var(--sidebar-w);
      min-height: calc(100vh - var(--header-h));
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      flex-shrink: 0;
      position: sticky; top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: left;
      transition: all 0.15s ease;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--bg-soft); color: var(--text); }
    .nav-item.active {
      background: var(--primary-soft-2);
      color: var(--primary-hover);
      font-weight: 600;
    }
    .nav-icon { font-size: 18px; line-height: 1; }
    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      min-width: 20px;
      text-align: center;
    }

    .main {
      flex: 1; min-width: 0;
      padding: 20px 16px 100px;
      max-width: 100%;
    }

    /* Bottom nav (mobile) */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-nav-h);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding-bottom: env(safe-area-inset-bottom, 0);
      z-index: 40;
    }
    .bottom-nav-item {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      color: var(--text-soft);
      font-size: 10px;
      font-weight: 500;
      transition: color 0.15s ease;
      padding: 6px 4px;
      position: relative;
    }
    .bottom-nav-item .nav-icon { font-size: 20px; }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item .nav-badge {
      position: absolute; top: 6px; right: 50%;
      transform: translateX(16px);
      margin: 0;
      font-size: 10px;
      padding: 1px 5px;
      min-width: 16px;
    }

    @media (min-width: 900px) {
      .sidebar { display: block; }
      .bottom-nav { display: none; }
      .main { padding: 28px 32px 40px; }
    }

    /* ============================================================
       PAGE TITLES
       ============================================================ */
    .page-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .page-title {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.4px;
    }
    .page-actions {
      margin-left: auto;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    @media (min-width: 600px) {
      .page-title { font-size: 26px; }
    }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 9px 16px;
      border-radius: var(--radius);
      font-size: 14px; font-weight: 600;
      transition: all 0.15s ease;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border-color: var(--border-strong);
    }
    .btn-secondary:hover { background: var(--bg-soft); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
    }
    .btn-ghost:hover { background: var(--bg-soft); color: var(--text); }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success {
      background: var(--success);
      color: white;
    }
    .btn-success:hover { background: #15803d; }
    .btn-warning {
      background: var(--warning);
      color: white;
    }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-lg { padding: 12px 20px; font-size: 15px; }
    .btn-block { width: 100%; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ============================================================
       CARDS
       ============================================================ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .card-header {
      display: flex; align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.2px;
    }
    .card-subtitle {
      font-size: 13px; color: var(--text-muted);
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (min-width: 600px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .stat-value {
      font-size: 28px; font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      margin-top: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }
    .stat-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .grid-2 {
      display: grid; gap: 16px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 900px) {
      .grid-2 { grid-template-columns: 1fr 1fr; }
    }

    /* ============================================================
       LISTS
       ============================================================ */
    .list { display: flex; flex-direction: column; gap: 8px; }
    .list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: all 0.15s ease;
      display: flex; align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .list-item:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--primary-soft-2);
      color: var(--primary-hover);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .avatar.lg { width: 56px; height: 56px; font-size: 20px; }
    .avatar.sm { width: 32px; height: 32px; font-size: 12px; }

    /* ============================================================
       BADGES
       ============================================================ */
    .badge {
      display: inline-flex; align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.2px;
    }
    .badge-success { background: var(--success-soft); color: #15803d; }
    .badge-warning { background: var(--warning-soft); color: #b45309; }
    .badge-danger { background: var(--danger-soft); color: #b91c1c; }
    .badge-info { background: var(--info-soft); color: #0369a1; }
    .badge-neutral { background: var(--bg-soft); color: var(--text-muted); }
    .badge-primary { background: var(--primary-soft); color: var(--primary-hover); }

    /* ============================================================
       FORMS
       ============================================================ */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-label .req { color: var(--danger); margin-left: 2px; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      transition: all 0.15s ease;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }
    .form-textarea { resize: vertical; min-height: 90px; font-family: inherit; }
    .form-help {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .form-row {
      display: grid; gap: 12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px) {
      .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
      .form-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
    }

    .search-bar {
      position: relative;
      flex: 1; min-width: 0;
    }
    .search-bar input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--card);
      font-size: 14px;
    }
    .search-bar::before {
      content: '🔍';
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.6;
    }

    .filter-chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--card);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }
    .filter-chip:hover { background: var(--bg-soft); }
    .filter-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ============================================================
       MODAL
       ============================================================ */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--card);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
      display: flex; flex-direction: column;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @media (min-width: 700px) {
      .modal-backdrop { align-items: center; padding: 24px; }
      .modal { max-width: 600px; border-radius: var(--radius-lg); }
      .modal.modal-lg { max-width: 800px; }
    }
    .modal-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      gap: 12px;
      position: sticky; top: 0;
      background: var(--card);
      z-index: 1;
    }
    .modal-title {
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.3px;
      flex: 1;
    }
    .modal-body { padding: 20px; flex: 1; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end;
      flex-wrap: wrap;
      position: sticky; bottom: 0;
      background: var(--card);
    }

    /* ============================================================
       TOAST
       ============================================================ */
    #toast-container {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 300;

<script>
/* ============================================================
   ENERGY FORCE — CRM Coaching
   v0.1 — 2026
   ============================================================ */

const VERSION = 'v0.1';
const APP_NAME = 'EnergyForce';

/* ============================================================
   CONFIG
   ============================================================ */
const CONFIG = {
  // 👇 À REMPLACER par l'URL de déploiement Apps Script (voir apps-script.js)
  BACKEND_URL: localStorage.getItem('ef_backend_url') || '',
  // PIN par défaut (à changer dans les Paramètres)
  DEFAULT_PIN: '141214'
};

/* ============================================================
   STATE
   ============================================================ */
let state = {
  mode: 'real',           // 'real' | 'demo'
  authed: false,
  route: 'dashboard',
  routeParams: {},
  pin: '',
  data: {
    clients: [],
    sessions: [],
    bookings: []
  },
  filters: {
    clientSearch: '',
    clientStatut: 'tous',
    sessionType: 'tous'
  }
};

let demoSnapshot = null;
let pinAttempts = parseInt(localStorage.getItem('ef_pin_attempts') || '0', 10);
let pinLockedUntil = parseInt(localStorage.getItem('ef_pin_locked_until') || '0', 10);

/* ============================================================
   UTIL — LOG, ID, DATE, ESCAPE
   ============================================================ */
function log(...args) { console.log(`[${APP_NAME}]`, ...args); }
function warn(...args) { console.warn(`[${APP_NAME}]`, ...args); }
function err(...args) { console.error(`[${APP_NAME}]`, ...args); }

function uid(prefix = 'id') {
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function nowIso() { return new Date().toISOString(); }

function fmtDate(d) {
  if (!d) return '';
  const dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt)) return '';
  return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '';
  const dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt)) return '';
  return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' à ' + dt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
function todayIsoDate() {
  return new Date().toISOString().slice(0, 10);
}
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function nl2br(s) { return escapeHtml(s).replace(/\n/g, '<br>'); }
function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}
function avatarColor(name) {
  const palette = ['#0d9488','#0284c7','#7c3aed','#db2777','#f59e0b','#16a34a','#dc2626','#475569'];
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return palette[Math.abs(h) % palette.length];
}
function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

/* ============================================================
   AUDIT LOG (LOCAL + DISTANT)
   ============================================================ */
function audit(action, details = {}) {
  try {
    const entry = { timestamp: nowIso(), action, details, mode: state.mode };
    const local = JSON.parse(localStorage.getItem('ef_audit') || '[]');
    local.unshift(entry);
    localStorage.setItem('ef_audit', JSON.stringify(local.slice(0, 200)));
    log('audit', entry);
    if (state.mode === 'real' && CONFIG.BACKEND_URL) {
      // Fire and forget — pas critique
      fetch(CONFIG.BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'audit', data: entry })
      }).catch(() => {});
    }
  } catch (e) { warn('audit failed', e); }
}

/* ============================================================
   TOAST
   ============================================================ */
function toast(message, type = 'info', duration = 3500) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  t.innerHTML = `<span class="toast-icon">${icons[type] || ''}</span><span>${escapeHtml(message)}</span>`;
  c.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'all 0.3s ease';
    t.style.opacity = '0'; t.style.transform = 'translateY(-10px)';
    setTimeout(() => t.remove(), 300);
  }, duration);
}

/* ============================================================
   LOADER
   ============================================================ */
function showLoader() { document.getElementById('loader').classList.add('active'); }
function hideLoader() { document.getElementById('loader').classList.remove('active'); }

/* ============================================================
   MODAL
   ============================================================ */
function openModal({ title, body, footer, size = '' }) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">

          <button class="icon-btn" onclick="closeModal()" aria-label="Fermer">✕</button>
        </div>
        <div class="modal-body">${body}</div>
        ${footer ? `<div class="modal-footer">${footer}</div>` : ''}
      </div>
    </div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function confirmModal(message, onConfirm, opts = {}) {
  openModal({
    title: opts.title || 'Confirmer',
    body: `<p style="font-size:14px;line-height:1.6;">${escapeHtml(message)}</p>`,
    footer: `

      <button class="btn ${opts.danger ? 'btn-danger' : 'btn-primary'}" id="confirm-ok-btn">${opts.confirmLabel || 'Confirmer'}</button>
    `
  });
  document.getElementById('confirm-ok-btn').onclick = () => { closeModal(); onConfirm(); };
}

/* ============================================================
   PIN / AUTH (Schéma B)
   ============================================================ */
const PIN = {
  init() {
    const keypad = document.getElementById('pin-keypad');
    const layout = ['1','2','3','4','5','6','7','8','9','#','0','⌫'];
    keypad.innerHTML = layout.map(k => {
      const isAction = (k === '#' || k === '⌫');
      return `<button class="pin-key ${isAction ? 'action' : ''}" data-k="${k}">${k}</button>`;
    }).join('');
    keypad.addEventListener('click', e => {
      const btn = e.target.closest('.pin-key');
      if (!btn) return;
      const k = btn.dataset.k;
      this.handleKey(k);
    });
    document.addEventListener('keydown', e => {
      if (state.authed) return;
      if (/^[0-9]$/.test(e.key)) this.handleKey(e.key);
      else if (e.key === '#') this.handleKey('#');
      else if (e.key === 'Backspace') this.handleKey('⌫');
      else if (e.key === 'Enter' && state.pin.length === 6) this.submit();
    });
    this.refresh();
  },

  handleKey(k) {
    if (this.isLocked()) { this.refresh(); return; }
    if (k === '⌫') {
      state.pin = state.pin.slice(0, -1);
    } else if (state.pin.length < 6) {
      state.pin += k;
    }
    this.refresh();
    if (state.pin.length === 6) {
      setTimeout(() => this.submit(), 150);
    }
  },

  isLocked() {
    return Date.now() < pinLockedUntil;
  },

  refresh() {
    const dots = document.querySelectorAll('#pin-display .pin-dot');
    dots.forEach((d, i) => {
      d.classList.toggle('filled', i < state.pin.length);
      d.classList.remove('error');
    });
    const msg = document.getElementById('pin-msg');
    if (this.isLocked()) {
      const mins = Math.ceil((pinLockedUntil - Date.now()) / 60000);
      msg.textContent = `🔒 Verrouillé. Réessaie dans ${mins} min`;
      msg.className = 'pin-msg error';
    } else {
      msg.textContent = 'Saisis ton code PIN à 6 chiffres';
      msg.className = 'pin-msg';
    }
  },

  isWeak(pin) {
    if (/^(\d)\1{5}$/.test(pin)) return true; // 000000, 111111…
    if (/^123456$|^654321$|^012345$|^543210$/.test(pin)) return true;
    return false;
  },

  submit() {
    if (this.isLocked()) return;
    const stored = localStorage.getItem('ef_pin') || CONFIG.DEFAULT_PIN;
    if (state.pin === stored) {
      pinAttempts = 0;
      localStorage.setItem('ef_pin_attempts', '0');
      localStorage.setItem('ef_pin_locked_until', '0');
      audit('login_success');
      App.enterReal();
    } else {
      pinAttempts++;
      localStorage.setItem('ef_pin_attempts', String(pinAttempts));
      audit('login_fail', { attempts: pinAttempts });
      const dots = document.querySelectorAll('#pin-display .pin-dot');
      dots.forEach(d => d.classList.add('error'));
      const msg = document.getElementById('pin-msg');
      msg.className = 'pin-msg error';
      msg.textContent = 'PIN incorrect';
      setTimeout(() => {
        state.pin = '';
        if (pinAttempts >= 15) {
          pinLockedUntil = Date.now() + 24*60*60*1000;
          localStorage.setItem('ef_pin_locked_until', String(pinLockedUntil));
        } else if (pinAttempts >= 10) {
          pinLockedUntil = Date.now() + 60*60*1000;
          localStorage.setItem('ef_pin_locked_until', String(pinLockedUntil));
        } else if (pinAttempts >= 5) {
          pinLockedUntil = Date.now() + 5*60*1000;
          localStorage.setItem('ef_pin_locked_until', String(pinLockedUntil));
        }
        this.refresh();
      }, 600);
    }
  }
};

/* ============================================================
   API / SYNC
   ============================================================ */
async function apiCall(action, data = {}, retries = 3) {
  if (state.mode === 'demo') {
    log('apiCall (demo - skipped):', action);
    return { ok: true, demo: true };
  }
  if (!CONFIG.BACKEND_URL) {
    warn('Pas d\'URL backend configurée');
    return { ok: false, error: 'no_backend' };
  }
  const delays = [300, 800, 2000];
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(CONFIG.BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, data })
      });
      const json = await res.json();
      if (json.ok === false) throw new Error(json.error || 'Backend error');
      return json;
    } catch (e) {
      warn(`apiCall ${action} attempt ${i+1} failed`, e);
      if (i < retries - 1) await new Promise(r => setTimeout(r, delays[i]));
      else throw e;
    }
  }
}

async function syncToBackend(action, data) {
  if (state.mode === 'demo') {
    log('syncToBackend skipped (demo):', action);
    return { ok: true, demo: true };
  }
  if (!CONFIG.BACKEND_URL) {
    warn('syncToBackend: pas d\'URL backend, données stockées localement');
    return { ok: false, error: 'no_backend' };
  }
  try {
    return await apiCall(action, data);
  } catch (e) {
    err('syncToBackend failed', e);
    return { ok: false, error: e.message };
  }
}

/* ============================================================

   ============================================================ */
const App = {
  init() {
    log(`booting ${VERSION}`);
    PIN.init();

    // Service worker / PWA manifest dynamique
    this.installManifest();

    // Persiste la dernière route
    state.route = localStorage.getItem('ef_last_route') || 'dashboard';
  },

  installManifest() {
    const manifest = {
      name: 'Energy Force CRM',
      short_name: 'Energy Force',
      start_url: '.',
      display: 'standalone',
      background_color: '#f7f8fa',
      theme_color: '#0d9488',
      icons: [
        { src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='%230d9488'/><text x='50%25' y='62%25' font-family='Arial' font-size='110' text-anchor='middle' fill='white' font-weight='bold'>EF</text></svg>",
          sizes: '192x192', type: 'image/svg+xml' }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = url;
    document.head.appendChild(link);
  },

  async activateDemo() {
    log('Activating demo mode');
    state.mode = 'demo';
    demoSnapshot = generateDemoData();
    state.data = JSON.parse(JSON.stringify(demoSnapshot));
    state.authed = true;
    audit('demo_activated');
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('demo-badge').classList.remove('hidden');
    toast('Mode démonstration activé', 'success');
    this.go(state.route || 'dashboard');
  },

  async enterReal() {
    log('Entering real mode');
    state.mode = 'real';
    state.authed = true;
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('demo-badge').classList.add('hidden');

    // Charger depuis cache local pour résilience
    this.loadFromCache();
    this.go(state.route || 'dashboard');

    // Sync depuis backend
    if (CONFIG.BACKEND_URL) {
      this.syncNow(true);
    } else {
      toast('Aucun backend configuré — données locales uniquement', 'warning', 5000);
    }
  },

  loadFromCache() {
    try {
      const cached = localStorage.getItem('ef_data_cache');
      if (cached) {
        state.data = JSON.parse(cached);
        log('Loaded from cache', state.data);
      }
    } catch (e) { warn('Cache load failed', e); }
  },

  saveToCache() {
    if (state.mode === 'demo') return;
    try {
      localStorage.setItem('ef_data_cache', JSON.stringify(state.data));
    } catch (e) { warn('Cache save failed', e); }
  },

  async syncNow(silent = false) {
    if (state.mode === 'demo') {
      if (!silent) toast('Pas de sync en mode démo', 'info');
      return;
    }
    if (!CONFIG.BACKEND_URL) {
      if (!silent) toast('Configurez l\'URL du backend dans Paramètres', 'warning');
      return;
    }
    const btn = document.getElementById('sync-btn');
    btn.classList.add('spin');
    if (!silent) showLoader();
    try {
      const res = await apiCall('getAllData');
      if (res && res.ok) {
        state.data = {
          clients: res.data.clients || [],
          sessions: res.data.sessions || [],
          bookings: res.data.bookings || []
        };
        this.saveToCache();
        this.refreshCurrentView();
        if (!silent) toast('Synchronisation réussie', 'success');
      } else {
        if (!silent) toast('Erreur de synchronisation', 'error');
      }
    } catch (e) {
      err('sync failed', e);
      if (!silent) toast('Synchronisation échouée — données locales conservées', 'error');
    } finally {
      btn.classList.remove('spin');
      hideLoader();
    }
  },

  logout() {
    confirmModal('Se déconnecter ?', () => {
      audit('logout');
      state.authed = false;
      if (state.mode === 'demo') {
        state.data = { clients: [], sessions: [], bookings: [] };
        demoSnapshot = null;
      }
      state.mode = 'real';
      state.pin = '';
      document.getElementById('app').classList.remove('active');
      document.getElementById('splash').style.display = 'flex';
      document.getElementById('demo-badge').classList.add('hidden');
      PIN.refresh();
    });
  },

  go(route, params = {}) {
    state.route = route;
    state.routeParams = params;
    localStorage.setItem('ef_last_route', route);
    this.refreshNav();
    this.render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  },

  refreshNav() {
    document.querySelectorAll('[data-route]').forEach(el => {
      const r = el.dataset.route;
      const isActive =
        r === state.route ||
        (r === 'clients' && state.route === 'client') ||
        (r === 'sessions' && (state.route === 'session' || state.route === 'session-edit')) ||
        (r === 'settings' && state.route === 'audit');
      el.classList.toggle('active', isActive);
    });

    // Badge réservations en attente
    const pendingCount = state.data.bookings.filter(b => b.statut === 'en_attente').length;
    ['bookings-badge', 'bookings-badge-mobile'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (pendingCount > 0) {
        el.classList.remove('hidden');
        el.textContent = String(pendingCount);
      } else {
        el.classList.add('hidden');
      }
    });
  },

  refreshCurrentView() {
    this.render();
    this.refreshNav();
  },

  render() {
    const main = document.getElementById('main');
    switch (state.route) {
      case 'dashboard':     main.innerHTML = Views.dashboard(); break;
      case 'clients':       main.innerHTML = Views.clients(); Views.attachClientsHandlers(); break;
      case 'client':        main.innerHTML = Views.clientDetail(state.routeParams.id); break;
      case 'sessions':      main.innerHTML = Views.sessions(); Views.attachSessionsHandlers(); break;
      case 'session':       main.innerHTML = Views.sessionDetail(state.routeParams.id); break;
      case 'bookings':      main.innerHTML = Views.bookings(); break;
      case 'settings':      main.innerHTML = Views.settings(); break;
      case 'audit':         main.innerHTML = Views.audit(); break;
      default:              main.innerHTML = Views.dashboard();
    }
  }
};

    const f = document.getElementById('client-form');

      id: existingId || uid('cl'),
      nom_complet: f.nom_complet.value.trim(),
      telephone: f.telephone.value.trim(),
      email: f.email.value.trim(),
      statut: f.statut.value,
      metier: f.metier.value.trim(),
      typologie: f.typologie.value.trim(),
      objectif: f.objectif.value.trim(),
      commentaires: f.commentaires.value.trim(),
      date_modification: nowIso()
    };
    if (!data.nom_complet) { toast('Nom requis', 'error'); return; }

    if (existingId) {
      const idx = state.data.clients.findIndex(c => c.id === existingId);
      if (idx >= 0) state.data.clients[idx] = { ...state.data.clients[idx], ...data };
      audit('client_update', { id: data.id, nom: data.nom_complet });
    } else {
      data.date_creation = nowIso();
      state.data.clients.push(data);
      audit('client_create', { id: data.id, nom: data.nom_complet });
    }
    App.saveToCache();
    closeModal();
    App.refreshCurrentView();

    showLoader();
    const res = await syncToBackend(existingId ? 'updateClient' : 'addClient', data);
    hideLoader();
    if (res.ok) toast(`Client ${existingId ? 'modifié' : 'créé'}`, 'success');
    else if (res.demo) toast(`Client ${existingId ? 'modifié' : 'créé'} (démo)`, 'success');

    if (state.route === 'client') App.go('client', { id: data.id });

    App.saveToCache();
    closeModal();
    App.refreshCurrentView();

    showLoader();

    hideLoader();
    if (res.ok) toast(`Séance ${existingId ? 'modifiée' : 'enregistrée'}`, 'success');

  async saveBooking(existingId) {
    const f = document.getElementById('booking-form');
    const data = {
      id: existingId || uid('bk'),
      nom: f.nom.value.trim(),
      email: f.email.value.trim(),
      telephone: f.telephone.value.trim(),
      date_rdv: f.date_rdv.value,
      heure_rdv: f.heure_rdv.value,
      message: f.message.value.trim(),
      statut: existingId ? (state.data.bookings.find(x=>x.id===existingId)?.statut || 'en_attente') : 'en_attente',
      source: 'cal.com',
      date_reception: existingId ? (state.data.bookings.find(x=>x.id===existingId)?.date_reception || nowIso()) : nowIso()
    };
    if (!data.nom) { toast('Nom requis', 'error'); return; }

    if (existingId) {
      const idx = state.data.bookings.findIndex(b => b.id === existingId);
      if (idx >= 0) state.data.bookings[idx] = { ...state.data.bookings[idx], ...data };
      audit('booking_update', { id: data.id });
    } else {
      state.data.bookings.unshift(data);
      audit('booking_create', { id: data.id, nom: data.nom });
    }
    App.saveToCache();
    closeModal();
    App.refreshCurrentView();

    const res = await syncToBackend(existingId ? 'updateBooking' : 'addBooking', data);
    if (res.ok) toast('Réservation enregistrée', 'success');
    else if (res.demo) toast('Réservation enregistrée (démo)', 'success');
    else toast('Sauvegardée localement', 'warning');
  },

  async setBookingStatus(id, statut) {
    const idx = state.data.bookings.findIndex(b => b.id === id);
    if (idx < 0) return;
    const b = state.data.bookings[idx];
    state.data.bookings[idx] = { ...b, statut };
    audit('booking_status', { id, statut });
    App.saveToCache();
    App.refreshCurrentView();
    const labels = { valide: 'validée', refuse: 'refusée', en_attente: 'remise en attente' };
    toast(`Réservation ${labels[statut] || statut}`, 'success');

    // Si validation : créer le client s'il n'existe pas
    if (statut === 'valide') {
      const existing = state.data.clients.find(c =>
        (c.email && c.email.toLowerCase() === (b.email || '').toLowerCase() && b.email) ||
        c.nom_complet.toLowerCase() === b.nom.toLowerCase()
      );
      if (!existing) {
        confirmModal(
          `Créer la fiche client pour ${b.nom} ?`,
          () => {
            const newClient = {
              id: uid('cl'),
              nom_complet: b.nom,
              telephone: b.telephone || '',
              email: b.email || '',
              statut: 'actif',
              metier: '', typologie: '', objectif: '',
              commentaires: b.message ? `Message initial : ${b.message}` : '',
              date_creation: nowIso(),
              date_modification: nowIso()
            };
            state.data.clients.push(newClient);
            audit('client_auto_create', { id: newClient.id, from_booking: id });
            App.saveToCache();
            App.refreshCurrentView();
            toast('Fiche client créée', 'success');
            syncToBackend('addClient', newClient);
          },
          { confirmLabel: 'Créer la fiche', title: 'Créer le client' }
        );
      }
    }

    await syncToBackend('updateBooking', state.data.bookings[idx]);
  },

  deleteBooking(id) {
    confirmModal('Supprimer cette réservation ?', async () => {
      state.data.bookings = state.data.bookings.filter(b => b.id !== id);
      audit('booking_delete', { id });
      App.saveToCache();
      App.refreshCurrentView();
      toast('Réservation supprimée', 'success');
      await syncToBackend('deleteBooking', { id });
    }, { danger: true, confirmLabel: 'Supprimer' });
  },

  // ----- WHATSAPP / EMAIL / CALL -----
  whatsapp(client) {
    if (!client.telephone) { toast('Pas de numéro de téléphone', 'warning'); return; }
    const phone = client.telephone.replace(/\D/g, '');
    const phoneIntl = phone.startsWith('0') ? '33' + phone.slice(1) : phone;
    this.openMessageTemplates(client, 'whatsapp', (msg) => {
      const url = `https://wa.me/${phoneIntl}?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
      audit('whatsapp_send', { client_id: client.id });
      if (state.mode === 'demo') toast('WhatsApp ouvert (démo)', 'info');
    });
  },

  email(client) {
    if (!client.email) { toast('Pas d\'email', 'warning'); return; }
    this.openMessageTemplates(client, 'email', (msg, subject) => {
      const url = `mailto:${encodeURIComponent(client.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(msg)}`;
      window.location.href = url;
      audit('email_send', { client_id: client.id });
      if (state.mode === 'demo') toast('Email ouvert (démo)', 'info');
    });
  },

  call(client) {
    if (!client.telephone) { toast('Pas de numéro', 'warning'); return; }
    window.location.href = 'tel:' + client.telephone.replace(/\s/g, '');
    audit('call', { client_id: client.id });

      },
      {
        label: '📅 Relance pour RDV',
        subject: 'Programmons votre prochaine séance',
        body: `Bonjour ${firstName},\n\nIl est temps de programmer votre prochaine séance ! Voici mon agenda :\nhttps://cal.com/annuaire-youpi/30min\n\nRéservez le créneau qui vous convient.\n\nÀ très vite,\nEnergy Force`
      },
      {
        label: '✨ Encouragement',
        subject: 'Petit message pour vous',
        body: `Bonjour ${firstName},\n\nJuste un petit message pour vous rappeler le chemin parcouru. Continuez sur votre lancée — chaque pas compte.\n\nÀ bientôt,\nEnergy Force`
      },
      {
        label: '⏰ Rappel de séance',
        subject: 'Rappel — séance demain',
        body: `Bonjour ${firstName},\n\nUn petit rappel pour notre séance prévue demain. À tout à l'heure !\n\nEnergy Force`

      title: (isWa ? '💬 WhatsApp · ' : '✉️ Email · ') + client.nom_complet,
      body: `
        <div class="form-group">
          <label class="form-label">Modèle</label>
          <div class="pill-row" id="template-pills">
            ${templates.map((t,i) => `<button class="filter-chip ${i === 0 ? 'active' : ''}" data-i="${i}">${escapeHtml(t.label)}</button>`).join('')}

        </div>
        ${isWa ? '' : `

          </div>
          <div class="form-group">
            <label class="form-label">Nouveau PIN (6 chiffres)<span class="req">*</span></label>
            <input class="form-input" type="password" name="new1" required maxlength="6" inputmode="numeric" pattern="[0-9#]{6}">
          </div>
          <div class="form-group">
            <label class="form-label">Confirmer le nouveau PIN<span class="req">*</span></label>
            <input class="form-input" type="password" name="new2" required maxlength="6" inputmode="numeric" pattern="[0-9#]{6}">
          </div>
          <div class="form-help">PIN faibles refusés (000000, 123456, etc.)</div>
        </form>
      `,
      footer: `
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="document.getElementById('pin-form').requestSubmit()">Enregistrer</button>
      `
    });
  },

  savePin() {
    const f = document.getElementById('pin-form');
    const cur = f.current.value, n1 = f.new1.value, n2 = f.new2.value;
    const stored = localStorage.getItem('ef_pin') || CONFIG.DEFAULT_PIN;
    if (cur !== stored) { toast('PIN actuel incorrect', 'error'); return; }
    if (n1 !== n2) { toast('Les PIN ne correspondent pas', 'error'); return; }
    if (!/^[0-9#]{6}$/.test(n1)) { toast('PIN invalide (6 caractères, chiffres ou #)', 'error'); return; }
    if (PIN.isWeak(n1)) { toast('PIN trop faible', 'error'); return; }
    localStorage.setItem('ef_pin', n1);
    audit('pin_changed');
    closeModal();
    toast('PIN modifié', 'success');
  },

  setBackendUrl() {
    const cur = CONFIG.BACKEND_URL || '';
    openModal({
      title: 'URL du backend Apps Script',
      body: `
        <div class="form-group">
          <label class="form-label">URL de déploiement Apps Script</label>
          <input class="form-input" id="backend-url-input" value="${escapeHtml(cur)}" placeholder="https://script.google.com/macros/s/.../exec">
          <div class="form-help">Colle ici l'URL générée par "Déployer → Application Web" dans l'éditeur Apps Script.</div>
        </div>
      `,
      footer: `
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="Actions.saveBackendUrl()">Enregistrer</button>
      `
    });
  },

  saveBackendUrl() {
    const v = document.getElementById('backend-url-input').value.trim();
    if (v && !/^https:\/\//.test(v)) { toast('URL invalide (https:// requis)', 'error'); return; }
    localStorage.setItem('ef_backend_url', v);
    CONFIG.BACKEND_URL = v;
    closeModal();
    toast('URL backend enregistrée', 'success');
    if (v) App.syncNow();
    App.refreshCurrentView();
  },

  resetDemo() {
    if (state.mode !== 'demo') { toast('Pas en mode démo', 'info'); return; }
    confirmModal('Réinitialiser les données de démonstration ?', () => {
      demoSnapshot = generateDemoData();
      state.data = JSON.parse(JSON.stringify(demoSnapshot));
      App.refreshCurrentView();
      toast('Démo réinitialisée', 'success');
    });
  },

  exportData() {
    const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `energy-force-export-${todayIsoDate()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Export téléchargé', 'success');
  }
};

  attachClientsHandlers() {
    const search = document.getElementById('clients-search');
    if (search) {
      search.addEventListener('input', debounce(e => {
        state.filters.clientSearch = e.target.value;
        App.refreshCurrentView();
        // Restaure le focus
        setTimeout(() => {
          const s = document.getElementById('clients-search');
          if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
        }, 0);
      }, 250));
    }
    document.querySelectorAll('[data-statut]').forEach(b => {
      b.addEventListener('click', () => {
        state.filters.clientStatut = b.dataset.statut;
        App.refreshCurrentView();
      });
    });
  },

      .filter(s => s.client_id === id)

    const color = avatarColor(c.nom_complet);

    return `
      <div class="page-header">

          ${lastSession.recommandations ? `<div class="text-sm mt-2"><strong>Recommandations :</strong> ${nl2br(lastSession.recommandations)}</div>` : ''}

      ` : `
        <div class="session-context">
          <div class="session-context-label">📌 Première rencontre</div>
          ${c.objectif ? `<div class="text-sm mt-2"><strong>Objectif :</strong> ${nl2br(c.objectif)}</div>` : ''}
          <button class="btn btn-primary btn-sm mt-3" onclick="Actions.openSessionForm(null, '${c.id}')">▶️ Démarrer la séance initiale</button>
        </div>
      `}

      <div class="quick-actions mb-4">
        <button class="qa-btn" onclick='Actions.whatsapp(${JSON.stringify(c).replace(/'/g, "&#39;")})'>
          <span class="icon">💬</span><span>WhatsApp</span>
        </button>
        <button class="qa-btn" onclick='Actions.email(${JSON.stringify(c).replace(/'/g, "&#39;")})'>
          <span class="icon">✉️</span><span>Email</span>
        </button>
        <button class="qa-btn" onclick='Actions.call(${JSON.stringify(c).replace(/'/g, "&#39;")})'>
          <span class="icon">📞</span><span>Appeler</span>
        </button>
        <button class="qa-btn" onclick="Actions.openSessionForm(null, '${c.id}')">
          <span class="icon">＋</span><span>Séance</span>
        </button>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title mb-3">📇 Coordonnées</div>
          <div class="info-line"><div class="info-line-label">Téléphone</div><div class="info-line-value">${c.telephone ? `<a href="tel:${escapeHtml(c.telephone)}">${escapeHtml(c.telephone)}</a>` : '<span class="text-soft">—</span>'}</div></div>
          <div class="info-line"><div class="info-line-label">Email</div><div class="info-line-value">${c.email ? `<a href="mailto:${escapeHtml(c.email)}">${escapeHtml(c.email)}</a>` : '<span class="text-soft">—</span>'}</div></div>
          <div class="info-line"><div class="info-line-label">Métier</div><div class="info-line-value">${escapeHtml(c.metier || '—')}</div></div>
          <div class="info-line"><div class="info-line-label">Typologie</div><div class="info-line-value">${escapeHtml(c.typologie || '—')}</div></div>
          <div class="info-line"><div class="info-line-label">Créé le</div><div class="info-line-value">${fmtDate(c.date_creation)}</div></div>
        </div>

        <div class="card">
          <div class="card-title mb-3">🎯 Objectif & commentaires</div>
          <div class="info-line"><div class="info-line-label">Objectif</div><div class="info-line-value">${c.objectif ? nl2br(c.objectif) : '<span class="text-soft">—</span>'}</div></div>
          <div class="info-line"><div class="info-line-label">Commentaires</div><div class="info-line-value">${c.commentaires ? nl2br(c.commentaires) : '<span class="text-soft">—</span>'}</div></div>

      <div class="card mt-4">
        <div class="card-header">
          <div class="card-title">📋 Historique des séances · ${sessions.length}</div>
          <button class="btn btn-primary btn-sm" onclick="Actions.openSessionForm(null, '${c.id}')">＋ Nouvelle</button>
        </div>
        ${sessions.length === 0 ? `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-title">Aucune séance enregistrée</div>
            <div class="text-sm">Commence par enregistrer la première séance.</div>
          </div>
        ` : sessions.map(s => `
          <div class="history-item" onclick="App.go('session', {id: '${s.id}'})" style="cursor:pointer;">
            <div class="history-item-head">
              <div class="history-item-date">${fmtDate(s.date)}</div>
              <span class="badge ${this.sessionTypeBadge(s.type)}">${this.sessionTypeLabel(s.type)}</span>
              <div style="margin-left:auto;color:var(--text-soft);">›</div>
            </div>
            ${s.notes ? `<div class="history-item-text">${escapeHtml(s.notes.slice(0, 200))}${s.notes.length > 200 ? '…' : ''}</div>` : '<div class="history-item-text text-soft">Pas de notes</div>'}
          </div>
        `).join('')}
      </div>

      <div class="mt-6" style="text-align:center;">
        <button class="btn btn-ghost" style="color:var(--danger);" onclick="Actions.deleteClient('${c.id}')">🗑️ Supprimer ce client</button>
      </div>
    `;
  },

  // ----- SESSIONS LIST -----
  sessions() {
    const type = state.filters.sessionType;
    let list = [...state.data.sessions];
    if (type !== 'tous') list = list.filter(s => s.type === type);
    list.sort((a,b) => new Date(b.date) - new Date(a.date));

    const counts = {
      tous: state.data.sessions.length,
      initial: state.data.sessions.filter(s => s.type === 'initial').length,
      suivi: state.data.sessions.filter(s => s.type === 'suivi').length,
      controle: state.data.sessions.filter(s => s.type === 'controle').length
    };

    return `
      <div class="page-header">
        <h1 class="page-title">Séances</h1>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="Actions.openSessionForm()">＋ Nouvelle séance</button>
        </div>
      </div>

      <div class="card mb-4">
        <div class="pill-row">
          <button class="filter-chip ${type === 'tous' ? 'active' : ''}" data-stype="tous">Toutes (${counts.tous})</button>
          <button class="filter-chip ${type === 'initial' ? 'active' : ''}" data-stype="initial">Initiale (${counts.initial})</button>
          <button class="filter-chip ${type === 'suivi' ? 'active' : ''}" data-stype="suivi">Suivi (${counts.suivi})</button>
          <button class="filter-chip ${type === 'controle' ? 'active' : ''}" data-stype="controle">Contrôle (${counts.controle})</button>
        </div>
      </div>

      ${list.length === 0 ? `
        <div class="card">
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-title">Aucune séance</div>
            <div class="text-sm mb-4">Crée ta première séance.</div>
            <button class="btn btn-primary" onclick="Actions.openSessionForm()">＋ Nouvelle séance</button>
          </div>
        </div>
      ` : `
        <div class="list">
          ${list.map(s => {
            const c = state.data.clients.find(cl => cl.id === s.client_id);
            const nom = c ? c.nom_complet : (s.client_nom || 'Client supprimé');
            const color = avatarColor(nom);
            return `
              <div class="list-item" onclick="App.go('session', {id: '${s.id}'})">
                <div class="avatar" style="background:${color}20;color:${color};">${initials(nom)}</div>
                <div class="grow">
                  <div class="row" style="gap:8px;flex-wrap:wrap;">
                    <div class="font-semibold">${escapeHtml(nom)}</div>
                    <span class="badge ${this.sessionTypeBadge(s.type)}">${this.sessionTypeLabel(s.type)}</span>
                  </div>
                  <div class="text-sm text-muted">${fmtDate(s.date)}</div>
                  ${s.notes ? `<div class="text-xs text-soft truncate mt-2">${escapeHtml(s.notes.slice(0, 100))}${s.notes.length>100?'…':''}</div>` : ''}
                </div>
                <div style="font-size:18px;color:var(--text-soft);">›</div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    `;
  },

  attachSessionsHandlers() {
    document.querySelectorAll('[data-stype]').forEach(b => {
      b.addEventListener('click', () => {
        state.filters.sessionType = b.dataset.stype;
        App.refreshCurrentView();
      });
    });
  },

  // ----- SESSION DETAIL -----
  sessionDetail(id) {
    const s = state.data.sessions.find(x => x.id === id);
    if (!s) {
      return `
        <div class="card">
          <div class="empty-state">
            <div class="empty-state-icon">❓</div>
            <div class="empty-state-title">Séance introuvable</div>
            <button class="btn btn-primary mt-4" onclick="App.go('sessions')">← Retour aux séances</button>
          </div>
        </div>`;
    }
    const c = state.data.clients.find(cl => cl.id === s.client_id);
    const nom = c ? c.nom_complet : (s.client_nom || 'Client supprimé');

    return `
      <div class="page-header">
        <button class="icon-btn" onclick="App.go('sessions')" title="Retour">←</button>
        <h1 class="page-title">Séance</h1>
        <span class="badge ${this.sessionTypeBadge(s.type)}">${this.sessionTypeLabel(s.type)}</span>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick='Actions.openSessionForm(${JSON.stringify(s).replace(/'/g, "&#39;")})'>✏️ Modifier</button>
        </div>
      </div>

      <div class="card mb-4">
        <div class="row" style="gap:12px;">
          <div class="avatar lg" style="background:${avatarColor(nom)}20;color:${avatarColor(nom)};">${initials(nom)}</div>
          <div class="grow">
            <div class="font-semibold text-lg">${escapeHtml(nom)}</div>
            <div class="text-sm text-muted">${fmtDate(s.date)}</div>
          </div>
          ${c ? `<button class="btn btn-secondary btn-sm" onclick="App.go('client', {id:'${c.id}'})">Voir fiche</button>` : ''}
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-title mb-3">✓ Réalisé</div>

        <div class="card-title mb-3">📝 Notes</div>
        <div class="text-sm" style="white-space:pre-wrap;line-height:1.6;">${s.notes ? escapeHtml(s.notes) : '<span class="text-soft">Pas de notes</span>'}</div>
      </div>

      <div class="card mb-4">
        <div class="card-title mb-3">🎯 Recommandations</div>
        <div class="text-sm" style="white-space:pre-wrap;line-height:1.6;">${s.recommandations ? escapeHtml(s.recommandations) : '<span class="text-soft">Aucune recommandation notée</span>'}</div>
      </div>

      <div class="mt-6" style="text-align:center;">
        <button class="btn btn-ghost" style="color:var(--danger);" onclick="Actions.deleteSession('${s.id}')">🗑️ Supprimer cette séance</button>
      </div>
    `;
  },

  // ----- BOOKINGS -----
  bookings() {
    const today = todayIsoDate();
    const pending = state.data.bookings.filter(b => b.statut === 'en_attente')
      .sort((a,b) => (a.date_rdv + a.heure_rdv).localeCompare(b.date_rdv + b.heure_rdv));
    const validated = state.data.bookings.filter(b => b.statut === 'valide' && b.date_rdv >= today)
      .sort((a,b) => (a.date_rdv + a.heure_rdv).localeCompare(b.date_rdv + b.heure_rdv));
    const past = state.data.bookings.filter(b => b.statut === 'valide' && b.date_rdv < today)
      .sort((a,b) => (b.date_rdv + b.heure_rdv).localeCompare(a.date_rdv + a.heure_rdv));
    const refused = state.data.bookings.filter(b => b.statut === 'refuse')
      .sort((a,b) => new Date(b.date_reception) - new Date(a.date_reception));

    const renderBooking = (b) => {
      const dateStr = `${fmtDate(b.date_rdv)} · ${escapeHtml(b.heure_rdv)}`;
      const cls = b.statut === 'en_attente' ? '' : (b.statut === 'valide' ? 'confirmed' : 'refused');
      return `
        <div class="booking-card ${cls} mb-3">
          <div class="row" style="gap:12px;flex-wrap:wrap;">
            <div class="avatar" style="background:${avatarColor(b.nom)}20;color:${avatarColor(b.nom)};">${initials(b.nom)}</div>
            <div class="grow">
              <div class="font-semibold">${escapeHtml(b.nom)}</div>
              <div class="text-sm text-muted">${dateStr}</div>
            </div>
            ${b.statut === 'en_attente' ? '<span class="badge badge-warning">en attente</span>' :
              b.statut === 'valide' ? '<span class="badge badge-success">validé</span>' :
              '<span class="badge badge-neutral">refusé</span>'}
          </div>
          <div class="text-sm text-muted mt-3" style="display:flex;gap:14px;flex-wrap:wrap;">
            ${b.email ? `<span>✉️ <a href="mailto:${escapeHtml(b.email)}">${escapeHtml(b.email)}</a></span>` : ''}
            ${b.telephone ? `<span>📞 <a href="tel:${escapeHtml(b.telephone)}">${escapeHtml(b.telephone)}</a></span>` : ''}
          </div>
          ${b.message ? `<div class="text-sm mt-3" style="background:var(--bg-soft);padding:10px;border-radius:8px;white-space:pre-wrap;">${escapeHtml(b.message)}</div>` : ''}
          <div class="row mt-3" style="gap:8px;flex-wrap:wrap;">
            ${b.statut === 'en_attente' ? `
              <button class="btn btn-success btn-sm" onclick="Actions.setBookingStatus('${b.id}','valide')">✓ Valider</button>
              <button class="btn btn-danger btn-sm" onclick="Actions.setBookingStatus('${b.id}','refuse')">✕ Refuser</button>
            ` : b.statut === 'refuse' ? `
              <button class="btn btn-secondary btn-sm" onclick="Actions.setBookingStatus('${b.id}','en_attente')">↺ Remettre en attente</button>
            ` : `
              <button class="btn btn-secondary btn-sm" onclick="Actions.setBookingStatus('${b.id}','en_attente')">↺ Remettre en attente</button>
            `}
            <button class="btn btn-ghost btn-sm" onclick='Actions.openBookingForm(${JSON.stringify(b).replace(/'/g, "&#39;")})'>✏️ Modifier</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="Actions.deleteBooking('${b.id}')">🗑️ Supprimer</button>
          </div>
        </div>
      `;
    };

    return `
      <div class="page-header">
        <h1 class="page-title">Réservations</h1>
        <div class="page-actions">
          <a class="btn btn-secondary" href="https://app.cal.com/bookings/upcoming" target="_blank" rel="noopener">📥 Voir cal.com</a>
          <button class="btn btn-primary" onclick="Actions.openBookingForm()">＋ Saisir un RDV</button>
        </div>
      </div>

      <div class="card mb-4" style="background:var(--info-soft);border-color:#bae6fd;">
        <div class="text-sm" style="color:#075985;">
          💡 <strong>Workflow :</strong> Les réservations cal.com arrivent par email. Saisis les infos via <em>＋ Saisir un RDV</em>, puis valide ou refuse. Une validation propose automatiquement de créer la fiche client.
        </div>
      </div>

      ${pending.length > 0 ? `
        <h2 class="text-lg font-semibold mb-3">⚠️ À traiter (${pending.length})</h2>
        ${pending.map(renderBooking).join('')}
      ` : ''}

      ${validated.length > 0 ? `
        <h2 class="text-lg font-semibold mt-6 mb-3">📅 RDV à venir (${validated.length})</h2>
        ${validated.map(renderBooking).join('')}
      ` : ''}

      ${past.length > 0 ? `
        <h2 class="text-lg font-semibold mt-6 mb-3">⏳ RDV passés (${past.length})</h2>
        ${past.slice(0, 10).map(renderBooking).join('')}
      ` : ''}

      ${refused.length > 0 ? `
        <h2 class="text-lg font-semibold mt-6 mb-3">✕ Refusés (${refused.length})</h2>
        ${refused.slice(0, 10).map(renderBooking).join('')}
      ` : ''}

      ${state.data.bookings.length === 0 ? `
        <div class="card">
          <div class="empty-state">
            <div class="empty-state-icon">📅</div>
            <div class="empty-state-title">Aucune réservation</div>
            <div class="text-sm mb-4">Quand tu reçois un email de cal.com, saisis-le ici.</div>
            <button class="btn btn-primary" onclick="Actions.openBookingForm()">＋ Saisir un RDV</button>
          </div>
        </div>
      ` : ''}
    `;
  },

  // ----- SETTINGS -----

    const backendUrl = CONFIG.BACKEND_URL || '';
    const auditCount = JSON.parse(localStorage.getItem('ef_audit') || '[]').length;
    return `
      <div class="page-header">
        <h1 class="page-title">Paramètres</h1>
      </div>

      <div class="card mb-4">
        <div class="card-title mb-3">🔐 Sécurité</div>
        <div class="settings-list">
          <button class="settings-item" onclick="Actions.changePin()">
            <div class="settings-item-icon">🔢</div>
            <div class="settings-item-label">Changer le PIN</div>
            <div class="settings-item-value">›</div>
          </button>
          <button class="settings-item" onclick="App.go('audit')">
            <div class="settings-item-icon">📜</div>
            <div class="settings-item-label">Journal d'audit</div>
            <div class="settings-item-value">${auditCount} entrées ›</div>
          </button>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-title mb-3">☁️ Synchronisation</div>
        <div class="settings-list">
          <button class="settings-item" onclick="Actions.setBackendUrl()">
            <div class="settings-item-icon">🔗</div>
            <div class="settings-item-label">URL du backend Apps Script</div>
            <div class="settings-item-value">${backendUrl ? '✓ Configuré' : 'Non configuré'} ›</div>
          </button>
          <button class="settings-item" onclick="App.syncNow()">
            <div class="settings-item-icon">🔄</div>
            <div class="settings-item-label">Synchroniser maintenant</div>
            <div class="settings-item-value">›</div>
          </button>
          <button class="settings-item" onclick="Actions.exportData()">
            <div class="settings-item-icon">⬇️</div>
            <div class="settings-item-label">Exporter mes données (JSON)</div>
            <div class="settings-item-value">›</div>
          </button>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-title mb-3">📅 Liens cal.com</div>
        <div class="settings-list">
          <a class="settings-item" href="https://cal.com/annuaire-youpi/30min" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
            <div class="settings-item-icon">🔗</div>
            <div class="settings-item-label">Page de réservation publique</div>
            <div class="settings-item-value">↗</div>
          </a>
          <a class="settings-item" href="https://app.cal.com/event-types/1576938?tabName=availability" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
            <div class="settings-item-icon">📆</div>
            <div class="settings-item-label">Régler mes disponibilités</div>
            <div class="settings-item-value">↗</div>
          </a>
          <a class="settings-item" href="https://app.cal.com/bookings/upcoming" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
            <div class="settings-item-icon">📥</div>
            <div class="settings-item-label">Mes RDV sur cal.com</div>
            <div class="settings-item-value">↗</div>
          </a>
        </div>
      </div>

      ${state.mode === 'demo' ? `
        <div class="card mb-4" style="border-color:var(--warning);">
          <div class="card-title mb-3">🎭 Mode démonstration</div>
          <div class="text-sm text-muted mb-3">Tu es en mode démo. Aucune donnée n'est synchronisée vers Google Sheets.</div>
          <button class="btn btn-warning btn-block" onclick="Actions.resetDemo()">↺ Réinitialiser la démo</button>
        </div>
      ` : ''}

      <div class="card mb-4">
        <div class="card-title mb-3">ℹ️ À propos</div>
        <div class="info-line"><div class="info-line-label">Application</div><div class="info-line-value">Energy Force CRM</div></div>
        <div class="info-line"><div class="info-line-label">Version</div><div class="info-line-value">${VERSION} — 2026</div></div>
        <div class="info-line"><div class="info-line-label">Mode</div><div class="info-line-value">${state.mode === 'demo' ? '🎭 Démonstration' : '✓ Réel'}</div></div>
      </div>
    `;
  },

  audit() {
    const log = JSON.parse(localStorage.getItem('ef_audit') || '[]');
    return `
      <div class="page-header">
        <button class="icon-btn" onclick="App.go('settings')">←</button>
        <h1 class="page-title">Journal d'audit</h1>
        <div class="page-actions">
          <button class="btn btn-ghost btn-sm" onclick="if(confirm('Effacer le journal local ?')){localStorage.removeItem('ef_audit');App.refreshCurrentView();}">Effacer</button>
        </div>
      </div>
      <div class="card">
        ${log.length === 0 ? `
          <div class="empty-state">
            <div class="empty-state-icon">📜</div>
            <div class="empty-state-title">Aucune entrée</div>
          </div>
        ` : `
          <div class="list">
            ${log.slice(0, 100).map(e => `
              <div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;">
                <div class="row" style="gap:8px;">
                  <span class="font-semibold">${escapeHtml(e.action)}</span>
                  ${e.mode === 'demo' ? '<span class="badge badge-warning">démo</span>' : ''}
                  <span class="text-soft" style="margin-left:auto;">${fmtDateTime(e.timestamp)}</span>
                </div>
                ${Object.keys(e.details || {}).length ? `<div class="text-xs text-muted mt-2" style="font-family:monospace;">${escapeHtml(JSON.stringify(e.details))}</div>` : ''}
              </div>
            `).join('')}
          </div>
        `}
      </div>
    `;
  }
};

/* ============================================================
   BOOT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => App.init());

// Empêche la fermeture accidentelle des modaux par clic extérieur involontaire
window.closeModal = closeModal;
</script>

</body>
</html>
