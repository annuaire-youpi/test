  const hasPayment = !!paymentLink;
  const slotLabel = isMulti
    ? `Séjour de ${reservation.daysCount || daysBetween(reservation.startDate, reservation.endDate)} jours`
    : (DURATIONS.find(d => d.id === reservation.durationType)?.label || reservation.durationType);
  const dateLabel = isMulti
    ? `du ${fmtDate(reservation.startDate)} au ${fmtDate(reservation.endDate)}`
    : fmtDate(reservation.startDate);

  modal(`
    <div class="modal-header">
      <h3>✅ Demande envoyée</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p class="mb-2">Votre demande de réservation pour <strong>${escapeHtml(boat.name)}</strong> a bien été enregistrée.</p>
      <div style="background: var(--surface-2); padding: 16px; border-radius: var(--radius); margin-bottom: 16px;">
        <div class="small text-muted mb-1">Détails</div>
        <div><strong>${isMulti ? 'Période' : 'Date'} :</strong> ${dateLabel}</div>
        <div><strong>Formule :</strong> ${escapeHtml(slotLabel)}</div>
        <div><strong>Total :</strong> ${fmtEUR(reservation.totalPrice)}</div>
      </div>
      <p class="small text-muted mb-2">📧 Une confirmation a été envoyée à <strong>${escapeHtml(reservation.clientEmail)}</strong>. Vous pouvez retrouver toutes vos réservations à tout moment dans la rubrique « Mes réservations ».</p>
      ${hasPayment ? `
        <p class="mb-2">Vous pouvez régler dès maintenant pour confirmer votre réservation :</p>
        <a class="btn btn-primary btn-block btn-lg" href="${escapeHtml(paymentLink)}" target="_blank" rel="noopener" onclick="setTimeout(closeModal, 500)">💳 Procéder au paiement</a>
        <p class="small text-muted text-center mt-2">Vous serez redirigé vers une plateforme sécurisée.</p>
      ` : `
        <p>Le propriétaire <strong>${escapeHtml(boat.proName)}</strong> va vous contacter rapidement pour confirmer et finaliser le paiement.</p>
      `}
      <div class="flex gap-1 mt-2">
        <button class="btn btn-secondary flex-1" onclick="closeModal(); navigate('/')">Retour au catalogue</button>
        <button class="btn btn-ghost flex-1" onclick="closeModal(); navigate('/client')">Mes réservations</button>
      </div>
      ${state.mode === 'demo' ? `<p class="small text-muted text-center mt-2" style="color: var(--demo);">⚠️ Mode démo : aucun email réel n'a été envoyé</p>` : ''}
    </div>
  `);

  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pwd = document.getElementById('loginPwd').value;
  if (!email || !pwd) { toast('Email et mot de passe requis', 'warning'); return; }

  // Verrouillage progressif
  const lockKey = 'lock_' + email;
  const lockData = cache.get(lockKey) || { attempts: 0, lockedUntil: 0 };
  if (lockData.lockedUntil > Date.now()) {
    const minutes = Math.ceil((lockData.lockedUntil - Date.now()) / 60000);
    toast(`Compte verrouillé. Réessayez dans ${minutes} min.`, 'error');
    return;
  }

  showLoader();
  try {
    const res = await syncToBackend('loginPro', { email, password: pwd });
    hideLoader();
    if (res?.success) {
      state.currentUser = { type: 'pro', ...res.data };
      cache.set(lockKey, { attempts: 0, lockedUntil: 0 });
      audit('login_success');
      closeModal();
      toast(`Bienvenue, ${state.currentUser.name} !`, 'success');
      navigate('/pro/dashboard');
    } else {
      lockData.attempts++;
      if (lockData.attempts >= 15) lockData.lockedUntil = Date.now() + 86400000;
      else if (lockData.attempts >= 10) lockData.lockedUntil = Date.now() + 3600000;
      else if (lockData.attempts >= 5) lockData.lockedUntil = Date.now() + 300000;
      cache.set(lockKey, lockData);
      audit('login_failed', { email });
      toast(res?.error || 'Identifiants incorrects', 'error');
    }
  } catch (e) {
    hideLoader();
    toast('Erreur de connexion au serveur', 'error');
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const company = document.getElementById('regCompany').value.trim();
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const phone = document.getElementById('regPhone').value.trim();
  const pwd = document.getElementById('regPwd').value;

  if (!name || !email || !phone || !pwd) { toast('Champs requis manquants', 'warning'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email invalide', 'warning'); return; }
  if (!isStrongPin(pwd)) { toast('Mot de passe trop simple. Évitez 123456, 000000, etc.', 'warning'); return; }

  showLoader();
  try {
    const res = await syncToBackend('registerPro', { name, company, email, phone, password: pwd });
    hideLoader();
    if (res?.success) {
      state.currentUser = { type: 'pro', ...res.data };
      audit('register_success');
      closeModal();
      toast('Compte créé ! Bienvenue sur Ti Kanno.', 'success');
      navigate('/pro/dashboard');

      toast(res?.error || 'Erreur lors de l\'inscription', 'error');
    }
  } catch (e) {
    hideLoader();
    toast('Erreur de connexion au serveur', 'error');
  }
}

function tryAdminLogin() {
  const pwd = document.getElementById('adminPwd')?.value || '';
  // En démo, mot de passe simple "admin". En réel, on vérifie côté backend.
  if (state.mode === 'demo') {
    if (pwd === 'admin') {
      try { sessionStorage.setItem(ADMIN_PASSWORD_KEY, '1'); } catch {}
      viewAdmin();
    } else {
      toast('Mot de passe incorrect', 'error');
    }
    return;
  }
  // Mode réel : appel backend
  syncToBackend('adminLogin', { password: pwd }).then(res => {
    if (res?.success) {
      try { sessionStorage.setItem(ADMIN_PASSWORD_KEY, '1'); } catch {}
      viewAdmin();
    } else {
      toast(res?.error || 'Mot de passe incorrect', 'error');
    }
  });
}

function adminLogout() {
  try { sessionStorage.removeItem(ADMIN_PASSWORD_KEY); } catch {}
  navigate('/');
}

    try {
      const res = await syncToBackend('adminListPendingVerifications', {});
      if (res?.success) pending = res.data || [];
    } catch (e) { log('admin list fail', e); }
  }

  if (pending.length === 0) {
    content.innerHTML = `
      <div class="empty-state" style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);">

                <div style="flex: 1; min-width: 0;">

async function adminApprove(proId) {
  if (!confirm('Confirmer la certification de ce pro comme « Pro Vérifié » ?')) return;
  showLoader();
  try {
    if (state.mode === 'demo') {
      const pro = state.demoSnapshot.pros.find(p => p.id === proId);
      if (pro) {
        pro.verificationStatus = 'verified';
        pro.verifiedAt = new Date().toISOString();
        // Si c'est le pro actuellement connecté, mettre à jour aussi state.currentUser
        if (state.currentUser?.id === proId) {
          state.currentUser.verificationStatus = 'verified';
          state.currentUser.verifiedAt = pro.verifiedAt;
        }
      }
    } else {
      await syncToBackend('adminApproveVerification', { proId });
    }
    audit('admin_approve_verification', { proId });
    hideLoader();
    toast('Pro certifié ! Un email de notification a été envoyé.', 'success');
    loadAdminPendingVerifications();
  } catch (e) {
    hideLoader();
    toast('Erreur lors de l\'approbation', 'error');
  }
}

async function adminReject(proId) {
  const reason = prompt('Motif du refus (sera envoyé au pro par email) :');
  if (!reason) return;
  showLoader();
  try {
    if (state.mode === 'demo') {
      const pro = state.demoSnapshot.pros.find(p => p.id === proId);
      if (pro) {
        pro.verificationStatus = 'rejected';
        pro.verificationRejectReason = reason;
        if (state.currentUser?.id === proId) {
          state.currentUser.verificationStatus = 'rejected';
        }
      }
    } else {
      await syncToBackend('adminRejectVerification', { proId, reason });
    }
    audit('admin_reject_verification', { proId });
    hideLoader();
    toast('Demande refusée. Le pro a été notifié.', 'info');
    loadAdminPendingVerifications();
  } catch (e) {
    hideLoader();
    toast('Erreur lors du refus', 'error');
  }
}

async function loadClientReservations(email) {
  const wrap = document.getElementById('clientResList');
  if (!wrap) return;
  let list = [];
  try {
    if (state.mode === 'demo') {
      list = state.reservations.filter(r => String(r.clientEmail || '').toLowerCase() === String(email).toLowerCase());
    } else {
      const res = await syncToBackend('listReservationsByEmail', { email });
      if (res?.success) list = res.data || [];
    }
  } catch (e) { log('client res fail', e); }

  if (list.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <h3>Aucune réservation trouvée</h3>
        <p>Aucune sortie n'est associée à <strong>${escapeHtml(email)}</strong>. Vérifiez l'orthographe ou explorez notre <a onclick="navigate('/')">catalogue</a>.</p>
      </div>
    `;
    return;
  }

  list.sort((a, b) => String(b.startDate).localeCompare(String(a.startDate)));
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = list.filter(r => r.startDate >= today && r.status !== 'cancelled');
  const past = list.filter(r => r.startDate < today || r.status === 'cancelled');

  wrap.innerHTML = `
    ${upcoming.length ? `
      <h3 style="font-size: 16px; margin-bottom: 12px;">${t('client_upcoming')} (${upcoming.length})</h3>
      ${upcoming.map(r => renderClientResItem(r)).join('')}
    ` : ''}
    ${past.length ? `
      <h3 style="font-size: 16px; margin: 20px 0 12px;">${t('client_history')} (${past.length})</h3>
      ${past.map(r => renderClientResItem(r)).join('')}
    ` : ''}
  `;
}

function renderClientResItem(r) {
  const boat = state.boats.find(b => b.id === r.boatId);
  const policy = boat ? getBoatCancellationPolicy(boat) : null;
  const duration = DURATIONS.find(d => d.id === r.durationType);
  const isMulti = r.isMultiDay || r.durationType === 'multiday';
  const statusPill = {
    pending: { label: 'En attente', cls: 'pill-warning' },
    confirmed: { label: 'Confirmée', cls: 'pill-success' },
    completed: { label: 'Terminée', cls: 'pill-info' },
    cancelled: { label: 'Annulée', cls: 'pill-danger' }
  }[r.status] || { label: r.status, cls: 'pill-neutral' };

  const canCancel = ['pending', 'confirmed'].includes(r.status);
  const canReview = r.status === 'completed';
  const hasReview = state.reviews.some(rev => rev.reservationId === r.id);

  const dateBlock = isMulti
    ? `🏖️ du ${fmtDate(r.startDate)} au ${fmtDate(r.endDate)} (${r.daysCount || daysBetween(r.startDate, r.endDate)} jours)`
    : `📅 ${fmtDate(r.startDate)} · ${duration ? escapeHtml(duration.shortLabel) : r.durationType}`;

  return `
    <div class="res-list-item">
      <div>
        <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap;">
          <strong>${escapeHtml(r.boatName)}</strong>
          <span class="pill ${statusPill.cls}">${statusPill.label}</span>
        </div>
        <div class="small text-muted">
          ${dateBlock} · ${fmtEUR(r.totalPrice)}
          ${r.refundAmount > 0 ? ` · 💸 Remboursé ${fmtEUR(r.refundAmount)}` : ''}
        </div>
        ${policy && canCancel ? `<div class="small text-muted mt-1">📋 Annulation : ${escapeHtml(policy.short)}</div>` : ''}
      </div>
      <div class="res-list-actions">
        ${canCancel ? `<button class="btn btn-ghost btn-sm" onclick="clientCancelReservation('${r.id}')">${t('client_cancel')}</button>` : ''}
        ${canReview && !hasReview ? `<button class="btn btn-secondary btn-sm" onclick="clientReviewReservation('${r.id}')">${t('client_review')}</button>` : ''}
        ${canReview && hasReview ? `<span class="small text-muted">${t('client_review_done')}</span>` : ''}
      </div>
    </div>
  `;
}

function clientCancelReservation(rid) {
  const r = state.reservations.find(x => x.id === rid) ||
            (state._clientResCache || []).find(x => x.id === rid);
  if (!r) {
    // Cas backend : la résa n'est peut-être pas dans state.reservations
    // On essaie via les données chargées dans loadClientReservations
    toast('Réservation introuvable', 'error');
    return;
  }
  const boat = state.boats.find(b => b.id === r.boatId);
  const policy = boat ? getBoatCancellationPolicy(boat) : CANCELLATION_POLICIES[1];
  const refundCalc = calculateRefund(r, boat?.cancellationPolicy, new Date());

  modal(`
    <div class="modal-header"><h3>✕ Annuler ma réservation</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="background: var(--surface-2); padding: 14px; border-radius: var(--radius); margin-bottom: 16px;">
        <strong>${escapeHtml(r.boatName)}</strong><br>
        <span class="small">${fmtDate(r.startDate)} · ${DURATIONS.find(d => d.id === r.durationType)?.shortLabel}</span>
      </div>
      <div class="policy-info">
        <strong>Politique ${policy.label.toLowerCase()}</strong> — ${escapeHtml(policy.description)}
      </div>
      <div class="info-grid" style="margin: 0 0 16px; padding: 14px;">
        <div class="info-item"><div class="info-label">Total payé</div><div class="info-value">${fmtEUR(r.totalPrice)}</div></div>
        <div class="info-item"><div class="info-label">À ${refundCalc.daysBefore} jour(s)</div><div class="info-value">${refundCalc.pct}% remboursés</div></div>

async function confirmClientCancel(rid, refundAmount) {
  showLoader();
  try {
    if (state.mode === 'demo') {
      const r = state.reservations.find(x => x.id === rid);
      if (r) {
        r.status = 'cancelled';
        r.paymentStatus = r.paymentStatus === 'paid' ? (refundAmount > 0 ? 'refunded' : 'paid') : 'cancelled';
        r.refundAmount = refundAmount;
        r.cancelledAt = new Date().toISOString();
      }
    } else {
      await syncToBackend('updateReservation', {
        id: rid, status: 'cancelled',
        paymentStatus: refundAmount > 0 ? 'refunded' : 'cancelled',
        refundAmount, cancelledAt: new Date().toISOString(),
        cancelledByClient: true
      });
    }
    audit('client_cancel', { id: rid, refund: refundAmount });
    hideLoader();
    closeModal();
    toast(refundAmount > 0 ? `Annulée. Vous serez remboursé de ${fmtEUR(refundAmount)}.` : 'Annulée.', 'success');
    viewClientReservations();
  } catch (e) {
    hideLoader();
    toast('Erreur lors de l\'annulation', 'error');
  }
}

function clientReviewReservation(rid) {
  const r = state.reservations.find(x => x.id === rid);
  if (!r) return;
  openReviewForm(r.boatId, { reservationId: r.id, clientName: r.clientName });
}

async function viewClientReservationByToken(token) {

function renderDashboardCharts(reservations, boats) {
  if (typeof Chart === 'undefined') { log('Chart.js not loaded'); return; }
  Chart.defaults.font.family = "Plus Jakarta Sans, system-ui, sans-serif";
  Chart.defaults.color = '#5a6577';

  // 1) Revenus 6 derniers mois (bar chart)
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'), label: d.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }) });
  }
  const revenueByMonth = months.map(m => {
    return reservations.filter(r => r.paymentStatus === 'paid' && String(r.startDate).startsWith(m.key))
      .reduce((s, r) => s + (r.totalPrice || 0), 0);
  });
  const ctx1 = document.getElementById('chartRevenue');
  if (ctx1) {
    if (ctx1._chart) ctx1._chart.destroy();
    ctx1._chart = new Chart(ctx1.getContext('2d'), {
      type: 'bar',
      data: {
        labels: months.map(m => m.label),
        datasets: [{ label: 'Revenus', data: revenueByMonth, backgroundColor: '#0e6e6e', borderRadius: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmtEUR(c.parsed.y) } } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => v >= 1000 ? (v / 1000) + 'k€' : v + '€' } } }
      }
    });
  }

  // 2) Statuts (doughnut)
  const statusCounts = { confirmed: 0, pending: 0, completed: 0, cancelled: 0 };
  reservations.forEach(r => { statusCounts[r.status] = (statusCounts[r.status] || 0) + 1; });
  const ctx2 = document.getElementById('chartStatus');
  if (ctx2) {
    if (ctx2._chart) ctx2._chart.destroy();
    ctx2._chart = new Chart(ctx2.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ['Confirmées', 'En attente', 'Terminées', 'Annulées'],
        datasets: [{
          data: [statusCounts.confirmed, statusCounts.pending, statusCounts.completed, statusCounts.cancelled],
          backgroundColor: ['#16a34a', '#d97706', '#2563eb', '#dc2626'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12 } } }
      }
    });
  }

  // 3) Réservations par bateau (horizontal bar)
  const byBoat = {};
  reservations.forEach(r => { byBoat[r.boatName || r.boatId] = (byBoat[r.boatName || r.boatId] || 0) + 1; });
  const sorted = Object.entries(byBoat).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const ctx3 = document.getElementById('chartBoats');
  if (ctx3) {
    if (ctx3._chart) ctx3._chart.destroy();
    ctx3._chart = new Chart(ctx3.getContext('2d'), {
      type: 'bar',
      data: {
        labels: sorted.map(s => s[0]),
        datasets: [{ data: sorted.map(s => s[1]), backgroundColor: '#14a3a3', borderRadius: 6 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });
  }
}

const PRO_NAV_PRIMARY_IDS = ['dashboard', 'boats', 'reservations', 'reviews'];

function renderProNavItems(nav, active) {
  const primary = nav.filter(n => PRO_NAV_PRIMARY_IDS.indexOf(n.id) !== -1);
  const secondary = nav.filter(n => PRO_NAV_PRIMARY_IDS.indexOf(n.id) === -1);
  const isSecondaryActive = secondary.some(n => n.id === active);

  return `
    ${nav.map(n => {
      const isPrimary = PRO_NAV_PRIMARY_IDS.indexOf(n.id) !== -1;
      const mobileClass = isPrimary ? '' : 'mobile-hidden';
      // Sur desktop : label complet ; sur mobile : shortLabel (via deux <span>)
      return `
        <a class="dash-nav-item ${active === n.id ? 'active' : ''} ${mobileClass}" onclick="navigate('${n.path}')">
          <span class="nav-icon">${n.icon}</span>
          <span class="nav-label nav-label-desktop">${escapeHtml(n.label)}</span>
          <span class="nav-label nav-label-mobile">${escapeHtml(n.shortLabel || n.label)}</span>
        </a>
      `;
    }).join('')}
    <!-- Bouton "Plus" visible UNIQUEMENT sur mobile (CSS) -->
    <a class="dash-nav-item more-btn ${isSecondaryActive ? 'has-active' : ''}" onclick="openProMoreSheet('${active}')" id="proMoreBtn">
      <span class="nav-icon">☰</span>
      <span class="nav-label nav-label-mobile">Plus</span>
    </a>

}

/* CSS-driven : sur mobile (<=900px), on affiche aussi le bouton "Plus".
   Sur desktop il reste masqué (la sidebar montre tout). */
function openProMoreSheet(activeId) {
  // Reconstruit la liste des items secondaires (basée sur le statut admin)
  const baseNav = [
    { id: 'dashboard', label: 'Tableau de bord', icon: '📊', path: '/pro/dashboard' },
    { id: 'boats', label: 'Mes bateaux', icon: '⛵', path: '/pro/boats' },
    { id: 'reservations', label: 'Réservations', icon: '📅', path: '/pro/reservations' },
    { id: 'calendar', label: 'Calendrier', icon: '🗓️', path: '/pro/calendar' },
    { id: 'reviews', label: 'Avis', icon: '⭐', path: '/pro/reviews' },
    { id: 'billing', label: 'Mon abonnement', icon: '💳', path: '/pro/billing' },
    { id: 'verify', label: 'Vérification', icon: '🛟', path: '/pro/verify' },
    { id: 'profile', label: 'Profil', icon: '👤', path: '/pro/profile' },
  ];
  if (isAdmin(state.currentUser)) {
    baseNav.push({ id: 'admin', label: 'Administration', icon: '🛟', path: '/admin' });
  }
  const secondary = baseNav.filter(n => PRO_NAV_PRIMARY_IDS.indexOf(n.id) === -1);

  // Crée le DOM de la bottom-sheet
  const existing = document.getElementById('proMoreSheet');
  if (existing) existing.remove();
  const existingBd = document.getElementById('proMoreBackdrop');
  if (existingBd) existingBd.remove();

  const backdrop = document.createElement('div');
  backdrop.id = 'proMoreBackdrop';
  backdrop.className = 'bottom-sheet-backdrop';
  backdrop.onclick = closeProMoreSheet;
  document.body.appendChild(backdrop);

  const sheet = document.createElement('div');
  sheet.id = 'proMoreSheet';
  sheet.className = 'bottom-sheet';
  sheet.innerHTML = `
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title">Plus d'options</div>
    ${secondary.map(n => `
      <a class="bottom-sheet-item ${activeId === n.id ? 'active' : ''}" onclick="closeProMoreSheet(); navigate('${n.path}');">
        <span class="bs-icon">${n.icon}</span>
        <span class="bs-label">${escapeHtml(n.label)}</span>
      </a>
    `).join('')}
  `;
  document.body.appendChild(sheet);

  // Animation d'ouverture (frame suivante pour que la transition CSS marche)
  requestAnimationFrame(() => {
    backdrop.classList.add('open');
    sheet.classList.add('open');
  });
}

function closeProMoreSheet() {
  const sheet = document.getElementById('proMoreSheet');
  const backdrop = document.getElementById('proMoreBackdrop');
  if (sheet) sheet.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
  setTimeout(() => {
    sheet?.remove();
    backdrop?.remove();
  }, 250);
}

async function toggleBoatStatus(id) {
  const boat = state.myBoats.find(b => b.id === id);
  if (!boat) return;
  const newStatus = boat.status === 'active' ? 'inactive' : 'active';
  boat.status = newStatus;
  if (state.mode === 'demo') {
    const idx = state.boats.findIndex(b => b.id === id);
    if (idx >= 0) state.boats[idx].status = newStatus;
  } else {
    await syncToBackend('updateBoat', { id, status: newStatus });
  }
  audit('boat_toggle', { id, newStatus });
  toast(newStatus === 'active' ? 'Bateau activé' : 'Bateau désactivé', 'success');
  render();
}

    boatFormState = {

      images: [...(normalized.images || [])],

function syncBoatFormFromDOM() {
  const b = boatFormState;
  b.name = document.getElementById('bfName')?.value.trim() || b.name;
  b.type = document.getElementById('bfType')?.value || b.type;
  b.location = document.getElementById('bfLoc')?.value || b.location;
  b.capacity = Number(document.getElementById('bfCap')?.value) || b.capacity;
  b.description = document.getElementById('bfDesc')?.value.trim() || b.description;
  b.withSkipper = document.getElementById('bfSkipper')?.checked ?? b.withSkipper;

  // Récupère les prix et créneaux cochés
  const slots = [];
  DURATIONS.forEach(d => {
    const cb = document.getElementById('slot-' + d.id);
    const pi = document.getElementById('price-' + d.id);
    if (cb && cb.checked) slots.push(d.id);
    if (pi) b.prices[d.id] = Number(pi.value) || 0;
  });
  b.availableSlots = slots.length ? slots : ['day'];
  b.pricePerDay = b.prices.day || b.prices[b.availableSlots[0]] || 0;

  // Récupère les 3 liens de paiement par créneau
  if (!b.paymentLinks) b.paymentLinks = {};
  DURATIONS.forEach(d => {
    const pi = document.getElementById('pay-' + d.id);
    if (pi) b.paymentLinks[d.id] = pi.value.trim();
  });

  // Multi-jours
  if (!b.multiDay) b.multiDay = {};
  const mdCb = document.getElementById('bfMultiDay');
  if (mdCb) b.multiDay.enabled = mdCb.checked;
  const mdMin = document.getElementById('bfMdMin');
  const mdMax = document.getElementById('bfMdMax');
  const mdD3 = document.getElementById('bfMdDisc3');
  const mdD7 = document.getElementById('bfMdDisc7');
  if (mdMin) b.multiDay.minDays = Number(mdMin.value) || 2;
  if (mdMax) b.multiDay.maxDays = Number(mdMax.value) || 14;
  if (mdD3) b.multiDay.discount3plus = Number(mdD3.value) || 0;
  if (mdD7) b.multiDay.discount7plus = Number(mdD7.value) || 0;
}

  syncBoatFormFromDOM();

function selectCancellationPolicy(policyId, editing) {
  syncBoatFormFromDOM();

function toggleSlot(slotId, editing) {
  syncBoatFormFromDOM();
  const cb = document.getElementById('slot-' + slotId);
  const pi = document.getElementById('price-' + slotId);
  const row = document.getElementById('priceRow-' + slotId);
  if (cb && cb.checked) {
    row?.classList.remove('disabled');
    if (pi) pi.disabled = false;
  } else {
    row?.classList.add('disabled');
    if (pi) pi.disabled = true;
  }
}

function suggestPricesFromDay() {
  const dayInput = document.getElementById('price-day');
  const day = Number(dayInput?.value) || 0;
  if (day <= 0) {
    toast('Saisissez d\'abord un prix pour la journée complète', 'warning');
    return;
  }
  const halfInput = document.getElementById('price-halfday');
  const sunsetInput = document.getElementById('price-sunset');
  if (halfInput) halfInput.value = Math.round(day * 0.6);
  if (sunsetInput) sunsetInput.value = Math.round(day * 0.45);
  toast('Tarifs ajustés (60% matin, 45% coucher)', 'success');
}

function addImageUrl() {
  syncBoatFormFromDOM();
  const url = document.getElementById('bfImgUrl').value.trim();
  if (!url) { toast('Veuillez saisir une URL', 'warning'); return; }
  if (!/^https?:\/\/.+/.test(url)) { toast('URL invalide (doit commencer par http:// ou https://)', 'warning'); return; }
  boatFormState.images.push(url);
  toast('Image ajoutée', 'success');
  renderBoatForm(state.myBoats.find(x => x.id === boatFormState.id));
}

async function addImageFile(ev, editing) {
  syncBoatFormFromDOM();
  const files = Array.from(ev.target.files || []);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    try {
      const dataUrl = await resizeImage(file, 800);
      boatFormState.images.push(dataUrl);
    } catch (e) { log('img resize fail', e); }
  }
  toast(files.length + ' image(s) ajoutée(s)', 'success');
  renderBoatForm(editing);
}

function resizeImage(file, maxW) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = reject;
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function removeImage(idx, editing) {
  syncBoatFormFromDOM();
  boatFormState.images.splice(idx, 1);
  renderBoatForm(editing);
}

function toggleEquip(e, editing) {
  syncBoatFormFromDOM();
  const arr = boatFormState.equipment;
  const i = arr.indexOf(e);
  if (i >= 0) arr.splice(i, 1); else arr.push(e);
  renderBoatForm(editing);
}

async function saveBoat(editing) {
  syncBoatFormFromDOM();
  const b = boatFormState;
  if (!b.name) { toast('Le nom du bateau est requis', 'warning'); return; }
  if (b.availableSlots.length === 0) { toast('Sélectionnez au moins un créneau proposé', 'warning'); return; }
  // Vérifie qu'au moins un prix activé est > 0
  const invalidSlots = b.availableSlots.filter(s => !(Number(b.prices[s]) > 0));
  if (invalidSlots.length > 0) {
    const labels = invalidSlots.map(s => DURATIONS.find(d => d.id === s)?.shortLabel || s).join(', ');
    toast(`Prix manquant ou invalide pour : ${labels}`, 'warning');
    return;
  }

  showLoader();
  if (state.mode === 'demo') {
    if (editing) {
      const idx = state.myBoats.findIndex(x => x.id === b.id);
      if (idx >= 0) state.myBoats[idx] = b;
      const gidx = state.boats.findIndex(x => x.id === b.id);
      if (gidx >= 0) state.boats[gidx] = b;
    } else {
      state.myBoats.push(b);
      state.boats.push(b);
    }
    audit(editing ? 'boat_updated' : 'boat_created', { id: b.id });
    hideLoader();
    toast(editing ? 'Bateau mis à jour' : 'Bateau créé', 'success');
    navigate('/pro/boats');
  } else {
    try {
      const action = editing ? 'updateBoat' : 'createBoat';
      const res = await syncToBackend(action, b);
      hideLoader();
      if (res?.success) {
        audit(action, { id: b.id });
        toast(editing ? 'Bateau mis à jour' : 'Bateau créé', 'success');
        await fetchMyBoats();
        navigate('/pro/boats');
      } else {
        toast(res?.error || 'Erreur lors de la sauvegarde', 'error');
      }
    } catch (e) {
      hideLoader();
      toast('Erreur réseau', 'error');
    }
  }
}

  if (!_calCurrent) {
    const now = new Date();
    _calCurrent = { year: now.getFullYear(), month: now.getMonth(), filterBoatId: 'all', filterStatus: 'all' };
  }
  renderProLayout(renderCalendarHTML(), 'calendar');
}

function renderCalendarHTML() {
  const { year, month, filterBoatId, filterStatus } = _calCurrent;
  const monthLabel = new Date(year, month, 1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

  // Filtre les réservations du pro
  const myRes = state.reservations.filter(r => r.proId === state.currentUser.id);
  const filtered = myRes.filter(r => {
    if (filterBoatId !== 'all' && r.boatId !== filterBoatId) return false;
    if (filterStatus !== 'all' && r.status !== filterStatus) return false;
    return true;
  });

  // Mappe par date — les réservations multi-jours sont répétées sur chaque date de leur plage
  const eventsByDate = {};
  filtered.forEach(r => {
    if (!r.startDate) return;
    const isMulti = r.isMultiDay || r.durationType === 'multiday' || (r.endDate && r.endDate !== r.startDate);
    if (!isMulti) {
      if (!eventsByDate[r.startDate]) eventsByDate[r.startDate] = [];
      eventsByDate[r.startDate].push({ ...r, _isMultiSpan: false });
    } else {
      // Étend sur toute la plage
      const start = new Date(r.startDate + 'T00:00:00');
      const end = new Date((r.endDate || r.startDate) + 'T00:00:00');
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const iso = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        if (!eventsByDate[iso]) eventsByDate[iso] = [];
        const isFirst = iso === r.startDate;
        const isLast = iso === (r.endDate || r.startDate);
        eventsByDate[iso].push({ ...r, _isMultiSpan: true, _isFirstDay: isFirst, _isLastDay: isLast });
      }
    }
  });

  // Construit la grille (commence lundi)
  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay() - 1; // 0=Dim → -1, on veut Lun=0
  if (startOffset < 0) startOffset = 6;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayISO = new Date().toISOString().slice(0, 10);

  const cells = [];
  // Jours du mois précédent (grisés)
  const prevMonthDays = new Date(year, month, 0).getDate();
  for (let i = startOffset - 1; i >= 0; i--) {
    cells.push({ day: prevMonthDays - i, iso: null, muted: true });
  }
  // Jours du mois courant
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    cells.push({ day: d, iso, muted: false });
  }
  // Compléter pour 6 lignes
  while (cells.length % 7 !== 0) {
    cells.push({ day: cells.length - daysInMonth - startOffset + 1, iso: null, muted: true });
  }

  const usedBoatIds = [...new Set(filtered.map(r => r.boatId))];

  return `
    <div class="section-head">
      <div><h2>Calendrier agrégé</h2><p>Toutes les réservations de tous vos bateaux en une vue</p></div>
    </div>

    <div class="cal-toolbar">
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">‹ Précédent</button>
        <span class="cal-title">${monthLabel}</span>
        <button class="btn btn-ghost btn-sm" onclick="calNav(1)">Suivant ›</button>
        <button class="btn btn-secondary btn-sm" onclick="calToday()">Aujourd'hui</button>
      </div>
      <div class="cal-nav" style="gap: 6px;">
        <select onchange="calFilterBoat(this.value)" style="padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px;">
          <option value="all" ${filterBoatId === 'all' ? 'selected' : ''}>Tous les bateaux</option>
          ${state.myBoats.map(b => `<option value="${b.id}" ${filterBoatId === b.id ? 'selected' : ''}>${escapeHtml(b.name)}</option>`).join('')}
        </select>
        <select onchange="calFilterStatus(this.value)" style="padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px;">
          <option value="all" ${filterStatus === 'all' ? 'selected' : ''}>Tous statuts</option>
          <option value="pending" ${filterStatus === 'pending' ? 'selected' : ''}>En attente</option>
          <option value="confirmed" ${filterStatus === 'confirmed' ? 'selected' : ''}>Confirmées</option>
          <option value="completed" ${filterStatus === 'completed' ? 'selected' : ''}>Terminées</option>
          <option value="cancelled" ${filterStatus === 'cancelled' ? 'selected' : ''}>Annulées</option>
        </select>
      </div>
    </div>

    <div class="cal-grid">
      ${['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map(d => `<div class="cal-day-header">${d}</div>`).join('')}
      ${cells.map(c => {
        if (!c.iso) return `<div class="cal-day muted"><div class="cal-day-number">${c.day}</div></div>`;
        const events = eventsByDate[c.iso] || [];
        const isToday = c.iso === todayISO;
        return `
          <div class="cal-day ${isToday ? 'today' : ''}">
            <div class="cal-day-number">${c.day}</div>
            ${events.slice(0, 3).map(r => {
              const slotIcon = r._isMultiSpan
                ? (r._isFirstDay ? '🏖️▶' : r._isLastDay ? '◀🏖️' : '🏖️')
                : (r.durationType === 'halfday' ? '🌅' : r.durationType === 'sunset' ? '🌇' : '☀️');
              const color = getBoatColor(r.boatId);
              const statusClass = r.status === 'cancelled' ? 'cancelled' : r.status === 'pending' ? 'pending' : r.status === 'completed' ? 'completed' : '';
              const style = statusClass ? '' : `style="background:${color};"`;
              return `<div class="cal-event ${statusClass}" ${style} onclick="event.stopPropagation(); openReservationDetail('${r.id}')" title="${escapeHtml(r.boatName)} — ${escapeHtml(r.clientName)}">${slotIcon} ${escapeHtml((r.boatName || '').slice(0, 14))}</div>`;
            }).join('')}
            ${events.length > 3 ? `<div class="cal-more">+${events.length - 3} autres</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>

    <div class="cal-legend">
      <strong>Statuts :</strong>
      <span class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--warning);"></span>En attente</span>
      <span class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--info);"></span>Terminée</span>
      <span class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--text-2);"></span>Annulée</span>
      <span class="cal-legend-item"><strong>· Bateaux :</strong></span>
      ${usedBoatIds.slice(0, 6).map(id => {
        const boat = state.myBoats.find(b => b.id === id);
        if (!boat) return '';
        return `<span class="cal-legend-item"><span class="cal-legend-dot" style="background:${getBoatColor(id)};"></span>${escapeHtml(boat.name)}</span>`;
      }).join('')}
    </div>
  `;
}

function calNav(delta) {
  _calCurrent.month += delta;
  if (_calCurrent.month < 0) { _calCurrent.month = 11; _calCurrent.year--; }
  if (_calCurrent.month > 11) { _calCurrent.month = 0; _calCurrent.year++; }
  viewProCalendar();
}
function calToday() {
  const now = new Date();
  _calCurrent.year = now.getFullYear();
  _calCurrent.month = now.getMonth();
  viewProCalendar();
}
function calFilterBoat(boatId) { _calCurrent.filterBoatId = boatId; viewProCalendar(); }
function calFilterStatus(s) { _calCurrent.filterStatus = s; viewProCalendar(); }

                <div class="review-author">${escapeHtml(r.clientName)} <span class="small text-muted">· ${escapeHtml(boat?.name || '—')}</span></div>

            ${r.response ? `
              <div class="review-response">
                <strong>Votre réponse</strong><br>
                ${escapeHtml(r.response)}
                ${hasFeature('respondReviews') ? `<div class="mt-1"><button class="btn btn-ghost btn-sm" onclick="openRespondReview('${r.id}')">✏️ Modifier</button></div>` : ''}
              </div>
            ` : (hasFeature('respondReviews')
              ? `<button class="btn btn-secondary btn-sm mt-1" onclick="openRespondReview('${r.id}')">↪️ Répondre</button>`
              : `<button class="btn btn-secondary btn-sm mt-1 locked-btn" onclick="showUpgradeModal('Répondre publiquement aux avis clients est une fonctionnalité Pro. Cela double votre taux de fidélisation.', 'pro')">↪️ Répondre</button>`)}
          </div>

function openRespondReview(reviewId) {
  const r = state.reviews.find(x => x.id === reviewId);
  if (!r) return;
  modal(`
    <div class="modal-header"><h3>Répondre à l'avis de ${escapeHtml(r.clientName)}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="review-item" style="margin-bottom: 16px;">
        ${renderStars(r.rating, 14)}
        <p class="mt-1 small">${escapeHtml(r.comment)}</p>
      </div>
      <div class="form-group">
        <label>Votre réponse publique</label>
        <textarea id="respText" class="form-control" rows="4" placeholder="Merci pour votre retour...">${escapeHtml(r.response || '')}</textarea>
        <div class="help">Visible publiquement sous l'avis du client.</div>
      </div>
      <button class="btn btn-primary btn-block" onclick="submitRespond('${reviewId}')">Publier ma réponse</button>
    </div>
  `);
}

async function submitRespond(reviewId) {
  const response = document.getElementById('respText').value.trim();
  if (!response) { toast('Saisissez une réponse', 'warning'); return; }
  showLoader();
  try {
    if (state.mode === 'demo') {
      const r = state.reviews.find(x => x.id === reviewId);
      if (r) r.response = response;
    } else {
      const res = await syncToBackend('respondToReview', { id: reviewId, response });
      if (res?.success) {
        const r = state.reviews.find(x => x.id === reviewId);
        if (r) r.response = response;
      } else throw new Error(res?.error || 'Erreur');
    }
    audit('review_response', { id: reviewId });
    hideLoader();
    closeModal();
    toast('Réponse publiée', 'success');
    if (state.view === '/pro/reviews') viewProReviews();
  } catch (e) {
    hideLoader();
    toast('Erreur lors de l\'envoi', 'error');
  }
}

async function confirmCancelReservation(rid, refundAmount) {
  const r = state.reservations.find(x => x.id === rid);
  if (!r) return;
  r.status = 'cancelled';
  r.paymentStatus = r.paymentStatus === 'paid' ? (refundAmount > 0 ? 'refunded' : 'paid') : 'cancelled';
  r.refundAmount = refundAmount;
  r.cancelledAt = new Date().toISOString();
  audit('reservation_cancelled', { id: rid, refund: refundAmount });
  if (state.mode !== 'demo') {
    await syncToBackend('updateReservation', { id: rid, status: 'cancelled', paymentStatus: r.paymentStatus, refundAmount, cancelledAt: r.cancelledAt });
  }
  closeModal();
  toast(refundAmount > 0 ? `Annulée. Remboursement de ${fmtEUR(refundAmount)} à effectuer.` : 'Annulée sans remboursement.', 'info');
  render();
}

async function updateReservation(rid, newStatus) {
  const r = state.reservations.find(x => x.id === rid);
  if (!r) return;
  r.status = newStatus;
  if (newStatus === 'cancelled') r.paymentStatus = 'cancelled';
  audit('reservation_update', { id: rid, newStatus });
  if (state.mode !== 'demo') {
    await syncToBackend('updateReservation', { id: rid, status: newStatus, paymentStatus: r.paymentStatus });
  }
  toast(`Réservation ${newStatus === 'confirmed' ? 'confirmée' : newStatus === 'cancelled' ? 'annulée' : 'mise à jour'}`, 'success');
  closeModal();
  render();
}

async function markPaid(rid) {
  const r = state.reservations.find(x => x.id === rid);
  if (!r) return;
  r.paymentStatus = 'paid';
  audit('payment_marked', { id: rid });
  if (state.mode !== 'demo') {
    await syncToBackend('updateReservation', { id: rid, paymentStatus: 'paid' });

  toast('Marqué comme payé', 'success');
  closeModal();
  render();
}

function sendMockEmail(rid) {
  // En mode démo, simulation. En réel, appel backend qui pourrait envoyer un mail.
  if (state.mode === 'demo') {

async function switchPlan(planId) {
  if (!state.currentUser) return;

  // En mode démo : changement instantané (pas de Stripe)
  if (state.mode === 'demo') {
    state.currentUser.plan = planId;
    const snapPro = state.demoSnapshot?.pros?.find(p => p.id === state.currentUser.id);
    if (snapPro) snapPro.plan = planId;
    const p = getPlan(planId);
    toast(`Plan basculé sur ${p.badge} ${p.label}`, 'success');
    audit('plan_switched_demo', { plan: planId });
    if (state.view === '/pro/billing') viewProBilling();
    else render();
    return;
  }

  // Passage au plan gratuit = annulation de l'abonnement
  if (planId === 'free') {
    if (!confirm('Repasser au plan Gratuit annulera votre abonnement Stripe. Vous garderez l\'accès Pro/Premium jusqu\'à la fin de la période payée. Confirmer ?')) return;
    return cancelStripeSubscription();
  }

  // Demande du code promo (optionnel)
  const promo = await promptPromoCode();
  if (promo === null) return; // L'utilisateur a annulé la modale

  // Crée la session Stripe Checkout côté backend
  showLoader();
  try {
    const res = await syncToBackend('createCheckoutSession', {
      proId: state.currentUser.id,
      email: state.currentUser.email,
      plan: planId,
      promoCode: promo || ''
    });
    hideLoader();
    if (res?.success && res.data?.url) {
      // Redirection vers Stripe Checkout
      window.location.href = res.data.url;
    } else {
      toast(res?.error || 'Impossible de créer la session de paiement', 'error');
    }
  } catch (e) {
    hideLoader();
    toast('Erreur de connexion à Stripe', 'error');
  }
}

function promptPromoCode() {
  return new Promise((resolve) => {
    modal(`
      <div class="modal-header"><h3>💳 Paiement par carte</h3><button class="modal-close" onclick="closeModal(); window._promoResolve && window._promoResolve(null);">×</button></div>
      <div class="modal-body">
        <p class="mb-2">Vous allez être redirigé vers Stripe pour finaliser votre paiement de manière sécurisée.</p>
        <div class="form-group">
          <label>Code promotionnel (optionnel)</label>
          <input type="text" id="promoCode" class="form-control" placeholder="Ex: BETA50" style="text-transform: uppercase;">
          <div class="help">Si vous avez un code promo, saisissez-le ici. Sinon laissez vide.</div>
        </div>
        <div class="flex gap-1">
          <button class="btn btn-secondary flex-1" onclick="closeModal(); window._promoResolve && window._promoResolve(null);">Annuler</button>
          <button class="btn btn-primary flex-1" onclick="(function(){var v=document.getElementById('promoCode').value.trim().toUpperCase();closeModal();window._promoResolve && window._promoResolve(v);})();">Continuer vers Stripe →</button>
        </div>
      </div>
    `);
    window._promoResolve = resolve;
  });
}

async function cancelStripeSubscription() {
  if (!state.currentUser?.stripeSubscription) {
    toast('Aucun abonnement actif à annuler', 'info');
    state.currentUser.plan = 'free';
    return;
  }
  showLoader();
  try {
    const res = await syncToBackend('cancelStripeSubscription', { proId: state.currentUser.id });
    hideLoader();
    if (res?.success) {
      toast('Abonnement annulé. Vous gardez l\'accès jusqu\'à la fin de la période payée.', 'success');
      state.currentUser.plan = 'free';
      state.currentUser.stripeSubscription = null;
      viewProBilling();
    } else {
      toast(res?.error || 'Erreur lors de l\'annulation', 'error');
    }
  } catch (e) {
    hideLoader();
    toast('Erreur de connexion', 'error');
  }
}

/* Gère le retour de Stripe Checkout (success ou cancel) */
async function handleStripeReturn() {
  const hash = window.location.hash;
  if (!hash.includes('stripe_status=')) return;
  const params = new URLSearchParams(hash.split('?')[1] || '');
  const status = params.get('stripe_status');
  const sessionId = params.get('session_id');

  // Nettoie l'URL pour éviter de re-traiter
  history.replaceState(null, '', '#/pro/billing');

  if (status === 'cancel') {
    toast('Paiement annulé', 'info');
    return;
  }
  if (status === 'success' && sessionId) {
    showLoader();
    try {
      const res = await syncToBackend('verifyCheckoutSession', { sessionId, proId: state.currentUser.id });
      hideLoader();
      if (res?.success) {
        state.currentUser.plan = res.data.plan;
        state.currentUser.stripeSubscription = res.data.subscription;
        toast(`🎉 Abonnement activé ! Bienvenue dans le plan ${getPlan(res.data.plan).label}.`, 'success');
        audit('plan_upgraded_stripe', { plan: res.data.plan });
        viewProBilling();
      } else {
        toast(res?.error || 'Impossible de vérifier le paiement', 'error');
      }
    } catch (e) {
      hideLoader();
      toast('Erreur de vérification du paiement', 'error');
    }
  }
}

function simulateValidateVerification() {
  state.currentUser.verificationStatus = 'verified';
  state.currentUser.verifiedAt = new Date().toISOString();
  const snapPro = state.demoSnapshot?.pros?.find(p => p.id === state.currentUser.id);

function simulateResetVerification() {
  state.currentUser.verificationStatus = 'not_started';
  state.currentUser.verificationDocs = {};
  delete state.currentUser.verifiedAt;
  const snapPro = state.demoSnapshot?.pros?.find(p => p.id === state.currentUser.id);
  if (snapPro) { snapPro.verificationStatus = 'not_started'; snapPro.verificationDocs = {}; delete snapPro.verifiedAt; }

  viewProVerification();
}

/* ---------- PWA SETUP ----------
   On génère un manifest dynamique pour permettre l'ajout à l'écran
   d'accueil sur iOS (Safari) et Android (Chrome). On n'utilise PAS de
   Service Worker car celui-ci impose un fichier .js séparé sur le
   même domaine (contrainte de sécurité des navigateurs). */
let _pwaDeferredPrompt = null;

function setupPWA() {
  const iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="#0e6e6e"/><text x="256" y="340" font-size="280" text-anchor="middle" fill="white" font-family="system-ui">⛵</text></svg>';
  const iconURL = 'data:image/svg+xml;utf8,' + encodeURIComponent(iconSVG);
  const manifest = {
    name: 'Ti Kanno — Louer un bateau en Martinique',
    short_name: 'Ti Kanno',
    description: 'Louez votre bateau avec skipper en Martinique. Marketplace nautique 100% locale.',
    start_url: './',
    scope: './',
    display: 'standalone',
    background_color: '#fafaf7',
    theme_color: '#0e6e6e',
    orientation: 'any',
    lang: 'fr-FR',
    icons: [
      { src: iconURL, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: iconURL, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.head.appendChild(link);
    log('manifest injected');
  } catch (e) { log('manifest fail', e); }

  // Détection : la PWA est-elle déjà installée ?
  // - display-mode: standalone → ouverte depuis l'icône (Chrome/Android, Edge, Safari iOS récent)
  // - navigator.standalone → fallback iOS Safari ancien
  // - flag tk_pwa_installed dans localStorage → mémoire de l'install
  function isPWAInstalled() {
    try {
      if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
      if (window.matchMedia && window.matchMedia('(display-mode: minimal-ui)').matches) return true;
      if (window.navigator.standalone === true) return true;
      if (localStorage.getItem('tk_pwa_installed') === '1') return true;
    } catch {}
    return false;
  }

  // Captation de l'évènement d'installation Chrome / Android (si disponible)
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _pwaDeferredPrompt = e;
    if (!isPWAInstalled()) {
      document.getElementById('installBtn')?.classList.add('visible');
    }
    log('PWA installable (prompt natif disponible)');
  });

  window.addEventListener('appinstalled', () => {
    _pwaDeferredPrompt = null;
    try { localStorage.setItem('tk_pwa_installed', '1'); } catch {}
    document.getElementById('installBtn')?.classList.remove('visible');
    audit('pwa_installed');
    toast('Application installée 🎉', 'success');
  });

  // Affichage initial du bouton : SEULEMENT si non installée
  setTimeout(() => {
    if (isPWAInstalled()) {
      document.getElementById('installBtn')?.classList.remove('visible');
      try { localStorage.setItem('tk_pwa_installed', '1'); } catch {}
    } else {
      document.getElementById('installBtn')?.classList.add('visible');
    }
  }, 100);
}

async function installPWA() {
  // Si le navigateur a déclenché beforeinstallprompt, on lance la boîte native
  if (_pwaDeferredPrompt) {
    _pwaDeferredPrompt.prompt();
    const choice = await _pwaDeferredPrompt.userChoice;
    log('PWA install choice', choice);
    _pwaDeferredPrompt = null;
    if (choice && choice.outcome === 'accepted') {
      try { localStorage.setItem('tk_pwa_installed', '1'); } catch {}
    }
    document.getElementById('installBtn')?.classList.remove('visible');
    return;
  }
  // Sinon, on affiche les instructions selon la plateforme
  const ua = navigator.userAgent;
  const isiOS = /iPad|iPhone|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);
  modal(`
    <div class="modal-header"><h3>📱 Installer Ti Kanno</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      ${isiOS ? `
        <p class="mb-2">Sur iPhone / iPad :</p>
        <ol style="padding-left: 18px; line-height: 1.8;">
          <li>Touchez l'icône <strong>Partager</strong> ▢↑ en bas de Safari</li>
          <li>Faites défiler et touchez <strong>« Sur l'écran d'accueil »</strong></li>
          <li>Confirmez en touchant <strong>« Ajouter »</strong></li>
        </ol>
        <p class="small text-muted mt-2">L'app s'ouvrira ensuite en plein écran depuis votre bureau, comme une vraie application.</p>
      ` : isAndroid ? `
        <p class="mb-2">Sur Android Chrome :</p>
        <ol style="padding-left: 18px; line-height: 1.8;">
          <li>Touchez le menu <strong>⋮</strong> en haut à droite</li>
          <li>Touchez <strong>« Ajouter à l'écran d'accueil »</strong> ou <strong>« Installer l'application »</strong></li>
          <li>Confirmez</li>
        </ol>
      ` : `
        <p class="mb-2">Sur ordinateur (Chrome, Edge) :</p>
        <ol style="padding-left: 18px; line-height: 1.8;">
          <li>Ouvrez le menu <strong>⋮</strong> en haut à droite</li>
          <li>Cliquez sur <strong>« Installer Ti Kanno »</strong> ou <strong>« Plus d'outils → Créer un raccourci »</strong></li>
          <li>Cochez « Ouvrir comme une fenêtre » et validez</li>
        </ol>
        <p class="small text-muted mt-2">Sur Firefox, vous pouvez épingler l'onglet pour un accès rapide.</p>
      `}
      <button class="btn btn-primary btn-block mt-2" onclick="closeModal()">D'accord</button>
    </div>
  `);
}

/* ---------- BOOT ---------- */
window.addEventListener('DOMContentLoaded', () => {
  log('Boot', VERSION, LOCAL_MODE ? '(backend local)' : '(backend distant)');
  if (LOCAL_MODE) localBackend.seed();
  setupPWA();
  const path = (window.location.hash || '#/').slice(1) || '/';
  state.view = path;
  render();
});
</script>
