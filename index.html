    /* ===============================================================
       ACTIONS — wiring DOM
       =============================================================== */

    function attachMainHandlers() {
      const main = document.getElementById('mainView');
      // navigation chips/cards/listing cards
      main.querySelectorAll('[data-go]').forEach(el => {
        el.addEventListener('click', () => {
          const view = el.getAttribute('data-go');
          const tab = el.getAttribute('data-tab') || undefined;
          if (view === 'dashboard' && !state.currentUser) {
            openLoginModal();
            return;
          }
          go(view, { tab });
        });
      });
      main.querySelectorAll('[data-listing]').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.closest('[data-fav]')) return;
          openListingModal(el.getAttribute('data-listing'));
        });
      });
      main.querySelectorAll('[data-fav]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          handleToggleFavorite(el.getAttribute('data-fav'));
        });
      });
      main.querySelectorAll('[data-browse-cat]').forEach(el => {
        el.addEventListener('click', () => {
          const cat = el.getAttribute('data-browse-cat');
          const type = el.getAttribute('data-browse-type');
          go('browse', { filters: { category: cat, type, search: '', city: null } });
        });
      });
      // Hero search
      const hs = document.getElementById('heroSearch');
      if (hs) hs.addEventListener('submit', e => {
        e.preventDefault();
        const q = e.target.q.value.trim();
        go('browse', { filters: { search: q } });
      });
      // Filter pills (browse)
      main.querySelectorAll('[data-filter]').forEach(el => {
        el.addEventListener('click', () => {
          const k = el.getAttribute('data-filter');
          if (k === 'clear') {
            state.filters = { type: 'all', category: null, city: null, search: '' };
            render();
          } else {
            openFilterPicker(k);
          }
        });
      });
      // Listing card clicks for browse - already handled by data-listing
      // Dashboard side nav
      main.querySelectorAll('.side-nav__item[data-tab]').forEach(el => {
        el.addEventListener('click', () => {
          const tab = el.getAttribute('data-tab');
          if (tab === 'logout') {
            openConfirmModal('Voulez-vous vraiment vous déconnecter ?', logout, false);
            return;
          }
          go('dashboard', { tab });
        });
      });
      // Mes annonces : actions
      main.querySelectorAll('[data-listing-edit]').forEach(el => {
        el.addEventListener('click', () => {
          closeModal();
          const l = listingById(el.getAttribute('data-listing-edit'));
          go('dashboard', { tab: 'create' });
          // Replace pane with edit form
          document.querySelector('.dashboard-pane').innerHTML = renderTabCreate(l);
          attachMainHandlers();
        });
      });
      main.querySelectorAll('[data-listing-toggle]').forEach(el => {
        el.addEventListener('click', () => handleToggleStatus(el.getAttribute('data-listing-toggle')));
      });
      main.querySelectorAll('[data-listing-delete]').forEach(el => {
        el.addEventListener('click', () => {
          openConfirmModal('Supprimer définitivement cette annonce ?', () =>
            handleDeleteListing(el.getAttribute('data-listing-delete')));
        });
      });
      // Form: create/edit listing
      const lf = document.getElementById('listingForm');
      if (lf) {
        // type toggle — in-place update, preserves all other field values
        lf.querySelectorAll('[data-set-type]').forEach(btn => {
          btn.addEventListener('click', () => {
            const t = btn.getAttribute('data-set-type');
            // 1. update active class on the two tabs
            lf.querySelectorAll('[data-set-type]').forEach(tb => {
              tb.classList.toggle('is-active', tb.getAttribute('data-set-type') === t);
            });
            // 2. update hidden type input
            const typeInput = lf.querySelector('[name="type"]');
            if (typeInput) typeInput.value = t;
            // 3. swap category select options
            const cats = t === 'product' ? PRODUCT_CATEGORIES : SERVICE_CATEGORIES;
            const sel = lf.querySelector('#lf-cat');
            if (sel) {
              sel.innerHTML = cats.map(c => `<option value="${c.id}">${c.emoji} ${c.label}</option>`).join('');
            }
          });
        });
        lf.addEventListener('submit', handleListingSubmit);
      }
      // Conv list
      main.querySelectorAll('[data-conv-with]').forEach(el => {
        el.addEventListener('click', () => {
          const withId = el.getAttribute('data-conv-with');
          const listingId = el.getAttribute('data-conv-listing');
          markConvRead(withId, listingId);
          go('dashboard', { tab: 'messages', conversation: { withUserId: withId, listingId } });
        });
      });
      const back = main.querySelector('[data-conv-back]');
      if (back) back.addEventListener('click', () => {
        state.activeConversation = null;
        go('dashboard', { tab: 'messages' });
      });
      const msgForm = document.getElementById('msgForm');
      if (msgForm) msgForm.addEventListener('submit', handleSendMessageInThread);
      // Profile form
      const pf = document.getElementById('profileForm');
      if (pf) pf.addEventListener('submit', handleProfileSubmit);
      const cpb = document.getElementById('changePwdBtn');
      if (cpb) cpb.addEventListener('click', openChangePasswordModal);
      const lob = document.getElementById('logoutBtn');
      if (lob) lob.addEventListener('click', () => openConfirmModal('Se déconnecter ?', logout, false));
      const rdb = document.getElementById('resetDemoBtn');
      if (rdb) rdb.addEventListener('click', () => {
        openConfirmModal('Réinitialiser toutes les données de démonstration ?', () => {
          activateDemo();
        }, false);
      });
      // Header bottom-nav delegated below
    }

    function collectListingForm(form) {
      const fd = new FormData(form);
      return {
        type:        fd.get('type'),
        title:       fd.get('title')?.trim() || '',
        category:    fd.get('category'),
        description: fd.get('description')?.trim() || '',
        priceMode:   fd.get('priceMode') || 'fixed',
        price:       parseFloat(fd.get('price')) || 0,
        location:    fd.get('location'),
        emoji:       fd.get('emoji')?.trim() || '',
        imageUrl:    fd.get('imageUrl')?.trim() || '',
        paymentUrl:  fd.get('paymentUrl')?.trim() || '',
      };
    }

    /* ----- handlers : favoris / messages / annonces --------------- */
    async function handleBuyOnline(listingId) {
      const l = listingById(listingId);
      if (!l) return;
      const provider = detectPaymentProvider(l.paymentUrl);
      if (!provider) {
        toast('Aucun lien de paiement disponible pour cette annonce.', 'warning');
        return;
      }
      // Trace pour audit (avant la redirection)
      audit('buy_click', { listingId, provider: provider.name });
      // En démo on ne redirige pas vers une URL bidon : on affiche une note
      if (state.mode === 'demo' || /test_demo_|demoshop|demo-tour/.test(l.paymentUrl)) {
        toast(`🎭 Démo : redirection vers ${provider.name} simulée. En vrai, l'utilisateur serait redirigé vers la page de paiement du vendeur.`, 'info', 5000);
        return;
      }
      // Ouverture dans un nouvel onglet (sécurisé)
      const w = window.open(l.paymentUrl, '_blank', 'noopener,noreferrer');
      if (!w) {
        toast('Le navigateur a bloqué l\'ouverture. Autorisez les popups ou copiez le lien.', 'warning', 4500);
      }
    }

    async function handleToggleFavorite(listingId) {
      if (!state.currentUser) {
        toast('Connectez-vous pour ajouter aux favoris.', 'info');
        openLoginModal();
        return;
      }
      const my = state.currentUser.id;
      const existing = state.favorites.find(f => f.userId === my && f.listingId === listingId);
      if (existing) {
        state.favorites = state.favorites.filter(f => f.id !== existing.id);
        toast('Retiré des favoris', 'info', 2000);
      } else {
        state.favorites.push({ id: uid('f_'), userId: my, listingId, createdAt: new Date().toISOString() });
        toast('Ajouté aux favoris ❤️', 'success', 2000);
      }
      audit('toggle_favorite', { listingId, added: !existing });
      if (state.mode === 'real') {
        api('toggleFavorite', { userId: my, listingId });
      }
      // Refresh modal & current view
      if (document.querySelector('.modal')) openListingModal(listingId);
      render();
    }

    async function handleListingSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const editId = form.getAttribute('data-edit-id');
      const data = collectListingForm(form);
      if (!data.title || !data.description) {
        toast('Veuillez remplir tous les champs requis.', 'error');
        return;
      }
      if (data.paymentUrl && !isValidPaymentUrl(data.paymentUrl)) {
        toast('Lien de paiement invalide. Utilisez un lien Stripe, PayPal, HelloAsso, Lyf, SumUp, Payplug, Revolut ou GoCardless (en HTTPS).', 'error', 5500);
        return;
      }
      if (editId) {
        const idx = state.listings.findIndex(l => l.id === editId);
        if (idx === -1) return;
        state.listings[idx] = { ...state.listings[idx], ...data };
        if (state.mode === 'real') {
          showLoader();
          await api('updateListing', { id: editId, sellerId: state.currentUser.id, ...data });
          hideLoader();
        }
        audit('listing_updated', { id: editId });
        toast('Annonce mise à jour ✅', 'success');
      } else {
        const newL = {
          id: uid('l_'),
          sellerId: state.currentUser.id,
          ...data,
          status: 'active',
          createdAt: new Date().toISOString(),
          views: 0,
        };
        state.listings.unshift(newL);
        if (state.mode === 'real') {
          showLoader();
          const res = await api('createListing', { ...newL });
          hideLoader();
          if (res.ok && res.listing) {
            // remplacer ID temporaire si backend renvoie un autre
            const i = state.listings.findIndex(l => l.id === newL.id);
            if (i !== -1) state.listings[i] = res.listing;
          }
        }
        audit('listing_created', { id: newL.id });
        toast('Annonce publiée 🎉', 'success');
      }
      go('dashboard', { tab: 'listings' });
    }

    async function handleToggleStatus(id) {
      const l = listingById(id);
      if (!l) return;
      l.status = l.status === 'active' ? 'paused' : 'active';
      audit('listing_status', { id, status: l.status });
      if (state.mode === 'real') api('updateListing', { id, sellerId: state.currentUser.id, status: l.status });
      toast(l.status === 'active' ? 'Annonce réactivée' : 'Annonce mise en pause', 'info');
      closeModal();
      render();
    }

    async function handleDeleteListing(id) {
      state.listings = state.listings.filter(l => l.id !== id);
      audit('listing_deleted', { id });
      if (state.mode === 'real') {
        showLoader();
        await api('deleteListing', { id, sellerId: state.currentUser.id });
        hideLoader();
      }
      toast('Annonce supprimée', 'info');
      render();
    }

    function markConvRead(withUserId, listingId) {
      const my = state.currentUser.id;
      const toMark = state.messages.filter(m =>
        m.toUserId === my && m.fromUserId === withUserId && m.listingId === listingId && !m.read);
      toMark.forEach(m => m.read = true);
      if (state.mode === 'real' && toMark.length) {
        toMark.forEach(m => api('markMessageRead', { id: m.id }));
      }
    }

    async function handleSendMessageInThread(e) {
      e.preventDefault();
      const conv = state.activeConversation;
      if (!conv) return;
      const content = e.target.content.value.trim();
      if (!content) return;
      const newMsg = {
        id: uid('m_'),
        listingId: conv.listingId,
        fromUserId: state.currentUser.id,
        toUserId: conv.withUserId,
        content,
        createdAt: new Date().toISOString(),
        read: false,
      };
      state.messages.push(newMsg);
      e.target.content.value = '';
      audit('message_sent', { to: conv.withUserId, listingId: conv.listingId });
      if (state.mode === 'real') {
        api('sendMessage', { ...newMsg });
      } else {
        toast('Message envoyé (démo)', 'success', 2000);
      }
      go('dashboard', { tab: 'messages', conversation: conv });
    }

    async function handleContactSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const listingId = form.getAttribute('data-listing');
      const sellerId = form.getAttribute('data-seller');
      const content = form.content.value.trim();
      if (!content) return;
      const newMsg = {
        id: uid('m_'),
        listingId,
        fromUserId: state.currentUser.id,
        toUserId: sellerId,
        content,
        createdAt: new Date().toISOString(),
        read: false,
      };
      state.messages.push(newMsg);
      audit('message_sent', { to: sellerId, listingId });
      if (state.mode === 'real') {
        showLoader();
        await api('sendMessage', { ...newMsg });
        hideLoader();
      }
      closeModal();
      toast('Message envoyé ✉️', 'success');
    }

    async function handleProfileSubmit(e) {
      e.preventDefault();
      const fd = new FormData(e.target);
      const updated = {
        name:  fd.get('name').trim(),
        email: fd.get('email').trim().toLowerCase(),
        phone: fd.get('phone').trim(),
        city:  fd.get('city'),
        bio:   fd.get('bio').trim(),
      };
      Object.assign(state.currentUser, updated);
      // Sync dans state.users si présent
      const me = state.users.find(u => u.id === state.currentUser.id);
      if (me) Object.assign(me, updated);
      audit('profile_updated');
      if (state.mode === 'real') {
        showLoader();
        await api('updateProfile', { userId: state.currentUser.id, ...updated });
        hideLoader();
      }
      toast('Profil mis à jour ✅', 'success');
      render();
    }

    async function handlePwdSubmit(e) {
      e.preventDefault();
      const fd = new FormData(e.target);
      const oldPwd = fd.get('oldPwd');
      const newPwd = fd.get('newPwd');
      if (newPwd.length < 8) { toast('Mot de passe trop court (8 caractères min.)', 'error'); return; }
      // Vérifs PIN/pwd faibles
      if (/^(.)\1+$/.test(newPwd) || ['12345678','password','motdepasse'].includes(newPwd.toLowerCase())) {
        toast('Mot de passe trop faible — choisissez plus complexe.', 'error');
        return;
      }
      audit('password_change_attempt');
      if (state.mode === 'demo') {
        closeModal();
        toast('Mot de passe modifié (démo)', 'success');
        return;
      }
      showLoader();
      const res = await api('changePassword', { userId: state.currentUser.id, oldPwd, newPwd });
      hideLoader();
      if (res.ok) {
        closeModal();
        toast('Mot de passe modifié ✅', 'success');
      } else {
        toast(res.error || 'Erreur lors du changement.', 'error');
      }
    }

    /* ----- handlers globaux (header / modaux / bottom nav) -------- */
    function attachGlobalHandlers() {
      // Brand → home
      document.getElementById('brandBtn').addEventListener('click', () => go('home'));

      // Header search (visible ≥640px)
      const search = document.getElementById('searchInput');
      const debouncedSearch = debounce(value => {
        if (!value) return;
        go('browse', { filters: { search: value } });
      }, 350);
      search.addEventListener('input', e => debouncedSearch(e.target.value.trim()));
      search.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          go('browse', { filters: { search: e.target.value.trim() } });
        }
      });

      // Header nav (delegation pour boutons recréés)
      document.getElementById('headerNav').addEventListener('click', e => {
        if (e.target.id === 'navLogin') openLoginModal('login');
        else if (e.target.id === 'navSignup') openLoginModal('signup');
        const goEl = e.target.closest('[data-go]');
        if (goEl) {
          const v = goEl.getAttribute('data-go');
          const t = goEl.getAttribute('data-tab') || undefined;
          if (v === 'dashboard' && !state.currentUser) { openLoginModal(); return; }
          go(v, { tab: t });
        }
      });

      // Bottom nav (delegation)
      document.getElementById('bottomNav').addEventListener('click', e => {
        const it = e.target.closest('[data-go]');
        if (!it) return;
        const v = it.getAttribute('data-go');
        const t = it.getAttribute('data-tab') || undefined;
        go(v, { tab: t });
      });

      // Demo banner click → quitter démo
      document.getElementById('demoBanner').addEventListener('click', () => {
        openConfirmModal('Quitter le mode démonstration ?', exitDemo, false);
      });

      // Modal slot delegation
      document.getElementById('modalSlot').addEventListener('click', e => {
        if (e.target.matches('[data-close]') || e.target.closest('[data-close]')) {
          closeModal(); return;
        }
        // Auth tabs
        const at = e.target.closest('[data-auth-tab]');
        if (at) {
          const which = at.getAttribute('data-auth-tab');
          document.querySelectorAll('.auth-tab[data-auth-tab]').forEach(t =>
            t.classList.toggle('is-active', t.getAttribute('data-auth-tab') === which));
          document.getElementById('authPane').innerHTML =
            which === 'login' ? renderLoginForm() : renderSignupForm();
          return;
        }
        // Demo
        if (e.target.id === 'demoBtn') { activateDemo(); return; }
        // Listing actions inside detail modal
        const fav = e.target.closest('[data-fav]');
        if (fav) { handleToggleFavorite(fav.getAttribute('data-fav')); return; }
        const ed  = e.target.closest('[data-listing-edit]');
        if (ed) {
          closeModal();
          const l = listingById(ed.getAttribute('data-listing-edit'));
          go('dashboard', { tab: 'create' });
          document.querySelector('.dashboard-pane').innerHTML = renderTabCreate(l);
          attachMainHandlers();
          return;
        }
        const tg = e.target.closest('[data-listing-toggle]');
        if (tg) { handleToggleStatus(tg.getAttribute('data-listing-toggle')); return; }
        const dl = e.target.closest('[data-listing-delete]');
        if (dl) {
          openConfirmModal('Supprimer définitivement cette annonce ?', () =>
            handleDeleteListing(dl.getAttribute('data-listing-delete')));
          return;
        }
        const cn = e.target.closest('[data-contact]');
        if (cn) { openContactModal(cn.getAttribute('data-contact')); return; }
        const buy = e.target.closest('[data-buy]');
        if (buy) { handleBuyOnline(buy.getAttribute('data-buy')); return; }
        const li = e.target.closest('[data-listing]');
        if (li && !e.target.closest('form')) {
          openListingModal(li.getAttribute('data-listing'));
          return;
        }
        // Filter picker actions
        const act = e.target.closest('[data-action]');
        if (act) {
          const a = act.getAttribute('data-action');
          const v = act.getAttribute('data-value');
          if (a === 'pick-type')  state.filters = { ...state.filters, type: v || 'all' };
          if (a === 'pick-cat')   state.filters = { ...state.filters, category: v || null };
          if (a === 'pick-city')  state.filters = { ...state.filters, city: v || null };
          closeModal();
          go('browse');
          return;
        }
      });

      // Submit delegation (forms inside modaux)
      document.getElementById('modalSlot').addEventListener('submit', e => {
        if (e.target.id === 'loginForm') {
          e.preventDefault();
          const fd = new FormData(e.target);
          login(fd.get('email'), fd.get('password'));
        } else if (e.target.id === 'signupForm') {
          e.preventDefault();
          const fd = new FormData(e.target);
          register({
            name: fd.get('name'), email: fd.get('email'), phone: fd.get('phone'),
            city: fd.get('city'), password: fd.get('password'),
          });
        } else if (e.target.id === 'contactForm') {
          handleContactSubmit(e);
        } else if (e.target.id === 'pwdForm') {
          handlePwdSubmit(e);
        }
      });
    }

    /* ===============================================================
       BOOT
       =============================================================== */
    async function boot() {
      console.log(`[MatinikMarket] boot ${APP.version}`);
      // Manifest dynamique (PWA-friendly)
      const manifest = {
        name: APP.name,
        short_name: 'Matinik',
        start_url: location.pathname,
        display: 'standalone',
        background_color: '#fcf7ee',
        theme_color: '#0f6e6e',
        icons: [{
          src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230f6e6e'/><text x='96' y='126' font-size='110' text-anchor='middle' fill='%23fcf7ee'>🌴</text></svg>",
          sizes: '192x192', type: 'image/svg+xml',
        }],
      };
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = url;
      document.head.appendChild(link);

      // Version tag
      document.getElementById('versionTag').textContent = `${APP.version} — ${APP.year}`;

      // Handlers globaux
      attachGlobalHandlers();

      // Restore session si présente
      const session = lsGet(LS_KEYS.session);
      if (session && session.userId && APP.backendUrl) {
        showLoader();
        const res = await api('getUser', { userId: session.userId });
        hideLoader();
        if (res.ok && res.user) {
          state.currentUser = res.user;
          await loadPrivateData();
          document.body.classList.add('has-bottom-nav');
        } else {
          lsDel(LS_KEYS.session);
        }
      }

      // Charger les annonces publiques
      await loadPublicListings();
      render();
    }

    // Lance l'app au chargement
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
