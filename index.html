<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f6e6e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Matinik Market" />
  <title>Matinik Market — La marketplace de la Martinique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f6e6e'/%3E%3Ctext x='50' y='66' font-size='56' text-anchor='middle' fill='%23fcf7ee'%3E🌴%3C/text%3E%3C/svg%3E" />
  <style>
    /* ================================================================
       MATINIK MARKET — design tokens
       Direction : éditorial caribéen, beiges chauds + teal profond
       ================================================================ */
    :root {
      --bg:           #fcf7ee;
      --bg-soft:      #f4ece0;
      --bg-card:      #ffffff;
      --bg-overlay:   rgba(20, 30, 30, 0.45);
      --ink:          #1c2522;
      --ink-soft:     #4a5552;
      --ink-mute:     #7e8783;
      --line:         #e7ded0;
      --line-soft:    #efe7d8;
      --teal:         #0f6e6e;
      --teal-deep:    #084d4d;
      --teal-soft:    #d6ebe9;
      --terracotta:   #c75c3c;
      --terracotta-s: #f7e1d8;
      --gold:         #c89f4a;
      --success:      #2f7a4f;
      --success-s:    #dcefe1;
      --error:        #b3392b;
      --error-s:      #f7dcd6;
      --warn:         #b07a16;
      --warn-s:       #faecc8;

      --radius-xs: 6px;
      --radius-sm: 8px;
      --radius:    12px;
      --radius-lg: 18px;

      --shadow-1: 0 1px 2px rgba(20,30,30,.04), 0 2px 8px rgba(20,30,30,.04);
      --shadow-2: 0 2px 12px rgba(20,30,30,.06), 0 8px 24px rgba(20,30,30,.05);
      --shadow-3: 0 12px 40px rgba(20,30,30,.12);

      --font-sans:    'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-display: 'Fraunces', Georgia, serif;

      --t-fast: .15s ease;
      --t:      .22s ease;

      --header-h: 64px;
    }

    /* ---------- reset léger ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    img { max-width: 100%; display: block; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; line-height: 1.15; margin: 0; }

    /* ---------- utilitaires ---------- */
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .hidden { display: none !important; }

    /* ---------- header ---------- */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      height: var(--header-h);
      background: rgba(252, 247, 238, 0.92);
      backdrop-filter: saturate(150%) blur(10px);
      -webkit-backdrop-filter: saturate(150%) blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .app-header__inner {
      height: 100%;
      display: flex; align-items: center; gap: 12px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none;
      flex-shrink: 0;
    }
    .brand__mark {
      width: 36px; height: 36px;
      background: var(--teal);
      color: var(--bg);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      box-shadow: var(--shadow-1);
    }
    .brand__name {
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--ink);
    }
    .brand__name em { font-style: italic; color: var(--teal); font-weight: 500; }

    .header-search {
      flex: 1; max-width: 520px; position: relative;
      display: none;
    }
    .header-search input {
      width: 100%;
      height: 40px;
      padding: 0 14px 0 38px;
      background: var(--bg-soft);
      border: 1px solid transparent;
      border-radius: 999px;
      transition: border var(--t), background var(--t);
      outline: none;
    }
    .header-search input:focus {
      border-color: var(--teal);
      background: #fff;
    }
    .header-search::before {
      content: "🔎";
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; opacity: .55;
    }

    .header-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .icon-btn {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      transition: background var(--t), border var(--t);
      font-size: 17px;
      position: relative;
    }
    .icon-btn:hover { background: var(--bg-soft); }
    .icon-btn .badge {
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px;
      padding: 0 4px;
      background: var(--terracotta);
      color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 999px;
      display: grid; place-items: center;
    }

    .btn { 
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      height: 40px; padding: 0 16px;
      font-size: 14px; font-weight: 600;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: background var(--t), border var(--t), color var(--t), transform var(--t-fast);
      white-space: nowrap;
      background: transparent; color: var(--ink);
    }
    .btn:active { transform: scale(.98); }
    .btn--primary {
      background: var(--teal); color: var(--bg);
    }
    .btn--primary:hover { background: var(--teal-deep); }
    .btn--ghost {
      background: transparent; color: var(--ink);
      border-color: var(--line);
    }
    .btn--ghost:hover { background: var(--bg-soft); border-color: var(--ink-mute); }
    .btn--soft {
      background: var(--bg-soft); color: var(--ink);
    }
    .btn--soft:hover { background: var(--line-soft); }
    .btn--danger {
      background: var(--error); color: #fff;
    }
    .btn--danger:hover { background: #92291f; }
    .btn--accent {
      background: var(--terracotta); color: #fff;
    }
    .btn--accent:hover { background: #a64a30; }
    .btn--block { width: 100%; }
    .btn--lg { height: 48px; padding: 0 20px; font-size: 15px; }
    .btn--sm { height: 32px; padding: 0 12px; font-size: 13px; border-radius: 8px; }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px 4px 4px;
      background: var(--bg-soft);
      border-radius: 999px;
      cursor: pointer;
      transition: background var(--t);
    }
    .user-chip:hover { background: var(--line-soft); }
    .user-chip__avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--bg);
      display: grid; place-items: center;
      font-weight: 700; font-size: 13px;
    }
    .user-chip__name {
      font-weight: 600; font-size: 13px;
      max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ---------- hero (page d'accueil) ---------- */
    .hero {
      padding: 28px 0 36px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: -40px -10% auto auto;
      width: 60%; height: 380px;
      background:
        radial-gradient(closest-side, rgba(15,110,110,.08), transparent 70%),
        radial-gradient(closest-side, rgba(199,92,60,.06), transparent 70%);
      background-position: 0 0, 30% 60%;
      background-repeat: no-repeat;
      pointer-events: none;
      filter: blur(2px);
    }
    .hero__eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--teal);
      padding: 6px 12px;
      background: var(--teal-soft);
      border-radius: 999px;
    }
    .hero h1 {
      font-size: clamp(34px, 6vw, 56px);
      letter-spacing: -.02em;
      margin: 14px 0 12px;
      max-width: 760px;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--teal);
      font-weight: 500;
    }
    .hero p.lead {
      font-size: clamp(15px, 1.6vw, 17px);
      color: var(--ink-soft);
      max-width: 560px;
      margin: 0 0 24px;
    }
    .hero-search {
      display: flex;
      gap: 8px;
      max-width: 640px;
      background: var(--bg-card);
      padding: 8px;
      border-radius: 14px;
      box-shadow: var(--shadow-2);
      border: 1px solid var(--line);
    }
    .hero-search input {
      flex: 1; min-width: 0;
      height: 44px;
      padding: 0 14px;
      background: transparent;
      border: 0;
      outline: none;
      font-size: 15px;
    }
    .hero-search button { height: 44px; }

    .hero-stats {
      display: flex; flex-wrap: wrap; gap: 22px;
      margin-top: 22px;
      color: var(--ink-mute);
      font-size: 13px;
    }
    .hero-stats strong { color: var(--ink); font-weight: 700; }

    /* ---------- sections ---------- */
    .section { padding: 28px 0; }
    .section__head {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 12px; margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .section__title {
      font-size: 22px;
      letter-spacing: -.01em;
    }
    .section__subtitle {
      color: var(--ink-mute);
      font-size: 13px;
      margin-top: 4px;
    }
    .link-more {
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
    }

    /* ---------- chips ---------- */
    .chips {
      display: flex; gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }
    .chips::-webkit-scrollbar { height: 0; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background var(--t), border var(--t), color var(--t);
    }
    .chip:hover { border-color: var(--ink-mute); }
    .chip--active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    /* ---------- catégories ---------- */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .cat-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: border var(--t), transform var(--t-fast), box-shadow var(--t);
    }
    .cat-card:hover {
      border-color: var(--teal);
      transform: translateY(-1px);
      box-shadow: var(--shadow-1);
    }
    .cat-card__icon {
      width: 44px; height: 44px;
      background: var(--bg-soft);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .cat-card__label {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
    }
    .cat-card__count {
      font-size: 12px;
      color: var(--ink-mute);
      margin-top: 2px;
    }

    /* ---------- listings grid ---------- */
    .listings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .listing-card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border var(--t), transform var(--t-fast), box-shadow var(--t);
      display: flex; flex-direction: column;
      position: relative;
    }
    .listing-card:hover {
      border-color: var(--ink-mute);
      transform: translateY(-2px);
      box-shadow: var(--shadow-2);
    }
    .listing-card__media {
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, var(--teal-soft), var(--bg-soft));
      display: grid; place-items: center;
      font-size: 56px;
      position: relative;
      overflow: hidden;
    }
    .listing-card__media img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .listing-card__type {
      position: absolute; top: 8px; left: 8px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(4px);
      padding: 3px 9px;
      font-size: 11px; font-weight: 600;
      border-radius: 999px;
      color: var(--ink);
      letter-spacing: .02em;
    }
    .listing-card__type.is-service { color: var(--terracotta); }
    .fav-btn {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(4px);
      border: 0;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 14px;
      cursor: pointer;
      transition: transform var(--t-fast);
      z-index: 1;
    }
    .fav-btn:hover { transform: scale(1.1); }
    .fav-btn.is-active { color: var(--terracotta); }
    .listing-card__body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; }
    .listing-card__title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
      margin: 0 0 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      min-height: 36px;
    }
    .listing-card__meta {
      font-size: 12px;
      color: var(--ink-mute);
      margin-bottom: 10px;
      display: flex; gap: 6px; align-items: center;
    }
    .listing-card__price {
      margin-top: auto;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 17px;
      color: var(--teal-deep);
    }
    .listing-card__price small { color: var(--ink-mute); font-weight: 400; font-size: 11px; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--ink-mute);
    }
    .empty-state__emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state__title { font-family: var(--font-display); font-size: 18px; color: var(--ink); margin-bottom: 6px; }

    /* ---------- filtres (browse view) ---------- */
    .filters-bar {
      display: flex; gap: 8px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
      overflow-x: auto;
    }
    .filter-pill {
      display: inline-flex; align-items: center; gap: 6px;
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all var(--t);
    }
    .filter-pill.has-value {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }
    .browse-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 4px 0 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .browse-count { color: var(--ink-mute); font-size: 13px; }

    /* ---------- bandeau démo ---------- */
    .demo-banner {
      position: fixed; top: 12px; right: 12px;
      z-index: 60;
      background: var(--terracotta);
      color: #fff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px; font-weight: 700;
      letter-spacing: .04em;
      display: flex; align-items: center; gap: 6px;
      box-shadow: var(--shadow-2);
      cursor: pointer;
    }
    .demo-banner::before { content: "🎭"; }

    /* ---------- modaux ---------- */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: grid; place-items: center;
      padding: 16px;
      animation: fade-in .18s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal {
      background: var(--bg);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: calc(100dvh - 32px);
      overflow: auto;
      box-shadow: var(--shadow-3);
      animation: slide-up .22s ease;
    }
    .modal--lg { max-width: 720px; }
    .modal__head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; background: var(--bg);
      z-index: 1;
    }
    .modal__title { font-size: 18px; }
    .modal__close {
      width: 32px; height: 32px;
      background: transparent; border: 0;
      border-radius: 8px;
      font-size: 20px; line-height: 1;
      color: var(--ink-soft);
      transition: background var(--t);
    }
    .modal__close:hover { background: var(--bg-soft); }
    .modal__body { padding: 20px; }
    .modal__footer {
      padding: 14px 20px;
      border-top: 1px solid var(--line);
      display: flex; gap: 10px; justify-content: flex-end;
      position: sticky; bottom: 0; background: var(--bg);
    }

    /* ---------- formulaires ---------- */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field--row { flex-direction: row; gap: 10px; }
    .field--row > * { flex: 1; min-width: 0; }
    .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
    }
    .input, .textarea, .select {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      transition: border var(--t), background var(--t);
      outline: none;
    }
    .textarea {
      height: auto; min-height: 100px;
      padding: 10px 14px;
      resize: vertical;
      line-height: 1.5;
    }
    .input:focus, .textarea:focus, .select:focus {
      border-color: var(--teal);
    }
    .field-help { font-size: 12px; color: var(--ink-mute); }
    .field-error { font-size: 12px; color: var(--error); }

    .auth-tabs {
      display: flex;
      background: var(--bg-soft);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 18px;
    }
    .auth-tab {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: 0;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--ink-soft);
      transition: background var(--t), color var(--t);
    }
    .auth-tab.is-active {
      background: var(--bg-card);
      color: var(--ink);
      box-shadow: var(--shadow-1);
    }

    .demo-cta {
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, var(--terracotta-s), var(--bg-soft));
      border-radius: 10px;
      text-align: center;
    }
    .demo-cta__lead {
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    /* ---------- listing detail (modal) ---------- */
    .detail-cover {
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, var(--teal-soft), var(--bg-soft));
      display: grid; place-items: center;
      font-size: 100px;
      position: relative;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      margin: -20px -20px 16px;
    }
    .detail-cover img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .detail-tag {
      position: absolute; top: 12px; left: 12px;
      background: rgba(255,255,255,.95);
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: .04em;
    }
    .detail-tag.is-service { color: var(--terracotta); }
    .detail-title { font-size: 24px; line-height: 1.2; letter-spacing: -.01em; }
    .detail-price {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      color: var(--teal-deep);
      margin: 8px 0 4px;
    }
    .detail-price small { color: var(--ink-mute); font-weight: 400; font-size: 13px; }
    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin: 12px 0 18px;
    }
    .detail-meta-item {
      font-size: 12px;
      color: var(--ink-soft);
      background: var(--bg-soft);
      padding: 4px 10px;
      border-radius: 999px;
    }
    .detail-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }
    .detail-section h4 {
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 8px;
    }
    .detail-desc {
      white-space: pre-wrap;
      color: var(--ink-soft);
      line-height: 1.6;
    }
    .seller-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px;
      background: var(--bg-soft);
      border-radius: 12px;
    }
    .seller-card__avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--bg);
      display: grid; place-items: center;
      font-weight: 700;
    }
    .seller-card__name { font-weight: 600; font-size: 14px; }
    .seller-card__sub { color: var(--ink-mute); font-size: 12px; }
    .actions-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .actions-row > .btn { flex: 1; min-width: 140px; }

    /* ---------- dashboard ---------- */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 16px 0 80px;
    }
    .side-nav {
      display: none;
      flex-direction: column;
      gap: 2px;
      padding: 8px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      align-self: start;
      position: sticky;
      top: calc(var(--header-h) + 16px);
    }
    .side-nav__item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: transparent;
      border: 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      text-align: left;
      width: 100%;
      transition: background var(--t), color var(--t);
      cursor: pointer;
    }
    .side-nav__item:hover { background: var(--bg-soft); color: var(--ink); }
    .side-nav__item.is-active {
      background: var(--ink);
      color: var(--bg);
    }
    .side-nav__item .badge {
      margin-left: auto;
      min-width: 20px; height: 20px;
      padding: 0 6px;
      background: var(--terracotta);
      color: #fff;
      font-size: 11px; font-weight: 700;
      border-radius: 999px;
      display: grid; place-items: center;
    }
    .side-nav__item.is-active .badge { background: var(--bg); color: var(--ink); }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(252, 247, 238, 0.96);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--line);
      display: flex;
      z-index: 40;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    }
    .bottom-nav__item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 4px;
      background: transparent;
      border: 0;
      font-size: 11px;
      color: var(--ink-mute);
      font-weight: 500;
      position: relative;
    }
    .bottom-nav__item .ico { font-size: 19px; line-height: 1; }
    .bottom-nav__item.is-active { color: var(--teal); }
    .bottom-nav__item .badge {
      position: absolute; top: 2px; right: calc(50% - 22px);
      min-width: 16px; height: 16px;
      padding: 0 4px;
      background: var(--terracotta);
      color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 999px;
      display: grid; place-items: center;
    }

    .dashboard-pane h2 {
      font-size: 24px;
      letter-spacing: -.01em;
      margin-bottom: 14px;
    }
    .dashboard-pane__head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
      margin-bottom: 16px;
    }

    /* ---------- annonces (manage) ---------- */
    .my-listing {
      display: flex; gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .my-listing__cover {
      width: 76px; height: 76px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--teal-soft), var(--bg-soft));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 32px;
      overflow: hidden;
      position: relative;
    }
    .my-listing__cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .my-listing__body { flex: 1; min-width: 0; }
    .my-listing__title {
      font-weight: 600; font-size: 14px;
      margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .my-listing__meta { font-size: 12px; color: var(--ink-mute); }
    .my-listing__actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px; font-weight: 600;
      border-radius: 999px;
    }
    .status-badge.is-active { background: var(--success-s); color: var(--success); }
    .status-badge.is-paused { background: var(--warn-s); color: var(--warn); }
    .status-badge.is-sold { background: var(--bg-soft); color: var(--ink-mute); }

    /* ---------- messages ---------- */
    .conv-list { display: flex; flex-direction: column; gap: 6px; }
    .conv-item {
      display: flex; gap: 12px; align-items: center;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
      transition: border var(--t), background var(--t);
    }
    .conv-item:hover { border-color: var(--ink-mute); }
    .conv-item.is-unread { background: #fff; border-color: var(--teal); }
    .conv-item__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--bg);
      display: grid; place-items: center;
      font-weight: 700;
      flex-shrink: 0;
    }
    .conv-item__body { flex: 1; min-width: 0; }
    .conv-item__top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2px;
    }
    .conv-item__name { font-weight: 600; font-size: 14px; }
    .conv-item__date { color: var(--ink-mute); font-size: 11px; flex-shrink: 0; }
    .conv-item__excerpt {
      color: var(--ink-soft);
      font-size: 13px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conv-item__excerpt.is-unread { font-weight: 600; color: var(--ink); }
    .conv-item .unread-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--terracotta);
      flex-shrink: 0;
    }

    .thread {
      display: flex; flex-direction: column;
      gap: 8px;
      max-height: 50vh;
      overflow-y: auto;
      padding: 8px 4px 16px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.is-mine {
      align-self: flex-end;
      background: var(--teal);
      color: var(--bg);
      border-bottom-right-radius: 4px;
    }
    .msg.is-them {
      align-self: flex-start;
      background: var(--bg-soft);
      color: var(--ink);
      border-bottom-left-radius: 4px;
    }
    .msg__time {
      font-size: 10px;
      opacity: .7;
      margin-top: 4px;
      display: block;
    }
    .msg-compose {
      display: flex; gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .msg-compose textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
    }

    /* ---------- profil ---------- */
    .profile-head {
      display: flex; gap: 16px; align-items: center;
      padding: 18px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .profile-head__avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--bg);
      display: grid; place-items: center;
      font-weight: 700; font-size: 22px;
    }
    .profile-head__name { font-family: var(--font-display); font-size: 20px; font-weight: 600; }
    .profile-head__sub { color: var(--ink-mute); font-size: 13px; }

    /* ---------- toasts ---------- */
    .toast-stack {
      position: fixed;
      top: calc(var(--header-h) + 12px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
      width: calc(100% - 24px);
      max-width: 420px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow-2);
      animation: slide-down .22s ease;
      font-size: 14px;
    }
    @keyframes slide-down { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .toast.is-success { border-left: 3px solid var(--success); }
    .toast.is-error   { border-left: 3px solid var(--error); }
    .toast.is-warning { border-left: 3px solid var(--warn); }
    .toast.is-info    { border-left: 3px solid var(--teal); }
    .toast__icon { font-size: 16px; line-height: 1.4; }
    .toast__body { flex: 1; }

    /* ---------- loader ---------- */
    .loader-screen {
      position: fixed; inset: 0;
      background: rgba(252, 247, 238, .85);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: grid; place-items: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--line);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- footer ---------- */
    .app-footer {
      border-top: 1px solid var(--line);
      padding: 32px 0 24px;
      margin-top: 24px;
      background: var(--bg-soft);
    }
    .app-footer__inner {
      display: flex; flex-wrap: wrap; gap: 18px; justify-content: space-between;
      color: var(--ink-mute); font-size: 13px;
    }
    .app-footer__brand { display: flex; align-items: center; gap: 8px; }
    .app-footer__brand strong { color: var(--ink); font-family: var(--font-display); font-size: 16px; }

    /* ---------- responsive ---------- */
    /* Mobile-first ajustements (≤ 639px) */
    @media (max-width: 639px) {
      .container { padding: 0 14px; }
      .header__inner { gap: 8px; }
      .brand__name { font-size: 17px; }
      .brand__mark { width: 32px; height: 32px; font-size: 16px; }
      .header-nav { gap: 4px; }
      .header-nav .btn { padding: 0 12px; font-size: 13px; }
      .user-chip__name { max-width: 70px; font-size: 12px; }
      .user-chip__avatar { width: 26px; height: 26px; font-size: 11px; }
      .icon-btn { width: 36px; height: 36px; font-size: 16px; }
      .hero { padding: 18px 0 24px; }
      .hero h1 { margin: 10px 0 8px; }
      .hero p.lead { margin-bottom: 18px; }
      .hero-search { padding: 6px; }
      .hero-search input { height: 40px; padding: 0 10px; font-size: 14px; }
      .hero-search button { height: 40px; padding: 0 14px; font-size: 13px; }
      .hero-stats { gap: 14px; margin-top: 16px; font-size: 12px; }
      .section { padding: 22px 0; }
      .section__title { font-size: 19px; }
      .section__head { margin-bottom: 14px; }
      .modal-backdrop { padding: 10px; align-items: flex-start; padding-top: 16px; }
      .modal { max-height: calc(100dvh - 20px); border-radius: 14px; }
      .modal__head { padding: 14px 16px; }
      .modal__title { font-size: 16px; }
      .modal__body { padding: 16px; }
      .modal__footer { padding: 12px 16px; flex-direction: column-reverse; gap: 8px; }
      .modal__footer .btn { width: 100%; }
      .detail-cover { margin: -16px -16px 14px; aspect-ratio: 4 / 3; font-size: 80px; }
      .detail-title { font-size: 20px; }
      .detail-price { font-size: 22px; margin: 6px 0 2px; }
      .detail-section { margin-top: 14px; padding-top: 14px; }
      .actions-row { flex-direction: column; gap: 8px; }
      .actions-row > .btn { width: 100%; min-width: 0; }
      .filters-bar { padding: 12px 0; margin-bottom: 14px; gap: 6px; }
      .filter-pill { padding: 7px 12px; font-size: 12px; }
      .listing-card__body { padding: 10px 12px 12px; }
      .listing-card__title { font-size: 13px; }
      .listing-card__price { font-size: 16px; }
      .demo-banner {
        top: auto; right: auto;
        bottom: 80px; left: 50%; transform: translateX(-50%);
        font-size: 11px; padding: 5px 10px;
      }
      body.has-bottom-nav .demo-banner { bottom: 78px; }
      .field { margin-bottom: 12px; }
      .field--row { flex-direction: column; gap: 12px; }
      .input, .select { height: 42px; }
      .seller-card { padding: 12px; }
    }

    @media (min-width: 640px) {
      .container { padding: 0 24px; }
      .listings-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .categories-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .header-search { display: block; }
    }

    @media (min-width: 900px) {
      :root { --header-h: 72px; }
      .listings-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      .dashboard {
        grid-template-columns: 240px 1fr;
        gap: 28px;
      }
      .side-nav { display: flex; }
      .bottom-nav { display: none; }
      .hero { padding: 56px 0 56px; }
      .section { padding: 36px 0; }
    }

    @media (min-width: 1100px) {
      .listings-grid {
        gap: 18px;
      }
    }

    /* layout when bottom nav is visible : add padding to body */
    body.has-bottom-nav { padding-bottom: 70px; }
    @media (min-width: 900px) {
      body.has-bottom-nav { padding-bottom: 0; }
    }

    /* ---------- badge "paiement en ligne" + bouton acheter ---------- */
    .pay-badge {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(4px);
      padding: 3px 9px;
      font-size: 11px; font-weight: 700;
      border-radius: 999px;
      color: var(--success);
      letter-spacing: .02em;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn--buy {
      background: var(--success);
      color: #fff;
    }
    .btn--buy:hover { background: #245f3d; }
    .pay-info {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: var(--success-s);
      border: 1px solid #b9dac6;
      border-radius: 10px;
      font-size: 13px;
      color: #1f4f33;
      margin-top: 12px;
    }
    .pay-info__ico { font-size: 18px; flex-shrink: 0; }
  </style>
</head>
<body>
  <!-- ============================================================
       APP STRUCTURE — gérée par JS, on garde le DOM minimal au boot
       ============================================================ -->

  <!-- Bandeau démo (caché par défaut) -->
  <div id="demoBanner" class="demo-banner hidden" title="Cliquer pour quitter le mode démo">MODE DÉMO</div>

  <!-- Header -->
  <header class="app-header">
    <div class="container app-header__inner">
      <div class="brand" id="brandBtn">
        <div class="brand__mark">🌴</div>
        <div class="brand__name">Matinik <em>Market</em></div>
      </div>
      <div class="header-search" id="headerSearch">
        <input type="text" id="searchInput" placeholder="Rechercher un produit, un service…" autocomplete="off" />
      </div>
      <nav class="header-nav" id="headerNav"></nav>
    </div>
  </header>

  <!-- Vue principale -->
  <main id="mainView"></main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="container app-footer__inner">
      <div class="app-footer__brand">
        <div class="brand__mark" style="width:28px;height:28px;font-size:14px">🌴</div>
        <strong>Matinik Market</strong>
      </div>
      <div>La marketplace de la Martinique · 100% local 🇲🇶</div>
      <div id="versionTag">v0.1 — 2026</div>
    </div>
  </footer>

  <!-- Bottom nav (mobile, seulement quand connecté) -->
  <nav id="bottomNav" class="bottom-nav hidden"></nav>

  <!-- Slots dynamiques -->
  <div id="modalSlot"></div>
  <div id="toastStack" class="toast-stack" aria-live="polite"></div>
  <div id="loaderSlot"></div>

  <script>
    /* ================================================================
       MATINIK MARKET — App JS  (vanilla, single-file)
       ================================================================ */

    const APP = {
      name: 'Matinik Market',
      version: 'v0.2',
      year: 2026,
      // 🛠️ Coller ici l'URL du déploiement Apps Script (Web App)
      backendUrl: '',
    };

    /* ----- catégories & communes ---------------------------------- */
    const PRODUCT_CATEGORIES = [
      { id: 'alimentation', label: 'Alimentation & Boissons', emoji: '🥭' },
      { id: 'artisanat',    label: 'Artisanat local',         emoji: '🪡' },
      { id: 'mode',         label: 'Mode & Accessoires',      emoji: '👗' },
      { id: 'maison',       label: 'Maison & Jardin',         emoji: '🪴' },
      { id: 'beaute',       label: 'Beauté & Bien-être',      emoji: '🧴' },
      { id: 'enfants',      label: 'Enfants & Bébé',          emoji: '🧸' },
      { id: 'sport',        label: 'Sport & Loisirs',         emoji: '🏝️' },
      { id: 'autre-produit',label: 'Autres produits',         emoji: '📦' },
    ];

    const SERVICE_CATEGORIES = [
      { id: 'cours',        label: 'Cours & Formation',        emoji: '📚' },
      { id: 'bricolage',    label: 'Bricolage & Réparation',   emoji: '🔧' },
      { id: 'transport',    label: 'Transport & Déménagement', emoji: '🚛' },
      { id: 'beaute-pro',   label: 'Beauté & Bien-être',       emoji: '💆' },
      { id: 'evenements',   label: 'Événements',               emoji: '🎉' },
      { id: 'tourisme',     label: 'Tourisme & Excursions',    emoji: '🌋' },
      { id: 'menage',       label: 'Ménage & Garde',           emoji: '🧹' },
      { id: 'jardinage',    label: 'Jardinage & Extérieur',    emoji: '🌿' },
      { id: 'autre-service',label: 'Autres services',          emoji: '✨' },
    ];

    const CITIES = [
      'Fort-de-France','Le Lamentin','Schoelcher','Sainte-Marie',
      'Le Robert','Saint-Joseph','Le François','La Trinité',
      'Le Marin','Rivière-Pilote','Sainte-Luce','Le Diamant',
      'Trois-Îlets','Ducos','Saint-Pierre','Le Carbet',
      'Le Vauclin','Le Gros-Morne','Sainte-Anne','Macouba',
      'Bellefontaine','Case-Pilote','Le Morne-Rouge','Basse-Pointe',
      'Le Lorrain','Marigot','Le Prêcheur','Grand-Rivière',
      'Le Morne-Vert','Saint-Esprit',"L'Ajoupa-Bouillon",'Rivière-Salée',
      "Anses-d'Arlet",'Fonds-Saint-Denis',
    ];

    function catLabel(id) {
      const c = [...PRODUCT_CATEGORIES, ...SERVICE_CATEGORIES].find(x => x.id === id);
      return c ? `${c.emoji} ${c.label}` : id;
    }
    function catEmoji(id) {
      const c = [...PRODUCT_CATEGORIES, ...SERVICE_CATEGORIES].find(x => x.id === id);
      return c ? c.emoji : '📦';
    }

    /* ----- paiement en ligne (Niveau 1 : liens directs) ----------- */
    // Domaines autorisés pour un lien de paiement direct (Niveau 1)
    // → la plateforme ne touche jamais l'argent, c'est le vendeur qui encaisse.
    const PAYMENT_PROVIDERS = [
      { match: /^https?:\/\/(buy\.)?stripe\.com\//i,        name: 'Stripe',     emoji: '💳' },
      { match: /^https?:\/\/(www\.)?paypal\.(com|me)\//i,    name: 'PayPal',     emoji: '🅿️' },
      { match: /^https?:\/\/paypal\.me\//i,                  name: 'PayPal.me',  emoji: '🅿️' },
      { match: /^https?:\/\/(www\.)?helloasso\.com\//i,      name: 'HelloAsso',  emoji: '💚' },
      { match: /^https?:\/\/(www\.)?lyf\.eu\//i,             name: 'Lyf Pro',    emoji: '🟣' },
      { match: /^https?:\/\/(www\.)?sumup\.(link|com)\//i,   name: 'SumUp',      emoji: '💳' },
      { match: /^https?:\/\/(www\.)?payplug\.com\//i,        name: 'Payplug',    emoji: '💳' },
      { match: /^https?:\/\/(www\.)?revolut\.me\//i,         name: 'Revolut',    emoji: '⚫' },
      { match: /^https?:\/\/(www\.)?gocardless\.com\//i,     name: 'GoCardless', emoji: '💳' },
      { match: /^https?:\/\/(www\.)?stancer\.com\//i,        name: 'Stancer',    emoji: '💳' },
    ];
    function detectPaymentProvider(url) {
      if (!url || typeof url !== 'string') return null;
      const u = url.trim();
      for (const p of PAYMENT_PROVIDERS) {
        if (p.match.test(u)) return p;
      }
      return null;
    }
    function isValidPaymentUrl(url) {
      if (!url) return true; // vide = OK (champ optionnel)
      const u = String(url).trim();
      if (!/^https:\/\//i.test(u)) return false; // HTTPS uniquement
      return detectPaymentProvider(u) !== null;
    }

    /* ----- état global -------------------------------------------- */
    const state = {
      mode: 'real',                 // 'real' | 'demo'
      currentUser: null,            // {id, email, name, phone, city, ...}
      view: 'home',                 // 'home' | 'browse' | 'dashboard'
      dashboardTab: 'listings',     // 'listings' | 'create' | 'messages' | 'favorites' | 'profile'
      listings: [],
      users: [],
      messages: [],
      favorites: [],
      filters: { type: 'all', category: null, city: null, search: '' },
      selectedListingId: null,
      activeConversation: null,     // { withUserId, listingId }
      isLoading: false,
    };

    /* ----- localStorage cache ------------------------------------- */
    const LS_KEYS = {
      session: 'mm_session',
      cache:   'mm_cache_v1',
      audit:   'mm_audit_log',
    };

    function lsGet(key, fallback=null) {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
      } catch (e) { return fallback; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }
    function lsDel(key) { try { localStorage.removeItem(key); } catch (e) {} }

    /* ----- audit log ---------------------------------------------- */
    function audit(action, details={}) {
      const entry = {
        ts: new Date().toISOString(),
        action,
        userId: state.currentUser?.id || null,
        mode: state.mode,
        details,
      };
      const log = lsGet(LS_KEYS.audit, []);
      log.push(entry);
      while (log.length > 200) log.shift();
      lsSet(LS_KEYS.audit, log);
      console.log('[MatinikMarket]', action, entry);
      // Push backend (best effort) hors démo
      if (state.mode === 'real' && APP.backendUrl) {
        api('audit', { entry }).catch(() => {});
      }
    }

    /* ----- réseau / API ------------------------------------------- */
    async function api(action, data={}, opts={}) {
      // En mode démo, on ne touche jamais au backend
      if (state.mode === 'demo') {
        return { ok: true, demo: true };
      }
      if (!APP.backendUrl) {
        return { ok: false, error: 'Backend non configuré (APP.backendUrl vide)' };
      }
      const payload = { action, data };
      const delays = [300, 800, 2000];
      let lastErr = null;
      for (let attempt = 0; attempt <= delays.length; attempt++) {
        try {
          const res = await fetch(APP.backendUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const json = await res.json();
          return json;
        } catch (e) {
          lastErr = e;
          console.warn('[MatinikMarket] api retry', action, e.message);
          if (attempt < delays.length) {
            await new Promise(r => setTimeout(r, delays[attempt]));
          }
        }
      }
      return { ok: false, error: 'Réseau indisponible : ' + (lastErr?.message || 'erreur inconnue') };
    }

    /* ----- toasts -------------------------------------------------- */
    function toast(msg, type='info', duration=3500) {
      const stack = document.getElementById('toastStack');
      const el = document.createElement('div');
      el.className = `toast is-${type}`;
      const icon = { success:'✅', error:'⚠️', warning:'⚠️', info:'ℹ️' }[type] || 'ℹ️';
      el.innerHTML = `<div class="toast__icon">${icon}</div><div class="toast__body">${escapeHtml(msg)}</div>`;
      stack.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'slide-down .18s ease reverse';
        setTimeout(() => el.remove(), 180);
      }, duration);
    }

    /* ----- loader -------------------------------------------------- */
    function showLoader() {
      const slot = document.getElementById('loaderSlot');
      if (slot.children.length) return;
      slot.innerHTML = `<div class="loader-screen"><div class="spinner"></div></div>`;
    }
    function hideLoader() {
      document.getElementById('loaderSlot').innerHTML = '';
    }

    /* ----- helpers ------------------------------------------------- */
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function uid(prefix='') {
      return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
    }
    function initials(name) {
      if (!name) return '?';
      const parts = name.trim().split(/\s+/);
      return ((parts[0]?.[0]||'') + (parts[1]?.[0]||'')).toUpperCase();
    }
    function formatPrice(listing) {
      if (listing.priceMode === 'free') return 'Gratuit';
      if (listing.priceMode === 'contact') return 'Sur demande';
      const v = listing.price;
      if (v == null || v === '') return 'Sur demande';
      const txt = new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits: 0 }).format(v);
      if (listing.priceMode === 'from')   return `À partir de ${txt}`;
      if (listing.priceMode === 'hourly') return `${txt} <small>/heure</small>`;
      return txt;
    }
    function timeAgo(iso) {
      if (!iso) return '';
      const d = new Date(iso); if (isNaN(d)) return '';
      const s = (Date.now() - d.getTime()) / 1000;
      if (s < 60) return 'à l’instant';
      if (s < 3600) return `il y a ${Math.floor(s/60)} min`;
      if (s < 86400) return `il y a ${Math.floor(s/3600)} h`;
      if (s < 604800) return `il y a ${Math.floor(s/86400)} j`;
      return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
    }
    function debounce(fn, ms=200) {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }
    function userById(id) { return state.users.find(u => u.id === id); }
    function listingById(id) { return state.listings.find(l => l.id === id); }
    function isFav(listingId) {
      if (!state.currentUser) return false;
      return state.favorites.some(f => f.userId === state.currentUser.id && f.listingId === listingId);
    }
    function unreadFromUser(otherUserId) {
      if (!state.currentUser) return 0;
      return state.messages.filter(m =>
        m.toUserId === state.currentUser.id && m.fromUserId === otherUserId && !m.read
      ).length;
    }
    function unreadCount() {
      if (!state.currentUser) return 0;
      return state.messages.filter(m => m.toUserId === state.currentUser.id && !m.read).length;
    }

    async function login(email, password) {
      showLoader();
      const res = await api('login', { email: email.trim().toLowerCase(), password });
      hideLoader();
      if (res.ok && res.user) {
        state.currentUser = res.user;
        // Pré-charger les données privées
        await loadPrivateData();
        lsSet(LS_KEYS.session, { userId: res.user.id, email: res.user.email });
        audit('login_success', { userId: res.user.id });
        closeModal();
        document.body.classList.add('has-bottom-nav');
        toast(`Bienvenue ${res.user.name.split(' ')[0]} 👋`, 'success');
        go('dashboard');
        return true;
      }
      audit('login_fail', { email });
      toast(res.error || 'Identifiants incorrects.', 'error');
      return false;
    }

    async function register(form) {
      showLoader();
      const payload = {
        email: form.email.trim().toLowerCase(),
        password: form.password,
        name: form.name.trim(),
        phone: form.phone.trim(),
        city: form.city,
      };
      const res = await api('register', payload);
      hideLoader();
      if (res.ok && res.user) {
        state.currentUser = res.user;
        await loadPrivateData();
        lsSet(LS_KEYS.session, { userId: res.user.id, email: res.user.email });
        audit('register_success', { userId: res.user.id });
        closeModal();
        document.body.classList.add('has-bottom-nav');
        toast(`Compte créé — bienvenue ${res.user.name.split(' ')[0]} ! 🌴`, 'success');
        go('dashboard');
        return true;
      }
      toast(res.error || 'Impossible de créer le compte.', 'error');
      return false;
    }

    async function loadPublicListings() {
      if (state.mode === 'demo') return; // déjà chargé
      if (!APP.backendUrl) return; // pas de backend → vide
      const res = await api('getPublicListings', {});
      if (res.ok) {
        state.listings = res.listings || [];
        state.users = res.sellers || [];
        lsSet(LS_KEYS.cache, { listings: state.listings, users: state.users, ts: Date.now() });
      } else {
        // Fallback cache
        const cache = lsGet(LS_KEYS.cache);
        if (cache && cache.listings) {
          state.listings = cache.listings;
          state.users = cache.users || [];
        }
      }
      if (state.view === 'home' || state.view === 'browse') render();
    }

    async function loadPrivateData() {
      if (state.mode === 'demo' || !state.currentUser) return;
      const [msgs, favs] = await Promise.all([
        api('getMessagesForUser', { userId: state.currentUser.id }),
        api('getFavorites',       { userId: state.currentUser.id }),
      ]);
      if (msgs.ok) state.messages = msgs.messages || [];
      if (favs.ok) state.favorites = favs.favorites || [];
    }

      state.view = view;

      if (opts.listingId !== undefined) state.selectedListingId = opts.listingId;
      if (opts.filters) state.filters = { ...state.filters, ...opts.filters };
      if (opts.conversation) state.activeConversation = opts.conversation;
      window.scrollTo({ top: 0, behavior: 'instant' });
      render();
    }

                <h2 class="section__title">Catégories services</h2>
                <div class="section__subtitle">Trouvez le bon professionnel près de chez vous</div>
              </div>
            </div>
            <div class="categories-grid">
              ${SERVICE_CATEGORIES.map(c => `
                <div class="cat-card" data-browse-cat="${c.id}" data-browse-type="service">
                  <div class="cat-card__icon">${c.emoji}</div>
                  <div>
                    <div class="cat-card__label">${c.label}</div>
                    <div class="cat-card__count">${state.listings.filter(l=>l.category===c.id && l.status==='active').length} annonces</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="section__head">
              <div>
                <h2 class="section__title">À la une</h2>
                <div class="section__subtitle">Sélection d’annonces récentes</div>
              </div>
              <button class="link-more" data-go="browse">Voir tout →</button>
            </div>
            ${featured.length === 0
              ? renderEmpty('🌱','Pas encore d’annonces',
                  state.mode==='real' && !APP.backendUrl
                    ? 'Le backend n’est pas configuré. Essayez le mode démonstration depuis « Connexion ».'
                    : 'Soyez le premier à publier une annonce.')
              : `<div class="listings-grid">
                  ${featured.map(renderListingCard).join('')}
                </div>`}
          </div>
        </section>
      `;
    }

    /* ----- BROWSE (recherche / filtres) --------------------------- */
    function renderBrowse() {
      const f = state.filters;
      const filtered = state.listings.filter(l => {
        if (l.status !== 'active') return false;
        if (f.type !== 'all' && l.type !== f.type) return false;
        if (f.category && l.category !== f.category) return false;
        if (f.city && l.location !== f.city) return false;
        if (f.search) {
          const q = f.search.toLowerCase();
          const hay = (l.title + ' ' + l.description + ' ' + (catLabel(l.category)||'')).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      const typePill = `
        <button class="filter-pill ${f.type!=='all'?'has-value':''}" data-filter="type">
          ${f.type==='all' ? 'Tous types' : (f.type==='product' ? '📦 Produits' : '🛎️ Services')} ▾
        </button>`;
      const catPill = `
        <button class="filter-pill ${f.category?'has-value':''}" data-filter="category">
          ${f.category ? catLabel(f.category) : 'Toutes catégories'} ▾
        </button>`;
      const cityPill = `
        <button class="filter-pill ${f.city?'has-value':''}" data-filter="city">
          📍 ${f.city || 'Toutes communes'} ▾
        </button>`;
      const clearPill = (f.type!=='all'||f.category||f.city||f.search)
        ? `<button class="filter-pill" data-filter="clear">✕ Réinitialiser</button>` : '';

      return `
        <section class="section">
          <div class="container">
            <div class="browse-head">
              <div>
                <h2 class="section__title">${f.search ? `Résultats pour « ${escapeHtml(f.search)} »` : 'Toutes les annonces'}</h2>
                <div class="browse-count">${filtered.length} annonce${filtered.length>1?'s':''}</div>
              </div>
              <button class="btn btn--ghost btn--sm" data-go="home">← Accueil</button>
            </div>
            <div class="filters-bar">
              ${typePill}${catPill}${cityPill}${clearPill}
            </div>
            ${filtered.length === 0
              ? renderEmpty('🧐','Aucun résultat','Essayez avec d’autres mots-clés ou élargissez les filtres.')
              : `<div class="listings-grid">${filtered.map(renderListingCard).join('')}</div>`}
          </div>
        </section>
      `;
    }

    function renderListingCard(l) {
      const seller = userById(l.sellerId);
      const fav = isFav(l.id) ? 'is-active' : '';
      const typeLabel = l.type === 'service' ? 'Service' : 'Produit';
      const typeCls = l.type === 'service' ? 'is-service' : '';
      const payP = detectPaymentProvider(l.paymentUrl);
      return `
        <article class="listing-card" data-listing="${l.id}">
          <div class="listing-card__media">
            ${l.imageUrl ? `<img src="${escapeHtml(l.imageUrl)}" alt="" loading="lazy" />` : (l.emoji || catEmoji(l.category))}
            <span class="listing-card__type ${typeCls}">${typeLabel}</span>
            <button class="fav-btn ${fav}" data-fav="${l.id}" title="Favoris">${isFav(l.id) ? '❤️' : '🤍'}</button>
            ${payP ? `<span class="pay-badge" title="Paiement en ligne via ${payP.name}">💳 En ligne</span>` : ''}
          </div>
          <div class="listing-card__body">
            <h3 class="listing-card__title">${escapeHtml(l.title)}</h3>
            <div class="listing-card__meta">📍 ${escapeHtml(l.location)} · ${seller ? escapeHtml(seller.name.split(' ')[0]) : '—'}</div>
            <div class="listing-card__price">${formatPrice(l)}</div>
          </div>
        </article>`;
    }

    function renderEmpty(emoji, title, msg) {
      return `<div class="empty-state">
        <div class="empty-state__emoji">${emoji}</div>
        <div class="empty-state__title">${escapeHtml(title)}</div>
        <div>${escapeHtml(msg)}</div>
      </div>`;
    }

    /* ----- DASHBOARD --------------------------------------------- */
    function renderDashboard() {
      const tab = state.dashboardTab;
      const myListings = state.listings.filter(l => l.sellerId === state.currentUser.id);
      const u = unreadCount();
      const favCount = state.favorites.filter(f => f.userId === state.currentUser.id).length;
      const sideItem = (id, label, icon, badge=0) => `
        <button class="side-nav__item ${tab===id?'is-active':''}" data-tab="${id}">
          <span>${icon}</span><span>${label}</span>
          ${badge ? `<span class="badge">${badge}</span>` : ''}
        </button>`;

      let pane = '';
      if (tab === 'listings')  pane = renderTabListings(myListings);
      else if (tab === 'create')   pane = renderTabCreate();
      else if (tab === 'messages') pane = renderTabMessages();
      else if (tab === 'favorites')pane = renderTabFavorites();
      else if (tab === 'profile')  pane = renderTabProfile();

      return `
        <div class="container">
          <div class="dashboard">
            <aside class="side-nav" id="sideNav">
              ${sideItem('listings',  'Mes annonces',  '📋', myListings.length)}
              ${sideItem('create',    'Nouvelle annonce','➕')}
              ${sideItem('messages',  'Messages',      '💬', u)}
              ${sideItem('favorites', 'Favoris',       '❤️', favCount)}
              ${sideItem('profile',   'Profil',        '👤')}
              <div style="height:8px"></div>
              ${sideItem('logout',    'Déconnexion',   '↩️')}
            </aside>
            <section class="dashboard-pane">${pane}</section>
          </div>
        </div>
      `;
    }

    function renderTabListings(myListings) {
      if (myListings.length === 0) {
        return `
          <div class="dashboard-pane__head">
            <h2>Mes annonces</h2>
            <button class="btn btn--primary btn--sm" data-tab="create">+ Créer une annonce</button>
          </div>
          ${renderEmpty('📋','Aucune annonce pour le moment','Créez votre première annonce — c’est gratuit.')}`;
      }
      return `
        <div class="dashboard-pane__head">
          <h2>Mes annonces (${myListings.length})</h2>
          <button class="btn btn--primary btn--sm" data-tab="create">+ Créer une annonce</button>
        </div>
        ${myListings.map(l => `
          <div class="my-listing">
            <div class="my-listing__cover">
              ${l.imageUrl ? `<img src="${escapeHtml(l.imageUrl)}" alt="" />` : (l.emoji || catEmoji(l.category))}
            </div>
            <div class="my-listing__body">
              <div class="my-listing__title">${escapeHtml(l.title)}</div>
              <div class="my-listing__meta">
                ${formatPrice(l)} · ${escapeHtml(l.location)} · 👁 ${l.views} vues
                <span class="status-badge is-${l.status}">${
                  l.status === 'active' ? 'Active' : l.status === 'paused' ? 'En pause' : 'Vendue'
                }</span>
              </div>
              <div class="my-listing__actions">
                <button class="btn btn--ghost btn--sm" data-listing-edit="${l.id}">Modifier</button>
                <button class="btn btn--soft btn--sm" data-listing-toggle="${l.id}">
                  ${l.status === 'active' ? 'Mettre en pause' : 'Réactiver'}
                </button>
                <button class="btn btn--soft btn--sm" data-listing="${l.id}">Aperçu</button>
                <button class="btn btn--ghost btn--sm" data-listing-delete="${l.id}" style="color:var(--error)">Supprimer</button>
              </div>
            </div>
          </div>
        `).join('')}`;
    }

        type: 'product', category: 'alimentation', title:'', description:'',

      return `
        <div class="dashboard-pane__head">
          <h2>${editing ? 'Modifier l’annonce' : 'Créer une annonce'}</h2>
          ${editing ? `<button class="btn btn--ghost btn--sm" data-tab="listings">← Retour</button>` : ''}
        </div>
        <form id="listingForm" class="card-form" data-edit-id="${editing?.id || ''}">
          <div class="field">
            <label class="label">Type</label>
            <div class="auth-tabs">
              <button type="button" class="auth-tab ${l.type==='product'?'is-active':''}" data-set-type="product">📦 Produit</button>
              <button type="button" class="auth-tab ${l.type==='service'?'is-active':''}" data-set-type="service">🛎️ Service</button>
            </div>

          <div class="field">

          <div class="field">

          </div>

          <div class="field">
            <label class="label" for="lf-desc">Description</label>
            <textarea id="lf-desc" class="textarea" name="description" maxlength="2000" required placeholder="Décrivez votre offre, les conditions, les modes de livraison…">${escapeHtml(l.description)}</textarea>
            <div class="field-help">Max 2000 caractères</div>
          </div>

          <div class="field field--row">
            <div>
              <label class="label" for="lf-pricemode">Tarification</label>
              <select id="lf-pricemode" class="select" name="priceMode">
                <option value="fixed"   ${l.priceMode==='fixed'?'selected':''}>Prix fixe</option>
                <option value="from"    ${l.priceMode==='from'?'selected':''}>À partir de</option>
                <option value="hourly"  ${l.priceMode==='hourly'?'selected':''}>Tarif horaire</option>

                <option value="contact" ${l.priceMode==='contact'?'selected':''}>Sur demande</option>
              </select>

            <div>

          </div>

          <div class="field field--row">
            <div>
              <label class="label" for="lf-loc">Commune</label>
              <select id="lf-loc" class="select" name="location" required>
                ${CITIES.map(c => `<option value="${escapeHtml(c)}" ${c===l.location?'selected':''}>${escapeHtml(c)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="label" for="lf-emoji">Emoji (visuel)</label>
              <input id="lf-emoji" class="input" name="emoji" maxlength="4" value="${escapeHtml(l.emoji)}" placeholder="🥭"/>
            </div>
          </div>

          <div class="field">
            <label class="label" for="lf-img">URL d’image (optionnel)</label>
            <input id="lf-img" class="input" name="imageUrl" type="url" value="${escapeHtml(l.imageUrl)}" placeholder="https://…"/>
            <div class="field-help">Si vide, l’emoji ci-dessus sera utilisé comme visuel.</div>
          </div>

          <div class="field">
            <label class="label" for="lf-pay">💳 Lien de paiement en ligne (optionnel)</label>
            <input id="lf-pay" class="input" name="paymentUrl" type="url" value="${escapeHtml(l.paymentUrl || '')}" placeholder="https://buy.stripe.com/… ou https://paypal.me/…"/>
            <div class="field-help">
              Collez ici votre lien Stripe Payment Link, PayPal.me, HelloAsso, Lyf Pro, SumUp, Payplug, etc.
              L'acheteur sera redirigé vers <strong>votre</strong> page de paiement — Matinik Market ne touche jamais l'argent.
            </div>

          <div class="modal__footer" style="border-top:1px solid var(--line); margin-top:18px; padding:14px 0 0">

          </div>
        </form>`;
    }

    function renderTabFavorites() {
      const myFavs = state.favorites
        .filter(f => f.userId === state.currentUser.id)
        .map(f => listingById(f.listingId))
        .filter(Boolean);
      return `
        <div class="dashboard-pane__head"><h2>Mes favoris (${myFavs.length})</h2></div>
        ${myFavs.length === 0
          ? renderEmpty('💛','Aucun favori','Cliquez sur le ❤️ d’une annonce pour la retrouver ici.')
          : `<div class="listings-grid">${myFavs.map(renderListingCard).join('')}</div>`}`;
    }

    function renderTabMessages() {
      // Construire la liste des conversations groupées par (autre utilisateur, listing)
      const my = state.currentUser.id;
      const convMap = new Map();
      state.messages.forEach(m => {
        if (m.fromUserId !== my && m.toUserId !== my) return;
        const other = m.fromUserId === my ? m.toUserId : m.fromUserId;
        const key = other + '::' + m.listingId;
        const cur = convMap.get(key);
        if (!cur || new Date(m.createdAt) > new Date(cur.lastAt)) {
          convMap.set(key, {
            withUserId: other,
            listingId: m.listingId,
            lastMsg: m.content,
            lastAt: m.createdAt,
            unread: 0,
          });
        }
      });
      // Calcul unread
      convMap.forEach((c, key) => {
        c.unread = state.messages.filter(m =>
          m.toUserId === my && m.fromUserId === c.withUserId && m.listingId === c.listingId && !m.read
        ).length;
      });
      const convs = [...convMap.values()].sort((a,b) => new Date(b.lastAt) - new Date(a.lastAt));

      if (state.activeConversation) {
        return renderConversation(state.activeConversation);
      }

      return `
        <div class="dashboard-pane__head"><h2>Messages</h2></div>
        ${convs.length === 0
          ? renderEmpty('📭','Pas encore de message','Vos échanges avec acheteurs et vendeurs apparaîtront ici.')
          : `<div class="conv-list">${convs.map(c => {
              const other = userById(c.withUserId);
              const listing = listingById(c.listingId);
              return `
                <div class="conv-item ${c.unread?'is-unread':''}" data-conv-with="${c.withUserId}" data-conv-listing="${c.listingId}">
                  <div class="conv-item__avatar">${initials(other?.name || '?')}</div>
                  <div class="conv-item__body">
                    <div class="conv-item__top">
                      <div class="conv-item__name">${escapeHtml(other?.name || 'Utilisateur')}</div>
                      <div class="conv-item__date">${timeAgo(c.lastAt)}</div>
                    </div>
                    <div class="conv-item__excerpt ${c.unread?'is-unread':''}">
                      ${listing ? `<em style="color:var(--ink-mute)">${escapeHtml(listing.title)} · </em>` : ''}${escapeHtml(c.lastMsg)}
                    </div>
                  </div>
                  ${c.unread ? `<div class="unread-dot"></div>` : ''}
                </div>`;
            }).join('')}</div>`}`;
    }

    function renderConversation(conv) {
      const my = state.currentUser.id;
      const other = userById(conv.withUserId);
      const listing = listingById(conv.listingId);
      const thread = state.messages
        .filter(m =>
          ((m.fromUserId === my && m.toUserId === conv.withUserId) ||
           (m.toUserId === my && m.fromUserId === conv.withUserId))
          && m.listingId === conv.listingId)
        .sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));

      return `
        <div class="dashboard-pane__head">
          <button class="btn btn--ghost btn--sm" data-conv-back>← Conversations</button>
        </div>
        <div class="seller-card" style="margin-bottom:14px">
          <div class="seller-card__avatar">${initials(other?.name || '?')}</div>
          <div style="flex:1; min-width:0">
            <div class="seller-card__name">${escapeHtml(other?.name || 'Utilisateur')}</div>
            <div class="seller-card__sub">${listing ? `À propos de : ${escapeHtml(listing.title)}` : ''}</div>
          </div>
          ${listing ? `<button class="btn btn--ghost btn--sm" data-listing="${listing.id}">Voir</button>` : ''}
        </div>
        <div class="thread" id="thread">
          ${thread.length === 0
            ? `<div style="color:var(--ink-mute); font-size:13px; text-align:center; padding:18px">Démarrez la conversation 👇</div>`
            : thread.map(m => `
                <div class="msg ${m.fromUserId===my?'is-mine':'is-them'}">
                  ${escapeHtml(m.content)}
                  <span class="msg__time">${timeAgo(m.createdAt)}</span>
                </div>`).join('')}
        </div>
        <form class="msg-compose" id="msgForm">
          <textarea class="textarea" name="content" placeholder="Écrivez votre message…" required></textarea>
          <button type="submit" class="btn btn--primary">Envoyer</button>
        </form>`;
    }

    function renderTabProfile() {
      const u = state.currentUser;
      return `
        <div class="dashboard-pane__head"><h2>Mon profil</h2></div>
        <div class="profile-head">
          <div class="profile-head__avatar">${initials(u.name)}</div>
          <div>
            <div class="profile-head__name">${escapeHtml(u.name)}</div>
            <div class="profile-head__sub">${escapeHtml(u.email)} · ${escapeHtml(u.city || '')}</div>
          </div>

        <form id="profileForm">
          <div class="field field--row">

              <label class="label">Nom complet</label>
              <input class="input" name="name" required value="${escapeHtml(u.name)}"/>
            </div>
            <div>
              <label class="label">Téléphone</label>
              <input class="input" name="phone" value="${escapeHtml(u.phone || '')}"/>
            </div>
          </div>
          <div class="field">
            <label class="label">Email</label>
            <input class="input" name="email" type="email" required value="${escapeHtml(u.email)}"/>

            </select>

          <div class="field">
            <label class="label">Bio (visible sur vos annonces)</label>
            <textarea class="textarea" name="bio" maxlength="400" placeholder="Quelques mots sur vous, votre métier, votre démarche…">${escapeHtml(u.bio || '')}</textarea>
          </div>
          <div class="modal__footer" style="border-top:1px solid var(--line); margin-top:18px; padding:14px 0 0">
            <button type="button" class="btn btn--ghost" id="changePwdBtn">Changer mon mot de passe</button>
            <button type="submit" class="btn btn--primary">Enregistrer</button>
          </div>
        </form>
        <div style="margin-top:24px; padding-top:18px; border-top:1px solid var(--line); display:flex; gap:10px; flex-wrap:wrap">

          <button class="btn btn--ghost btn--sm" id="logoutBtn">Se déconnecter</button>

    }

    /* ===============================================================
       MODAUX
       =============================================================== */
    function openModal(html) {
      const slot = document.getElementById('modalSlot');
      slot.innerHTML = `<div class="modal-backdrop" id="modalBackdrop">${html}</div>`;
      const backdrop = document.getElementById('modalBackdrop');
      backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
    }
    function closeModal() {
      document.getElementById('modalSlot').innerHTML = '';
    }

    function openLoginModal(initialTab='login') {
      const html = `
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal__head">

            <button class="modal__close" data-close>×</button>
          </div>
          <div class="modal__body">
            <div class="auth-tabs">
              <button class="auth-tab ${initialTab==='login'?'is-active':''}" data-auth-tab="login">Connexion</button>
              <button class="auth-tab ${initialTab==='signup'?'is-active':''}" data-auth-tab="signup">Créer un compte</button>
            </div>
            <div id="authPane">${initialTab==='login' ? renderLoginForm() : renderSignupForm()}</div>
            <div class="demo-cta">
              <div class="demo-cta__lead">Découvrir l’app sans s’inscrire</div>
              <button class="btn btn--accent btn--block" id="demoBtn">🎭 Mode démonstration</button>
            </div>
          </div>
        </div>`;
      openModal(html);
    }

    function openFilterPicker(filterKey) {
      const f = state.filters;
      let title = '', items = [];
      if (filterKey === 'type') {
        title = 'Type d’annonce';
        items = [
          { id: 'all',     label: 'Tous types', emoji: '◼️' },
          { id: 'product', label: 'Produits',   emoji: '📦' },
          { id: 'service', label: 'Services',   emoji: '🛎️' },
        ].map(it => ({ ...it, active: f.type === it.id, action: 'pick-type' }));
      } else if (filterKey === 'category') {
        title = 'Catégorie';
        items = [{ id: '', label: 'Toutes catégories', emoji: '◼️', active: !f.category }]
          .concat([...PRODUCT_CATEGORIES, ...SERVICE_CATEGORIES].map(c => ({ ...c, active: f.category === c.id })))
          .map(it => ({ ...it, action: 'pick-cat' }));
      } else if (filterKey === 'city') {
        title = 'Commune';
        items = [{ id: '', label: 'Toutes communes', emoji: '🗺️', active: !f.city }]
          .concat(CITIES.map(c => ({ id: c, label: c, emoji: '📍', active: f.city === c })))
          .map(it => ({ ...it, action: 'pick-city' }));
      }
      const html = `
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal__head">
            <h3 class="modal__title">${escapeHtml(title)}</h3>
            <button class="modal__close" data-close>×</button>
          </div>
          <div class="modal__body" style="padding:8px">
            ${items.map(it => `
              <button class="side-nav__item ${it.active?'is-active':''}"
                style="margin:2px 0"
                data-action="${it.action}" data-value="${escapeHtml(it.id)}">
                <span>${it.emoji}</span><span>${escapeHtml(it.label)}</span>
              </button>`).join('')}
          </div>
        </div>`;
      openModal(html);
    }
